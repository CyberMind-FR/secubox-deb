# SecuBox — Publish packages to apt.secubox.in
name: Publish Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      distribution:
        description: 'Target distribution'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie

env:
  REPO_HOST: apt.secubox.in
  REPO_USER: deploy
  REPO_PATH: /var/www/apt.secubox.in

jobs:
  build-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dpkg-dev
          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - name: Build packages
        run: |
          mkdir -p output
          for pkg in packages/secubox-*/; do
            if [[ -d "${pkg}/debian" ]]; then
              echo "Building $(basename $pkg)..."
              cd "$pkg"
              if [[ "${{ matrix.arch }}" == "arm64" ]]; then
                dpkg-buildpackage -a arm64 --host-arch arm64 -us -uc -b
              else
                dpkg-buildpackage -us -uc -b
              fi
              cd ../..
              mv packages/*.deb output/ 2>/dev/null || true
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.arch }}
          path: output/*.deb
          retention-days: 7

  publish:
    needs: build-packages
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download arm64 packages
        uses: actions/download-artifact@v4
        with:
          name: debs-arm64
          path: debs/

      - name: Download amd64 packages
        uses: actions/download-artifact@v4
        with:
          name: debs-amd64
          path: debs/

      - name: Install reprepro
        run: sudo apt-get install -y reprepro gnupg

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-keys

      - name: Setup repository
        run: |
          mkdir -p repo/conf
          cp repo/conf/distributions repo/conf/
          cat > repo/conf/options <<EOF
          verbose
          basedir $(pwd)/repo
          gnupghome ~/.gnupg
          EOF

      - name: Add packages to repository
        env:
          DIST: ${{ github.event.inputs.distribution || 'bookworm' }}
        run: |
          for deb in debs/*.deb; do
            echo "Adding: $(basename $deb)"
            reprepro -b repo includedeb "$DIST" "$deb"
          done

      - name: Export public key
        run: |
          gpg --armor --export packages@secubox.in > repo/dists/secubox-keyring.gpg
          gpg --export packages@secubox.in > repo/dists/secubox-keyring.gpg.bin

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts

          rsync -avz --delete \
            repo/dists/ repo/pool/ repo/secubox-keyring.gpg \
            ${REPO_USER}@${REPO_HOST}:${REPO_PATH}/

      - name: Verify deployment
        run: |
          curl -sf "https://${REPO_HOST}/dists/bookworm/Release" | head -20
