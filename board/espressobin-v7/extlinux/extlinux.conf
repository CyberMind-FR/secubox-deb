# SecuBox Live USB — Distroboot Configuration
# For EspressoBin V7 (Marvell Armada 3720)
# U-Boot will auto-detect this file and use it for boot
#
# Device mapping on EspressoBin V7:
#   USB drive  -> /dev/sda (Live USB boot source)
#   SD card    -> /dev/mmcblk0
#   eMMC       -> /dev/mmcblk1 (flash target)

TIMEOUT 30
DEFAULT live

LABEL live
    MENU LABEL SecuBox Live USB (EspressoBin V7)
    LINUX /boot/Image
    FDT /boot/dtbs/marvell/armada-3720-espressobin-v7-emmc.dtb
    INITRD /boot/initrd.img
    APPEND boot=live live-media-path=/live root=/dev/sda2 rootfstype=ext4 rootwait rootdelay=10 console=ttyMV0,115200 net.ifnames=0 modprobe.blacklist=mv88e6xxx,dsa_core sdhci.debug_quirks2=0x40 quiet splash

LABEL live-toram
    MENU LABEL SecuBox Live USB (Load to RAM)
    LINUX /boot/Image
    FDT /boot/dtbs/marvell/armada-3720-espressobin-v7-emmc.dtb
    INITRD /boot/initrd.img
    APPEND boot=live toram live-media-path=/live root=/dev/sda2 rootfstype=ext4 rootwait rootdelay=10 console=ttyMV0,115200 net.ifnames=0 modprobe.blacklist=mv88e6xxx,dsa_core sdhci.debug_quirks2=0x40 quiet splash

LABEL flash
    MENU LABEL Flash SecuBox to eMMC (Auto)
    LINUX /boot/Image
    FDT /boot/dtbs/marvell/armada-3720-espressobin-v7-emmc.dtb
    INITRD /boot/initrd.img
    APPEND boot=live live-media-path=/live root=/dev/sda2 rootfstype=ext4 rootwait rootdelay=10 console=ttyMV0,115200 net.ifnames=0 modprobe.blacklist=mv88e6xxx,dsa_core sdhci.debug_quirks2=0x40 quiet splash secubox.autoflash=1

LABEL rescue
    MENU LABEL Rescue Shell
    LINUX /boot/Image
    FDT /boot/dtbs/marvell/armada-3720-espressobin-v7-emmc.dtb
    INITRD /boot/initrd.img
    APPEND root=/dev/sda2 rootfstype=ext4 rootwait rootdelay=10 console=ttyMV0,115200 init=/bin/bash
