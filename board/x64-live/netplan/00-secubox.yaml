# /etc/netplan/00-secubox.yaml — x64 Live — Mode Router
# WAN: First ethernet interface with DHCP (internet uplink)
# br-lan: Bridge for LAN ports with static IP (DHCP server via dnsmasq)
network:
  version: 2
  renderer: networkd

  ethernets:
    # WAN — DHCP from upstream router/modem
    # Matches first ethernet interface (eno1, enp0s3, eth0, ens3, etc.)
    wan0:
      match:
        name: "e*"
      dhcp4: true
      dhcp6: false
      dhcp4-overrides:
        use-dns: true
        use-routes: true
      optional: false

  bridges:
    # Bridge LAN — local network gateway (192.168.1.1)
    # secubox-netmodes adds interfaces dynamically
    br-lan:
      interfaces: []
      addresses:
        - 192.168.1.1/24
      dhcp4: false
      optional: true
      parameters:
        stp: false
        forward-delay: 0

# Note: secubox-netmodes dynamically reconfigures this based on detected hardware
# DHCP server on br-lan managed by dnsmasq (secubox-nac)
