# /etc/nginx/sites-available/secubox
# SecuBox Modular Nginx Configuration
# Each module drops its config in /etc/nginx/secubox.d/*.conf

# ── HTTPS Frontend ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name secubox.local _;

    ssl_certificate     /etc/secubox/tls/cert.pem;
    ssl_certificate_key /etc/secubox/tls/key.pem;
    ssl_protocols       TLSv1.3 TLSv1.2;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # ── Static files (htdocs from modules) ──
    root /usr/share/secubox/www;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ── Modular API endpoints ──
    # Each module installs its own snippet in /etc/nginx/secubox.d/
    include /etc/nginx/secubox.d/*.conf;

    # ── Health check (no auth) ──
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}
