<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C3BOX — SecuBox Mesh Dashboard</title>
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            --bg: #e8f5e9;
            --fg: #009933;
            --dim: #c8e6c9;
            --accent: #00dd44;
            --border: #a5d6a7;
            --text-dark: #1b3d1c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
        }
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 1rem;
        }
        header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--dim);
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 1.3rem;
            color: var(--fg);
            text-shadow: 0 0 4px rgba(0,153,51,0.3);
        }
        .status { font-size: 0.9rem; font-weight: 600; }
        .status.ok { color: var(--accent); }
        .status.error { color: #cc2244; }
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1rem;
            min-height: calc(100vh - 160px);
        }
        @media (max-width: 900px) {
            .main-content { margin-left: 0; }
            .content-grid { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--dim);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
        }
        .panel h2 {
            font-size: 0.95rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
            color: var(--fg);
        }
        #topology {
            width: 100%;
            height: 100%;
            min-height: 400px;
            background: #fff;
            border-radius: 4px;
        }
        .node-list {
            list-style: none;
        }
        .node-list li {
            padding: 0.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .node-list li:hover {
            background: rgba(0, 153, 51, 0.08);
        }
        .role {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }
        .role.edge { background: rgba(51, 102, 153, 0.15); color: #336699; }
        .role.relay { background: rgba(153, 102, 51, 0.15); color: #996633; }
        .role.mesh-gate { background: rgba(0, 221, 68, 0.2); color: #006622; }
        .role.air-gapped { background: rgba(102, 51, 102, 0.15); color: #663366; }
        footer {
            margin-top: 1rem;
            padding: 0.5rem 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
            color: var(--fg);
        }
    </style>
</head>
<body class="crt-light">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" id="sidebar"></nav>

    <div class="main-content">
        <header>
            <h1>C3BOX — Mesh Topology</h1>
            <div class="status" id="status">Connecting...</div>
        </header>
        <div class="content-grid">
        <div class="panel">
            <h2>Mesh Topology</h2>
            <svg id="topology" viewBox="0 0 600 400">
                <!-- Topology will be rendered here -->
            </svg>
        </div>
        <div class="panel">
            <h2>Mesh Nodes</h2>
            <ul class="node-list" id="nodeList">
                <li>Loading...</li>
            </ul>
        </div>
        </div>
        <footer>
            <span>CyberMind — SecuBox-Deb — 2026</span>
            <span id="meshGate">Mesh Gate: —</span>
        </footer>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api';

        async function fetchTopology() {
            try {
                const resp = await fetch(`${API}/mesh/topology`);
                const data = await resp.json();
                renderTopology(data);
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status ok';
                if (data.mesh_gate) {
                    document.getElementById('meshGate').textContent = `Mesh Gate: ${data.mesh_gate}`;
                }
            } catch (err) {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status error';
            }
        }

        async function fetchNodes() {
            try {
                const resp = await fetch(`${API}/mesh/nodes`);
                const nodes = await resp.json();
                renderNodes(nodes);
            } catch (err) {
                console.error('Failed to fetch nodes:', err);
            }
        }

        function renderTopology(data) {
            const svg = document.getElementById('topology');
            svg.innerHTML = '';

            // Draw edges
            for (const edge of data.edges || []) {
                const source = data.nodes.find(n => n.id === edge.source);
                const target = data.nodes.find(n => n.id === edge.target);
                if (source && target) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', source.x);
                    line.setAttribute('y1', source.y);
                    line.setAttribute('x2', target.x);
                    line.setAttribute('y2', target.y);
                    line.setAttribute('stroke', '#009933');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('opacity', '0.6');
                    svg.appendChild(line);
                }
            }

            // Draw nodes
            for (const node of data.nodes || []) {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('transform', `translate(${node.x}, ${node.y})`);

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('r', node.id === data.mesh_gate ? '15' : '10');
                circle.setAttribute('fill', node.role === 'relay' ? '#996633' : '#336699');
                circle.setAttribute('stroke', node.id === data.mesh_gate ? '#00dd44' : '#009933');
                circle.setAttribute('stroke-width', '2');

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('y', '25');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', '#1b3d1c');
                text.setAttribute('font-size', '10');
                text.setAttribute('font-family', 'JetBrains Mono, Courier New, monospace');
                text.textContent = node.id.split(':').pop().slice(0, 8);

                g.appendChild(circle);
                g.appendChild(text);
                svg.appendChild(g);
            }
        }

        function renderNodes(nodes) {
            const list = document.getElementById('nodeList');
            list.innerHTML = '';

            for (const node of nodes) {
                const li = document.createElement('li');
                const roleClass = node.role || 'unknown';
                li.innerHTML = `
                    <strong>${node.did.split(':').pop().slice(0, 12)}...</strong>
                    <span class="role ${roleClass}">${node.role}</span>
                    <br>
                    <small>${node.address} — ${node.last_seen}</small>
                `;
                list.appendChild(li);
            }
        }

        // Initial load
        fetchTopology();
        fetchNodes();

        // Refresh every 10 seconds
        setInterval(() => {
            fetchTopology();
            fetchNodes();
        }, 10000);
    </script>
</body>
</html>
