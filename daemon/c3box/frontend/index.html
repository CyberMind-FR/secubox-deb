<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C3BOX — SecuBox Mesh Dashboard</title>
    <style>
        :root {
            --bg: #0a0e14;
            --fg: #33ff66;
            --dim: #1a1f2e;
            --accent: #00ff88;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
        }
        header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            font-size: 1.5rem;
            text-shadow: 0 0 10px var(--fg);
        }
        .status { font-size: 0.9rem; }
        .status.ok { color: var(--accent); }
        .status.error { color: #ff3366; }
        main {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1rem;
            padding: 1rem;
            height: calc(100vh - 60px);
        }
        .panel {
            background: var(--dim);
            border: 1px solid var(--fg);
            border-radius: 4px;
            padding: 1rem;
        }
        .panel h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--fg);
        }
        #topology {
            width: 100%;
            height: 100%;
            min-height: 400px;
        }
        .node-list {
            list-style: none;
        }
        .node-list li {
            padding: 0.5rem;
            border-bottom: 1px solid var(--dim);
            font-size: 0.85rem;
        }
        .node-list li:hover {
            background: rgba(51, 255, 102, 0.1);
        }
        .role {
            display: inline-block;
            padding: 0.1rem 0.4rem;
            border-radius: 2px;
            font-size: 0.75rem;
            margin-left: 0.5rem;
        }
        .role.edge { background: #336699; }
        .role.relay { background: #996633; }
        .role.mesh-gate { background: var(--accent); color: #000; }
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 0.5rem 2rem;
            background: var(--dim);
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <header>
        <h1>C3BOX</h1>
        <div class="status" id="status">Connecting...</div>
    </header>
    <main>
        <div class="panel">
            <h2>Mesh Topology</h2>
            <svg id="topology" viewBox="0 0 600 400">
                <!-- Topology will be rendered here -->
            </svg>
        </div>
        <div class="panel">
            <h2>Mesh Nodes</h2>
            <ul class="node-list" id="nodeList">
                <li>Loading...</li>
            </ul>
        </div>
    </main>
    <footer>
        <span>CyberMind — SecuBox-Deb</span>
        <span id="meshGate">Mesh Gate: —</span>
    </footer>

    <script>
        const API = '/api';

        async function fetchTopology() {
            try {
                const resp = await fetch(`${API}/mesh/topology`);
                const data = await resp.json();
                renderTopology(data);
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status ok';
                if (data.mesh_gate) {
                    document.getElementById('meshGate').textContent = `Mesh Gate: ${data.mesh_gate}`;
                }
            } catch (err) {
                document.getElementById('status').textContent = 'Disconnected';
                document.getElementById('status').className = 'status error';
            }
        }

        async function fetchNodes() {
            try {
                const resp = await fetch(`${API}/mesh/nodes`);
                const nodes = await resp.json();
                renderNodes(nodes);
            } catch (err) {
                console.error('Failed to fetch nodes:', err);
            }
        }

        function renderTopology(data) {
            const svg = document.getElementById('topology');
            svg.innerHTML = '';

            // Draw edges
            for (const edge of data.edges || []) {
                const source = data.nodes.find(n => n.id === edge.source);
                const target = data.nodes.find(n => n.id === edge.target);
                if (source && target) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', source.x);
                    line.setAttribute('y1', source.y);
                    line.setAttribute('x2', target.x);
                    line.setAttribute('y2', target.y);
                    line.setAttribute('stroke', '#33ff66');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('opacity', '0.5');
                    svg.appendChild(line);
                }
            }

            // Draw nodes
            for (const node of data.nodes || []) {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('transform', `translate(${node.x}, ${node.y})`);

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('r', node.id === data.mesh_gate ? '15' : '10');
                circle.setAttribute('fill', node.role === 'relay' ? '#996633' : '#336699');
                circle.setAttribute('stroke', node.id === data.mesh_gate ? '#00ff88' : '#33ff66');
                circle.setAttribute('stroke-width', '2');

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('y', '25');
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('fill', '#33ff66');
                text.setAttribute('font-size', '10');
                text.textContent = node.id.split(':').pop().slice(0, 8);

                g.appendChild(circle);
                g.appendChild(text);
                svg.appendChild(g);
            }
        }

        function renderNodes(nodes) {
            const list = document.getElementById('nodeList');
            list.innerHTML = '';

            for (const node of nodes) {
                const li = document.createElement('li');
                const roleClass = node.role || 'unknown';
                li.innerHTML = `
                    <strong>${node.did.split(':').pop().slice(0, 12)}...</strong>
                    <span class="role ${roleClass}">${node.role}</span>
                    <br>
                    <small>${node.address} — ${node.last_seen}</small>
                `;
                list.appendChild(li);
            }
        }

        // Initial load
        fetchTopology();
        fetchNodes();

        // Refresh every 10 seconds
        setInterval(() => {
            fetchTopology();
            fetchNodes();
        }, 10000);
    </script>
</body>
</html>
