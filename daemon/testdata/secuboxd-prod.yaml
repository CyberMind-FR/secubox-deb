# SecuBox Mesh Daemon Production Configuration
# CyberMind — SecuBox-Deb — 2026

node:
  role: edge                    # edge | relay | air-gapped
  did: ""                       # auto-generated if empty
  keypair: /var/lib/secuboxd/node.key

mesh:
  transport: wireguard
  subnet: 10.42.0.0/16
  mdns_service: _secubox._udp
  beacon_interval: 30           # seconds
  peer_timeout: 120             # seconds

tailscale:
  enabled: false
  authkey: ""

telemetry:
  interval: 60                  # seconds
  c3box_socket: /run/secuboxd/telemetry.sock
  db: /var/lib/secuboxd/telemetry.db

zkp:
  enabled: true
  rotation_hours: 24
  hamiltonian_graph: /etc/secubox/hamgraph.json
