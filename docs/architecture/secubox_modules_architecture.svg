<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="720" viewBox="0 0 800 720"
     style="background:#FFFFFF; font-family: 'Space Grotesk', 'JetBrains Mono', sans-serif;">

  <defs>
    <!-- Lateral band gradient ROOT→MESH→MIND (left 6px) -->
    <linearGradient id="lateral" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0A5840"/>
      <stop offset="50%"  stop-color="#104A88"/>
      <stop offset="100%" stop-color="#3D35A0"/>
    </linearGradient>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#6B6963" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Lateral band 6px (ROOT→MESH→MIND) -->
  <rect x="0" y="0" width="6" height="720" fill="url(#lateral)"/>

  <!-- Background surface -->
  <rect x="6" y="0" width="794" height="720" fill="#FFFFFF"/>

  <!-- Header -->
  <text x="400" y="30" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="600"
        fill="#1A1A18">SecuBox-Deb — Architecture des 6 Modules</text>
  <text x="400" y="48" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="10"
        fill="#6B6963">v1.5.0 · Debian · ANSSI CSPN · 6 Domaines Fonctionnels</text>

  <!-- ══════════════════════════════════════════
       ROW 1: WALL (Périmètre)
  ══════════════════════════════════════════ -->
  <rect x="40" y="68" width="720" height="90" rx="10"
        fill="#FFFAEE" stroke="#9A6010" stroke-width="1.2"/>

  <!-- WALL Title -->
  <rect x="50" y="74" width="80" height="24" rx="4" fill="#9A6010"/>
  <text x="90" y="90" text-anchor="middle" fill="#FFFFFF"
        font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">WALL</text>
  <text x="145" y="90"
        font-family="'JetBrains Mono', monospace" font-size="10" fill="#7A4A08">
    Défense périmétrique · WAF · Firewall</text>

  <!-- WALL Modules -->
  <rect x="60" y="104" width="130" height="44" rx="6" fill="#FFF7E0" stroke="#9A6010" stroke-width="0.8"/>
  <text x="125" y="122" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#9A6010">CrowdSec</text>
  <text x="125" y="138" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A4A08">IDS/IPS collaboratif</text>

  <rect x="200" y="104" width="130" height="44" rx="6" fill="#FFF7E0" stroke="#9A6010" stroke-width="0.8"/>
  <text x="265" y="122" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#9A6010">HAProxy</text>
  <text x="265" y="138" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A4A08">WAF · TLS 1.3</text>

  <rect x="340" y="104" width="130" height="44" rx="6" fill="#FFF7E0" stroke="#9A6010" stroke-width="0.8"/>
  <text x="405" y="122" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#9A6010">DNS</text>
  <text x="405" y="138" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A4A08">Unbound filtrant</text>

  <rect x="480" y="104" width="130" height="44" rx="6" fill="#FFF7E0" stroke="#9A6010" stroke-width="0.8"/>
  <text x="545" y="122" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#9A6010">NAC</text>
  <text x="545" y="138" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A4A08">Network Access</text>

  <rect x="620" y="104" width="130" height="44" rx="6" fill="#FFF7E0" stroke="#9A6010" stroke-width="0.8"/>
  <text x="685" y="122" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#9A6010">VHost</text>
  <text x="685" y="138" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7A4A08">Virtual Hosts</text>

  <!-- Arrow WALL → MIND -->
  <line x1="400" y1="158" x2="400" y2="172" stroke="#6B6963" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       ROW 2: MIND (Analyse)
  ══════════════════════════════════════════ -->
  <rect x="40" y="176" width="720" height="90" rx="10"
        fill="#EEEDFE" stroke="#3D35A0" stroke-width="1.2"/>

  <!-- MIND Title -->
  <rect x="50" y="182" width="80" height="24" rx="4" fill="#3D35A0"/>
  <text x="90" y="198" text-anchor="middle" fill="#FFFFFF"
        font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">MIND</text>
  <text x="145" y="198"
        font-family="'JetBrains Mono', monospace" font-size="10" fill="#534AB7">
    Intelligence · DPI · Analyse</text>

  <!-- MIND Modules -->
  <rect x="60" y="212" width="160" height="44" rx="6" fill="#E8E7FB" stroke="#3D35A0" stroke-width="0.8"/>
  <text x="140" y="230" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#3D35A0">DPI</text>
  <text x="140" y="246" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#534AB7">nDPId + netifyd dual</text>

  <rect x="230" y="212" width="160" height="44" rx="6" fill="#E8E7FB" stroke="#3D35A0" stroke-width="0.8"/>
  <text x="310" y="230" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#3D35A0">Netdata</text>
  <text x="310" y="246" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#534AB7">Monitoring temps réel</text>

  <rect x="400" y="212" width="160" height="44" rx="6" fill="#E8E7FB" stroke="#3D35A0" stroke-width="0.8"/>
  <text x="480" y="230" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#3D35A0">Reporter</text>
  <text x="480" y="246" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#534AB7">Rapports · Alertes</text>

  <rect x="570" y="212" width="180" height="44" rx="6" fill="#E8E7FB" stroke="#3D35A0" stroke-width="0.8"/>
  <text x="660" y="230" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#3D35A0">MediaFlow</text>
  <text x="660" y="246" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#534AB7">Analyse flux média</text>

  <!-- Arrow MIND → MESH/AUTH -->
  <line x1="400" y1="266" x2="400" y2="280" stroke="#6B6963" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       ROW 3: MESH (left) + AUTH (right)
  ══════════════════════════════════════════ -->
  <!-- MESH Container -->
  <rect x="40" y="284" width="350" height="130" rx="10"
        fill="#E6F1FB" stroke="#104A88" stroke-width="1.2"/>

  <!-- MESH Title -->
  <rect x="50" y="290" width="80" height="24" rx="4" fill="#104A88"/>
  <text x="90" y="306" text-anchor="middle" fill="#FFFFFF"
        font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">MESH</text>
  <text x="145" y="306"
        font-family="'JetBrains Mono', monospace" font-size="10" fill="#185FA5">
    Réseau · Transport</text>

  <!-- MESH Modules -->
  <rect x="55" y="320" width="100" height="40" rx="5" fill="#D9ECFA" stroke="#104A88" stroke-width="0.8"/>
  <text x="105" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#104A88">WireGuard</text>
  <text x="105" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#185FA5">VPN kernel</text>

  <rect x="165" y="320" width="100" height="40" rx="5" fill="#D9ECFA" stroke="#104A88" stroke-width="0.8"/>
  <text x="215" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#104A88">NetModes</text>
  <text x="215" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#185FA5">Bridge · Router</text>

  <rect x="275" y="320" width="100" height="40" rx="5" fill="#D9ECFA" stroke="#104A88" stroke-width="0.8"/>
  <text x="325" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#104A88">QoS</text>
  <text x="325" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#185FA5">tc HTB shaping</text>

  <rect x="55" y="365" width="100" height="40" rx="5" fill="#D9ECFA" stroke="#104A88" stroke-width="0.8"/>
  <text x="105" y="381" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#104A88">Routes</text>
  <text x="105" y="395" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#185FA5">Routage avancé</text>

  <rect x="165" y="365" width="100" height="40" rx="5" fill="#D9ECFA" stroke="#104A88" stroke-width="0.8"/>
  <text x="215" y="381" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#104A88">CDN</text>
  <text x="215" y="395" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#185FA5">Cache local</text>

  <!-- AUTH Container -->
  <rect x="410" y="284" width="350" height="130" rx="10"
        fill="#FFEEE8" stroke="#C04E24" stroke-width="1.2"/>

  <!-- AUTH Title -->
  <rect x="420" y="290" width="80" height="24" rx="4" fill="#C04E24"/>
  <text x="460" y="306" text-anchor="middle" fill="#FFFFFF"
        font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">AUTH</text>
  <text x="515" y="306"
        font-family="'JetBrains Mono', monospace" font-size="10" fill="#A03C18">
    Authentification · Identité</text>

  <!-- AUTH Modules -->
  <rect x="425" y="320" width="100" height="40" rx="5" fill="#FFE4DC" stroke="#C04E24" stroke-width="0.8"/>
  <text x="475" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#C04E24">Auth</text>
  <text x="475" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A03C18">OAuth2 · JWT</text>

  <rect x="535" y="320" width="100" height="40" rx="5" fill="#FFE4DC" stroke="#C04E24" stroke-width="0.8"/>
  <text x="585" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#C04E24">ZKP</text>
  <text x="585" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A03C18">GK·HAM-HASH</text>

  <rect x="645" y="320" width="100" height="40" rx="5" fill="#FFE4DC" stroke="#C04E24" stroke-width="0.8"/>
  <text x="695" y="336" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#C04E24">TURN</text>
  <text x="695" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A03C18">coturn STUN</text>

  <rect x="480" y="365" width="100" height="40" rx="5" fill="#FFE4DC" stroke="#C04E24" stroke-width="0.8"/>
  <text x="530" y="381" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="500" fill="#C04E24">Vault</text>
  <text x="530" y="395" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#A03C18">Secrets manager</text>

  <!-- Vertical connector MESH↔AUTH -->
  <text x="400" y="350" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#6B6963">↔</text>

  <!-- Arrow MESH/AUTH → ROOT -->
  <line x1="400" y1="414" x2="400" y2="428" stroke="#6B6963" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       ROW 4: ROOT (Système)
  ══════════════════════════════════════════ -->
  <rect x="40" y="432" width="720" height="90" rx="10"
        fill="#E1F5EE" stroke="#0A5840" stroke-width="1.2"/>

  <!-- ROOT Title -->
  <rect x="50" y="438" width="80" height="24" rx="4" fill="#0A5840"/>
  <text x="90" y="454" text-anchor="middle" fill="#FFFFFF"
        font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">ROOT</text>
  <text x="145" y="454"
        font-family="'JetBrains Mono', monospace" font-size="10" fill="#0F6E56">
    Système · Runtime · API</text>

  <!-- ROOT Modules -->
  <rect x="60" y="468" width="120" height="44" rx="6" fill="#D1EFE5" stroke="#0A5840" stroke-width="0.8"/>
  <text x="120" y="486" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#0A5840">Core</text>
  <text x="120" y="502" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0F6E56">Lib Python partagée</text>

  <rect x="190" y="468" width="120" height="44" rx="6" fill="#D1EFE5" stroke="#0A5840" stroke-width="0.8"/>
  <text x="250" y="486" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#0A5840">Hub</text>
  <text x="250" y="502" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0F6E56">Dashboard central</text>

  <rect x="320" y="468" width="120" height="44" rx="6" fill="#D1EFE5" stroke="#0A5840" stroke-width="0.8"/>
  <text x="380" y="486" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#0A5840">System</text>
  <text x="380" y="502" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0F6E56">Services · Logs</text>

  <rect x="450" y="468" width="120" height="44" rx="6" fill="#D1EFE5" stroke="#0A5840" stroke-width="0.8"/>
  <text x="510" y="486" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#0A5840">API</text>
  <text x="510" y="502" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0F6E56">FastAPI REST</text>

  <rect x="580" y="468" width="170" height="44" rx="6" fill="#D1EFE5" stroke="#0A5840" stroke-width="0.8"/>
  <text x="665" y="486" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#0A5840">UI-Manager</text>
  <text x="665" y="502" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#0F6E56">KUI · TUI · Console</text>

  <!-- Arrow ROOT → BOOT -->
  <line x1="400" y1="522" x2="400" y2="536" stroke="#6B6963" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════
       ROW 5: BOOT (Base)
  ══════════════════════════════════════════ -->
  <rect x="40" y="540" width="720" height="80" rx="10"
        fill="#FFF3EE" stroke="#803018" stroke-width="1.2"/>

  <!-- BOOT Title -->
  <rect x="50" y="546" width="80" height="24" rx="4" fill="#803018"/>
  <text x="90" y="562" text-anchor="middle" fill="#FFFFFF"
        font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">BOOT</text>
  <text x="145" y="562"
        font-family="'JetBrains Mono', monospace" font-size="10" fill="#9A4018">
    Hardware · Initialisation</text>

  <!-- BOOT Modules -->
  <rect x="60" y="576" width="200" height="36" rx="6" fill="#FFE8DC" stroke="#803018" stroke-width="0.8"/>
  <text x="160" y="598" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#803018">Plymouth</text>

  <rect x="280" y="576" width="200" height="36" rx="6" fill="#FFE8DC" stroke="#803018" stroke-width="0.8"/>
  <text x="380" y="598" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#803018">FirstBoot</text>

  <rect x="500" y="576" width="250" height="36" rx="6" fill="#FFE8DC" stroke="#803018" stroke-width="0.8"/>
  <text x="625" y="598" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500" fill="#803018">HW-Detect</text>

  <!-- ══════════════════════════════════════════
       FOOTER: Paires
  ══════════════════════════════════════════ -->
  <rect x="40" y="640" width="720" height="60" rx="10"
        fill="#FAFAF8" stroke="#E2E0D8" stroke-width="0.8"/>

  <text x="400" y="660" text-anchor="middle"
        font-family="'Space Grotesk', sans-serif" font-size="11" font-weight="500"
        fill="#6B6963">Paires asymétriques SecuBox</text>

  <text x="160" y="685" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="11" fill="#803018">BOOT ↔ ROOT</text>
  <text x="400" y="685" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="11" fill="#9A6010">WALL ↔ MIND</text>
  <text x="640" y="685" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="11" fill="#104A88">MESH ↔ AUTH</text>

  <!-- Watermark -->
  <text x="790" y="714" text-anchor="end"
        font-family="'Space Grotesk', sans-serif" font-size="9"
        fill="#B4B2A9">CyberMind © 2026</text>

</svg>
