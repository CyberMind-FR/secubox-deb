<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1"
     width="64" height="64" viewBox="0 0 64 64">
  <!--
    SecuBox Smart-Strip — Fritzing icon view (square thumbnail)
    Compact version showing 6 LEDs in charte color order on black PCB.
  -->
  <defs>
    <linearGradient id="icon-pcb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>

  <!-- Background tile (PCB look) -->
  <rect x="2" y="14" width="60" height="36" rx="4" ry="4"
        fill="url(#icon-pcb)" stroke="#000" stroke-width="0.8"/>

  <!-- Branding text -->
  <text x="32" y="22" font-family="Helvetica, Arial, sans-serif"
        font-size="4" text-anchor="middle" fill="#ececec" font-weight="600">
    SecuBox
  </text>

  <!-- 6 LEDs in charte order -->
  <g>
    <circle cx="9"  cy="32" r="3.2" fill="#C04E24" stroke="#000" stroke-width="0.3"/>
    <circle cx="19" cy="32" r="3.2" fill="#9A6010" stroke="#000" stroke-width="0.3"/>
    <circle cx="28" cy="32" r="3.2" fill="#803018" stroke="#000" stroke-width="0.3"/>
    <circle cx="37" cy="32" r="3.2" fill="#3D35A0" stroke="#000" stroke-width="0.3"/>
    <circle cx="46" cy="32" r="3.2" fill="#0A5840" stroke="#000" stroke-width="0.3"/>
    <circle cx="56" cy="32" r="3.2" fill="#104A88" stroke="#000" stroke-width="0.3"/>

    <!-- Subtle highlights -->
    <circle cx="8.2" cy="31.2" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="18.2" cy="31.2" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="27.2" cy="31.2" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="36.2" cy="31.2" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="45.2" cy="31.2" r="1" fill="#fff" opacity="0.4"/>
    <circle cx="55.2" cy="31.2" r="1" fill="#fff" opacity="0.4"/>
  </g>

  <!-- Touch pad strip below LEDs (gold) -->
  <g fill="#d8a850" stroke="#a08038" stroke-width="0.2">
    <rect x="6" y="38" width="6" height="3" rx="0.4"/>
    <rect x="16" y="38" width="6" height="3" rx="0.4"/>
    <rect x="25" y="38" width="6" height="3" rx="0.4"/>
    <rect x="34" y="38" width="6" height="3" rx="0.4"/>
    <rect x="43" y="38" width="6" height="3" rx="0.4"/>
    <rect x="53" y="38" width="6" height="3" rx="0.4"/>
  </g>

  <!-- Bottom label -->
  <text x="32" y="48" font-family="Helvetica, Arial, sans-serif"
        font-size="2.6" text-anchor="middle" fill="#888">
    SBX-STR-01 v1.1
  </text>

  <!-- "Smart-Strip" text below icon -->
  <text x="32" y="60" font-family="Helvetica, Arial, sans-serif"
        font-size="6" text-anchor="middle" fill="#2a2a2a" font-weight="600">
    Smart-Strip
  </text>
</svg>
