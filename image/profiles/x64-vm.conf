# ══════════════════════════════════════════════════════════════════
# SecuBox-DEB Build Profile: x64 VM
# Target: Virtual machines (QEMU, VirtualBox, VMware)
# ══════════════════════════════════════════════════════════════════

# Profile identification
PROFILE_NAME="x64-vm"
PROFILE_DESC="x86_64 Virtual Machine Image"
LOG_PREFIX="vm-x64"

# Architecture
TARGET_ARCH="amd64"
TARGET_KERNEL="linux-image-amd64"

# Image settings
IMAGE_NAME="secubox-vm-x64-${DEBIAN_RELEASE}.img"
IMAGE_SIZE="4G"
PARTITION_TYPE="efi"

# Feature flags
INCLUDE_KIOSK=0
INCLUDE_DESKTOP=0
INCLUDE_SLIPSTREAM=1

# Base packages (minimal for VM)
BASE_PACKAGES="
    linux-image-amd64
    grub-efi-amd64
    systemd
    systemd-sysv
    dbus
    openssh-server
    sudo
    curl
    wget
    ca-certificates
    gnupg
    nginx
    python3
    python3-pip
    python3-venv
    nftables
    iproute2
    netplan.io
    locales
    console-setup
"

# Additional packages for VM
EXTRA_PACKAGES="
    qemu-guest-agent
    open-vm-tools
    cloud-init
"

# Python packages (pip)
PIP_PACKAGES="
    fastapi
    uvicorn[standard]
    httpx
    python-jose
    toml
    pyyaml
"

# Bootloader
BOOTLOADER="grub-efi"
GRUB_DEFAULT="SecuBox GNU/Linux"

# Network configuration
NETWORK_TYPE="dhcp"
HOSTNAME_PREFIX="secubox-vm"

# Post-install hooks
post_install_hook() {
    local root="$1"

    # Enable serial console for headless operation
    run_chroot "$root" "systemctl enable serial-getty@ttyS0"

    # Configure cloud-init for VM provisioning
    if [[ -f "$root/etc/cloud/cloud.cfg" ]]; then
        sed -i 's/disable_root: true/disable_root: false/' "$root/etc/cloud/cloud.cfg"
    fi
}
