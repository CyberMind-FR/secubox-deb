<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - AI Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            --p31-peak: #00dd44; --p31-hot: #00ff55; --p31-mid: #009933; --p31-dim: #006622;
            --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7;
            --bg-dark: var(--tube-light); --bg-card: var(--tube-pale); --border: var(--tube-soft);
            --text: #1b3d1c; --text-dim: var(--p31-dim); --primary: var(--p31-peak);
            --danger: #ff4466; --warning: #ffb347; --purple: #a371f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; background: var(--bg-dark); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-value.purple { color: var(--purple); }
        .stat-value.warning { color: var(--warning); }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .status-badge { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 6px; font-weight: 600; }
        .status-badge.ok { background: rgba(0,221,68,0.2); color: var(--p31-mid); }
        .status-badge.error { background: rgba(255,68,102,0.2); color: var(--danger); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; background: var(--bg-dark); }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--bg-dark); border-radius: 6px; margin-bottom: 0.5rem; }
        .config-item label { font-weight: 600; }
        .config-item code { background: var(--bg-card); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.85rem; }
        @media (max-width: 768px) { .main { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
        <div class="header">
            <h1>🤖 AI Gateway</h1>
            <span class="badge">v1.0.0</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="total-requests">-</div>
                <div class="stat-label">Total Requests</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value purple" id="tokens-used">-</div>
                <div class="stat-label">Tokens Used</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔄</div>
                <div class="stat-value" id="cache-hits">-</div>
                <div class="stat-label">Cache Hits</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value warning" id="cost-estimate">-</div>
                <div class="stat-label">Est. Cost</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🟢 Service Status</h2>
                <button class="btn btn-sm" onclick="loadStatus()">Refresh</button>
            </div>
            <div id="status-display">
                <div class="status-badge ok">Loading...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>⚙️ Configuration</h2>
            </div>
            <div id="config-display">
                <div class="config-item">
                    <label>Offline Mode</label>
                    <code id="offline-mode">-</code>
                </div>
                <div class="config-item">
                    <label>Default Model</label>
                    <code id="default-model">-</code>
                </div>
                <div class="config-item">
                    <label>Rate Limit</label>
                    <code id="rate-limit">-</code>
                </div>
                <div class="config-item">
                    <label>Cache Enabled</label>
                    <code id="cache-enabled">-</code>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📋 Recent Requests</h2>
            </div>
            <table>
                <thead>
                    <tr><th>Time</th><th>Model</th><th>Tokens</th><th>Latency</th><th>Status</th></tr>
                </thead>
                <tbody id="requests-table">
                    <tr><td colspan="5" style="text-align:center;color:var(--text-dim);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/ai-gateway';

        async function api(path, method = 'GET') {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) };
            try {
                const res = await fetch(API + path, { method, headers });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch { return null; }
        }

        async function loadStatus() {
            const data = await api('/status');
            if (!data) return;

            const statusEl = document.getElementById('status-display');
            const isOk = data.status === 'ok';
            statusEl.innerHTML = `<div class="status-badge ${isOk ? 'ok' : 'error'}">
                ${isOk ? '✓' : '✗'} ${data.status?.toUpperCase() || 'UNKNOWN'} - ${data.module || 'ai-gateway'} v${data.version || '1.0.0'}
            </div>`;

            document.getElementById('offline-mode').textContent = data.offline_mode ? 'Yes' : 'No';
        }

        async function loadStats() {
            const data = await api('/stats');
            if (!data) return;

            document.getElementById('total-requests').textContent = (data.total_requests || 0).toLocaleString();
            document.getElementById('tokens-used').textContent = (data.tokens_used || 0).toLocaleString();
            document.getElementById('cache-hits').textContent = (data.cache_hits || 0).toLocaleString();
            document.getElementById('cost-estimate').textContent = '$' + (data.cost_estimate || 0).toFixed(2);
        }

        async function loadConfig() {
            const data = await api('/config');
            if (!data) return;

            document.getElementById('default-model').textContent = data.default_model || 'gpt-4';
            document.getElementById('rate-limit').textContent = (data.rate_limit || 60) + ' req/min';
            document.getElementById('cache-enabled').textContent = data.cache_enabled ? 'Yes' : 'No';
        }

        async function loadRequests() {
            const data = await api('/requests?limit=10');
            const tbody = document.getElementById('requests-table');
            if (!data?.requests?.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);">No recent requests</td></tr>';
                return;
            }
            tbody.innerHTML = data.requests.map(r => `
                <tr>
                    <td>${new Date(r.timestamp).toLocaleTimeString()}</td>
                    <td>${r.model || '-'}</td>
                    <td>${r.tokens || '-'}</td>
                    <td>${r.latency_ms || '-'}ms</td>
                    <td style="color:${r.success ? 'var(--primary)' : 'var(--danger)'};">${r.success ? '✓' : '✗'}</td>
                </tr>
            `).join('');
        }

        // Initial load
        loadStatus();
        loadStats();
        loadConfig();
        loadRequests();

        // Auto-refresh
        setInterval(() => { loadStatus(); loadStats(); }, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
