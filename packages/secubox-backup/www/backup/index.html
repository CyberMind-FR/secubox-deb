<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Backup Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #00dd44;
            --p31-hot: #00ff55;
            --p31-mid: #009933;
            --p31-dim: #006622;
            --p31-ghost: #003311;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-light: #e8f5e9;
            --tube-pale: #c8e6c9;
            --tube-soft: #a5d6a7;
            /* Legacy mappings */
            --bg-dark: var(--tube-light);
            --bg-card: var(--tube-pale);
            --bg-sidebar: var(--tube-black);
            --border: var(--tube-soft);
            --text: var(--tube-dark);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-light);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--tube-dark);
            display: flex;
            min-height: 100vh;
        }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .badge-blue { background: rgba(88,166,255,0.15); color: var(--primary); }
        .badge-green { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-purple { background: rgba(163,113,247,0.15); color: var(--purple); }
        .badge-cyan { background: rgba(0,212,255,0.15); color: var(--cyan); }

        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
        .btn:hover { background: var(--bg-dark); }
        .btn-green { background: rgba(63,185,80,0.15); border-color: var(--green); color: var(--green); }
        .btn-green:hover { background: rgba(63,185,80,0.25); }
        .btn-blue { background: rgba(88,166,255,0.15); border-color: var(--primary); color: var(--primary); }
        .btn-blue:hover { background: rgba(88,166,255,0.25); }
        .btn-red { background: rgba(248,81,73,0.15); border-color: var(--red); color: var(--red); }
        .btn-red:hover { background: rgba(248,81,73,0.25); }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
        .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }

        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        @media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } .grid-2 { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .grid-4 { grid-template-columns: 1fr; } .main { margin-left: 0; } }

        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }

        .actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        td { font-size: 0.875rem; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .status-running { color: var(--green); }
        .status-stopped { color: var(--text-dim); }

        .toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem 1.5rem; border-radius: 8px; background: var(--bg-card); border: 1px solid var(--border); z-index: 1000; animation: slideIn 0.3s; }
        .toast-success { border-color: var(--green); }
        .toast-error { border-color: var(--red); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-width: 500px; width: 90%; }
        .modal-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; padding: 2rem; color: var(--text-dim); }
        .mono { font-family: monospace; font-size: 0.8rem; }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--tube-soft);
            background: var(--tube-pale);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-pale);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-light);
            border: 1px solid var(--tube-soft);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-light); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>

    <main class="main">
        <header class="header">
            <h1>💾 Backup Manager <span class="badge badge-blue" id="backup-count">0 backups</span></h1>
            <button class="btn" onclick="refresh()">↻ Refresh</button>
        </header>

        <p style="color: var(--text-dim); margin-bottom: 1.5rem;">System backups, container snapshots, and configuration archives</p>

        <!-- Stats -->
        <div class="grid-4" id="stats-grid">
            <div class="stat-card">
                <div class="stat-value" style="color: var(--primary);" id="stat-backups">0</div>
                <div class="stat-label">Backups</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--cyan);" id="stat-containers">0</div>
                <div class="stat-label">Containers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--green);" id="stat-running">0</div>
                <div class="stat-label">Running</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--purple);" id="stat-storage">0</div>
                <div class="stat-label">Storage Used</div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="card">
            <div class="card-title">Quick Actions</div>
            <div class="actions">
                <button class="btn btn-green" onclick="createBackup('full')">📦 Full Backup</button>
                <button class="btn btn-blue" onclick="createBackup('config')">⚙️ Config Only</button>
                <button class="btn" onclick="createBackup('containers')">🐳 Containers Only</button>
                <button class="btn btn-red" onclick="cleanupBackups()">🗑️ Cleanup Old</button>
            </div>
        </div>

        <!-- Two Column Layout -->
        <div class="grid-2">
            <!-- Containers -->
            <div class="card">
                <div class="card-title">
                    <span>LXC Containers</span>
                    <span class="badge badge-cyan" id="container-badge">0 containers</span>
                </div>
                <div id="containers-table">
                    <div class="empty">Loading...</div>
                </div>
            </div>

            <!-- Backup History -->
            <div class="card">
                <div class="card-title">
                    <span>Backup History</span>
                    <span class="badge badge-purple" id="history-badge">0 files</span>
                </div>
                <div id="backups-table">
                    <div class="empty">Loading...</div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal" class="modal" style="display: none;"></div>
    <div id="toast"></div>

    <script>
        const API = '/api/v1/backup';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch (e) { console.error(e); return null; }
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<div class="toast toast-${type}">${msg}</div>`;
            setTimeout(() => toast.innerHTML = '', 3000);
        }

        function showModal(title, content) {
            document.getElementById('modal').innerHTML = `
                <div class="modal-content">
                    <div class="modal-title">${title}</div>
                    <div>${content}</div>
                </div>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function formatDate(ts) {
            if (!ts || ts === 0) return '-';
            return new Date(ts * 1000).toLocaleString();
        }

        let statusData = {};
        let backupsData = [];
        let containersData = [];

        async function loadStatus() {
            statusData = await api('/status') || {};
            document.getElementById('stat-storage').textContent = statusData.storage_used || '0';
            document.getElementById('stat-containers').textContent = statusData.container_count || 0;
        }

        async function loadBackups() {
            const data = await api('/list?type=all') || {};
            backupsData = data.backups || [];

            document.getElementById('stat-backups').textContent = backupsData.length;
            document.getElementById('backup-count').textContent = backupsData.length + ' backups';
            document.getElementById('history-badge').textContent = backupsData.length + ' files';

            if (backupsData.length === 0) {
                document.getElementById('backups-table').innerHTML = '<div class="empty">No backups found</div>';
                return;
            }

            const typeColors = { config: 'blue', containers: 'cyan', services: 'purple' };
            const rows = backupsData.slice(0, 15).map(b => `
                <tr>
                    <td class="mono">${b.file}</td>
                    <td><span class="badge badge-${typeColors[b.type] || 'blue'}">${b.type}</span></td>
                    <td style="color: var(--text-dim);">${b.size}</td>
                    <td style="color: var(--text-dim);">${formatDate(b.timestamp)}</td>
                </tr>
            `).join('');

            document.getElementById('backups-table').innerHTML = `
                <table>
                    <thead><tr><th>File</th><th>Type</th><th>Size</th><th>Date</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function loadContainers() {
            const data = await api('/containers') || {};
            containersData = data.containers || [];

            const running = containersData.filter(c => c.state === 'running').length;
            document.getElementById('stat-running').textContent = running;
            document.getElementById('container-badge').textContent = containersData.length + ' containers';

            if (containersData.length === 0) {
                document.getElementById('containers-table').innerHTML = '<div class="empty">No LXC containers found</div>';
                return;
            }

            const rows = containersData.map(c => `
                <tr>
                    <td style="font-weight: 600;">${c.name}</td>
                    <td class="status-${c.state}">${c.state === 'running' ? '● Running' : '○ Stopped'}</td>
                    <td style="color: var(--text-dim);">${c.size}</td>
                    <td style="color: var(--text-dim);">${c.backups}</td>
                    <td><button class="btn btn-blue btn-sm" onclick="backupContainer('${c.name}')">Backup</button></td>
                </tr>
            `).join('');

            document.getElementById('containers-table').innerHTML = `
                <table>
                    <thead><tr><th>Name</th><th>State</th><th>Size</th><th>Backups</th><th>Actions</th></tr></thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        async function createBackup(type) {
            showModal('Creating Backup', `<p><span class="spinner"></span> Creating ${type} backup...</p>`);

            const res = await api('/create', {
                method: 'POST',
                body: JSON.stringify({ type })
            });

            hideModal();

            if (res && res.code === 0) {
                showToast('Backup created successfully');
                refresh();
            } else {
                showToast(res?.output || 'Backup failed', 'error');
            }
        }

        async function backupContainer(name) {
            showModal('Backing Up Container', `<p><span class="spinner"></span> Backing up ${name}...</p>`);

            const res = await api('/container/backup', {
                method: 'POST',
                body: JSON.stringify({ name })
            });

            hideModal();

            if (res && res.code === 0) {
                showToast('Container backup created');
                refresh();
            } else {
                showToast(res?.output || 'Backup failed', 'error');
            }
        }

        async function cleanupBackups() {
            if (!confirm('Remove old backups? (keeps last 5 per type)')) return;

            const res = await api('/cleanup', { method: 'POST' });

            if (res && res.code === 0) {
                showToast(`Removed ${res.removed?.length || 0} old backups`);
                refresh();
            } else {
                showToast('Cleanup failed', 'error');
            }
        }

        async function refresh() {
            await Promise.all([loadStatus(), loadBackups(), loadContainers()]);
        }

        // Close modal on click outside
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') hideModal();
        });

        refresh();
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
