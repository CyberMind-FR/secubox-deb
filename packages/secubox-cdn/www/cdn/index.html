<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - CDN Cache</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-system.css">
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #33ff66;
            --p31-hot: #66ffaa;
            --p31-mid: #22cc44;
            --p31-dim: #0f8822;
            --p31-ghost: #052210;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-black: #050803;
            --tube-deep: #080d05;
            --tube-bezel: #0d1208;
            /* Legacy mappings */
            --bg-dark: var(--tube-black);
            --bg-card: var(--tube-deep);
            --bg-sidebar: var(--tube-black);
            --border: var(--p31-ghost);
            --text: var(--p31-mid);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-black);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--p31-mid);
            display: flex;
            min-height: 100vh;
        }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .btn-group { display: flex; gap: 0.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--cyan); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.hit .value { color: var(--green); }
        .stat-card.miss .value { color: var(--yellow); }
        .stat-card.size .value { color: var(--cyan); }
        .stat-card.peers .value { color: var(--purple); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; }
        .progress { background: var(--bg-dark); border-radius: 4px; height: 8px; overflow: hidden; width: 100px; display: inline-block; }
        .progress-bar { height: 100%; background: var(--green); }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge.online { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.offline { background: rgba(139,148,158,0.2); color: var(--text-dim); }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--p31-ghost);
            background: var(--tube-deep);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-deep);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-black);
            border: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-black); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>💾 CDN Cache</h1>
            <div class="btn-group">
                <button class="btn" onclick="refresh()">Refresh</button>
                <button class="btn danger" onclick="clearCache()">Clear Cache</button>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card hit">
                <div class="value" id="hitRate">-</div>
                <div class="label">Hit Rate %</div>
            </div>
            <div class="stat-card size">
                <div class="value" id="cacheSize">-</div>
                <div class="label">Cache Size</div>
            </div>
            <div class="stat-card miss">
                <div class="value" id="objects">-</div>
                <div class="label">Cached Objects</div>
            </div>
            <div class="stat-card peers">
                <div class="value" id="peers">-</div>
                <div class="label">Mesh Peers</div>
            </div>
        </div>

        <div class="card">
            <h2>Cache Statistics</h2>
            <table>
                <thead><tr><th>Metric</th><th>Value</th><th>Graph</th></tr></thead>
                <tbody id="statsTable"><tr><td colspan="3">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>P2P Mesh Peers</h2>
            <table>
                <thead><tr><th>Peer</th><th>IP</th><th>Objects</th><th>Status</th><th>Latency</th></tr></thead>
                <tbody id="peersTable"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Top Cached Domains</h2>
            <table>
                <thead><tr><th>Domain</th><th>Requests</th><th>Bandwidth Saved</th></tr></thead>
                <tbody id="domainsTable"><tr><td colspan="3">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        const API = '/api/v1/cdn';

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { credentials: 'include', ...opts });
                return res.json();
            } catch { return {}; }
        }

        async function refresh() {
            const status = await api('/status');
            document.getElementById('hitRate').textContent = (status.hit_rate || 0).toFixed(1);
            document.getElementById('cacheSize').textContent = status.cache_size || '0 MB';
            document.getElementById('objects').textContent = status.objects || 0;
            document.getElementById('peers').textContent = status.mesh_peers || 0;

            // Stats table
            const statsBody = document.getElementById('statsTable');
            const stats = [
                { name: 'Cache Hits', value: status.hits || 0, percent: status.hit_rate || 0 },
                { name: 'Cache Misses', value: status.misses || 0, percent: 100 - (status.hit_rate || 0) },
                { name: 'Bandwidth Saved', value: status.bandwidth_saved || '0 MB', percent: 0 },
            ];
            statsBody.innerHTML = stats.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.value}</td>
                    <td>${s.percent > 0 ? `<div class="progress"><div class="progress-bar" style="width:${s.percent}%"></div></div>` : '-'}</td>
                </tr>
            `).join('');

            // Mesh peers
            const mesh = await api('/mesh/peers');
            const peersBody = document.getElementById('peersTable');
            if (mesh.peers && mesh.peers.length > 0) {
                peersBody.innerHTML = mesh.peers.map(p => `
                    <tr>
                        <td>${p.name || p.id}</td>
                        <td style="font-family:monospace">${p.ip}</td>
                        <td>${p.objects || 0}</td>
                        <td><span class="badge ${p.online ? 'online' : 'offline'}">${p.online ? 'Online' : 'Offline'}</span></td>
                        <td>${p.latency || '-'}</td>
                    </tr>
                `).join('');
            } else {
                peersBody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No mesh peers connected</td></tr>';
            }

            // Top domains
            const domains = await api('/domains');
            const domainsBody = document.getElementById('domainsTable');
            if (domains.domains && domains.domains.length > 0) {
                domainsBody.innerHTML = domains.domains.slice(0, 10).map(d => `
                    <tr>
                        <td>${d.domain}</td>
                        <td>${d.requests}</td>
                        <td>${d.saved || '-'}</td>
                    </tr>
                `).join('');
            } else {
                domainsBody.innerHTML = '<tr><td colspan="3" style="color:var(--text-dim)">No cached domains</td></tr>';
            }
        }

        async function clearCache() {
            if (!confirm('Clear all cache? This cannot be undone.')) return;
            await api('/clear', { method: 'POST' });
            refresh();
        }

        refresh();
        setInterval(refresh, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
