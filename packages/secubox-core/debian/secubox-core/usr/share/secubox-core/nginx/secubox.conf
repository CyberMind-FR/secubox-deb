# /etc/nginx/sites-available/secubox
# Généré par secubox-core postinst — ne pas modifier manuellement
# Régénérer avec : secubox-admin nginx-regen

# ── HTTPS Frontend ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name secubox.local _;

    ssl_certificate     /etc/secubox/tls/cert.pem;
    ssl_certificate_key /etc/secubox/tls/key.pem;
    ssl_protocols       TLSv1.3 TLSv1.2;
    ssl_ciphers         ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    # ── Fichiers statiques (htdocs conservés depuis luci-app-*) ──
    root /usr/share/secubox/www;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # ── API endpoints (Unix sockets par module) ──

    location /api/v1/hub/ {
        proxy_pass http://unix:/run/secubox/hub.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/crowdsec/ {
        proxy_pass http://unix:/run/secubox/crowdsec.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/netdata/ {
        proxy_pass http://unix:/run/secubox/netdata.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/wireguard/ {
        proxy_pass http://unix:/run/secubox/wireguard.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/dpi/ {
        proxy_pass http://unix:/run/secubox/dpi.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/netmodes/ {
        proxy_pass http://unix:/run/secubox/netmodes.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/nac/ {
        proxy_pass http://unix:/run/secubox/nac.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/auth/ {
        proxy_pass http://unix:/run/secubox/auth.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/qos/ {
        proxy_pass http://unix:/run/secubox/qos.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/mediaflow/ {
        proxy_pass http://unix:/run/secubox/mediaflow.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/cdn/ {
        proxy_pass http://unix:/run/secubox/cdn.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/vhost/ {
        proxy_pass http://unix:/run/secubox/vhost.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    location /api/v1/system/ {
        proxy_pass http://unix:/run/secubox/system.sock:/;
        include /etc/nginx/snippets/secubox-proxy.conf;
    }

    # ── Health check (pas d'auth) ──
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}

# ── Redirect HTTP → HTTPS ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;
    return 301 https://$host$request_uri;
}
