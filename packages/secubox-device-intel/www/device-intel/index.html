<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Device Intelligence</title>
    <link rel="stylesheet" href="/shared/crt-system.css">
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root {
            --p31-peak: #33ff66; --p31-hot: #66ffaa; --p31-mid: #22cc44; --p31-dim: #0f8822; --p31-ghost: #052210;
            --p31-decay: #ffb347; --p31-decay-dim: #cc7722;
            --tube-black: #050803; --tube-deep: #080d05; --tube-bezel: #0d1208;
            --bg-dark: var(--tube-black); --bg-card: var(--tube-deep); --bg-sidebar: var(--tube-black);
            --border: var(--p31-ghost); --text: var(--p31-mid); --text-dim: var(--p31-dim);
            --primary: var(--p31-peak); --cyan: var(--p31-peak); --green: var(--p31-peak);
            --red: var(--p31-decay); --yellow: var(--p31-decay); --purple: var(--p31-hot);
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-black); color: var(--p31-mid); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .header h1 { font-size: 1.5rem; }
        .header-actions { display: flex; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.online .value { color: var(--green); }
        .stat-card.trusted .value { color: var(--cyan); }
        .stat-card.tagged .value { color: var(--purple); }
        .stat-card.total .value { color: var(--primary); }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .badge.online { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.stale { background: rgba(210,153,34,0.2); color: var(--yellow); }
        .badge.offline { background: rgba(248,81,73,0.2); color: var(--red); }
        .badge.trusted { background: rgba(0,212,255,0.2); color: var(--cyan); }
        .tag { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.7rem; background: rgba(163,113,247,0.2); color: var(--purple); margin-right: 0.25rem; }
        .vendor { color: var(--text-dim); font-size: 0.8rem; }
        .actions { display: flex; gap: 0.5rem; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; width: 90%; max-width: 500px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1.1rem; }
        .close-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.875rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-box input { flex: 1; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>Device Intelligence</h1>
            <div class="header-actions">
                <select id="interfaceSelect" class="btn">
                    <option value="eth0">eth0</option>
                </select>
                <button class="btn primary" onclick="scanNetwork()">Scan Network</button>
                <button class="btn" onclick="refresh()">Refresh</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card online">
                <div class="value" id="statOnline">-</div>
                <div class="label">Online Devices</div>
            </div>
            <div class="stat-card total">
                <div class="value" id="statTotal">-</div>
                <div class="label">Known Devices</div>
            </div>
            <div class="stat-card trusted">
                <div class="value" id="statTrusted">-</div>
                <div class="label">Trusted</div>
            </div>
            <div class="stat-card tagged">
                <div class="value" id="statTagged">-</div>
                <div class="label">Tagged</div>
            </div>
        </div>

        <div class="card">
            <h2>Discovered Devices</h2>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by MAC, IP, hostname, vendor..." onkeyup="filterDevices()">
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Status</th>
                        <th>IP Address</th>
                        <th>MAC Address</th>
                        <th>Vendor</th>
                        <th>Hostname</th>
                        <th>Tags</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="devicesTable"></tbody>
            </table>
        </div>

        <!-- Device Detail Modal -->
        <div class="modal" id="deviceModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Device Details</h3>
                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>
                <div class="form-group">
                    <label>MAC Address</label>
                    <input type="text" id="modalMac" readonly>
                </div>
                <div class="form-group">
                    <label>IP Address</label>
                    <input type="text" id="modalIp" readonly>
                </div>
                <div class="form-group">
                    <label>Vendor</label>
                    <input type="text" id="modalVendor" readonly>
                </div>
                <div class="form-group">
                    <label>Hostname</label>
                    <input type="text" id="modalHostname" readonly>
                </div>
                <div class="form-group">
                    <label>First Seen</label>
                    <input type="text" id="modalFirstSeen" readonly>
                </div>
                <div class="form-group">
                    <label>Note</label>
                    <textarea id="modalNote" placeholder="Add a note about this device..."></textarea>
                </div>
                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="modalTags" placeholder="server, printer, iot...">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="modalTrusted"> Mark as Trusted
                    </label>
                </div>
                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <button class="btn" onclick="closeModal()">Cancel</button>
                    <button class="btn primary" onclick="saveDevice()">Save</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = '/api/v1/device-intel';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        let allDevices = [];
        let currentMac = null;

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/portal/login.html'; return {}; }
                if (!res.ok) return {};
                const text = await res.text();
                return text ? JSON.parse(text) : {};
            } catch { return {}; }
        }

        async function loadStats() {
            const d = await api('/stats');
            document.getElementById('statOnline').textContent = d.currently_online || 0;
            document.getElementById('statTotal').textContent = d.total_known || 0;
            document.getElementById('statTrusted').textContent = d.trusted_devices || 0;
            document.getElementById('statTagged').textContent = d.tagged_devices || 0;
        }

        async function loadInterfaces() {
            const d = await api('/interfaces');
            const select = document.getElementById('interfaceSelect');
            select.innerHTML = '';
            (d.interfaces || []).forEach(iface => {
                const opt = document.createElement('option');
                opt.value = iface.name;
                opt.textContent = iface.name;
                select.appendChild(opt);
            });
        }

        async function loadDevices() {
            const d = await api('/devices');
            allDevices = d.devices || [];
            renderDevices(allDevices);
        }

        function renderDevices(devices) {
            const tbody = document.getElementById('devicesTable');
            tbody.innerHTML = devices.map(dev => {
                const statusClass = dev.state === 'REACHABLE' ? 'online' : (dev.state === 'STALE' ? 'stale' : 'offline');
                const tags = (dev.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
                return `<tr>
                    <td><span class="badge ${statusClass}">${dev.state}</span>${dev.trusted ? ' <span class="badge trusted">Trusted</span>' : ''}</td>
                    <td>${dev.ip}</td>
                    <td><code>${dev.mac}</code></td>
                    <td class="vendor">${dev.vendor || 'Unknown'}</td>
                    <td>${dev.hostname || '-'}</td>
                    <td>${tags || '-'}</td>
                    <td class="actions">
                        <button class="btn btn-sm" onclick="editDevice('${dev.mac}')">Edit</button>
                        <button class="btn btn-sm ${dev.trusted ? '' : 'success'}" onclick="toggleTrust('${dev.mac}', ${!dev.trusted})">${dev.trusted ? 'Untrust' : 'Trust'}</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function filterDevices() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allDevices.filter(d =>
                d.mac.toLowerCase().includes(q) ||
                d.ip.includes(q) ||
                (d.vendor || '').toLowerCase().includes(q) ||
                (d.hostname || '').toLowerCase().includes(q) ||
                (d.tags || []).some(t => t.toLowerCase().includes(q))
            );
            renderDevices(filtered);
        }

        async function scanNetwork() {
            const iface = document.getElementById('interfaceSelect').value;
            const d = await api('/scan?interface=' + iface, { method: 'POST' });
            if (d.success) {
                alert(`Scan complete. Found ${d.devices_found} devices.`);
                refresh();
            }
        }

        async function editDevice(mac) {
            currentMac = mac;
            const d = await api('/device/' + encodeURIComponent(mac));
            document.getElementById('modalMac').value = d.mac || mac;
            document.getElementById('modalIp').value = d.ip || '';
            document.getElementById('modalVendor').value = d.vendor || 'Unknown';
            document.getElementById('modalHostname').value = d.hostname || '';
            document.getElementById('modalFirstSeen').value = d.first_seen ? new Date(d.first_seen).toLocaleString() : '-';
            document.getElementById('modalNote').value = d.note || '';
            document.getElementById('modalTags').value = (d.tags || []).join(', ');
            document.getElementById('modalTrusted').checked = d.trusted || false;
            document.getElementById('deviceModal').classList.add('active');
        }

        async function saveDevice() {
            const note = document.getElementById('modalNote').value;
            const tags = document.getElementById('modalTags').value.split(',').map(t => t.trim()).filter(t => t);
            const trusted = document.getElementById('modalTrusted').checked;

            await api('/device/note', { method: 'POST', body: JSON.stringify({ mac: currentMac, note }) });
            await api('/device/tags', { method: 'POST', body: JSON.stringify({ mac: currentMac, tags }) });
            await api('/device/' + encodeURIComponent(currentMac) + '/trust?trusted=' + trusted, { method: 'POST' });

            closeModal();
            refresh();
        }

        async function toggleTrust(mac, trusted) {
            await api('/device/' + encodeURIComponent(mac) + '/trust?trusted=' + trusted, { method: 'POST' });
            refresh();
        }

        function closeModal() {
            document.getElementById('deviceModal').classList.remove('active');
            currentMac = null;
        }

        function refresh() {
            loadStats();
            loadDevices();
        }

        loadInterfaces();
        refresh();
    </script>
</body>
</html>
