<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - DNS Guard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --p31-peak: #00dd44; --p31-mid: #009933; --p31-dim: #006622; --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7; --bg-card: var(--tube-pale); --border: var(--tube-soft); --text: #1b3d1c; --text-dim: var(--p31-dim); --primary: var(--p31-peak); --danger: #ff4466; --warning: #ffb347; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; background: var(--tube-light); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-value.danger { color: var(--danger); }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn:hover { background: var(--tube-light); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; background: var(--tube-light); }
        .input-row { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .input-row input { flex: 1; padding: 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: var(--tube-light); color: var(--text); font-family: inherit; }
        .threat-type { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .threat-type.malware { background: rgba(255,68,102,0.2); color: var(--danger); }
        .threat-type.phishing { background: rgba(255,179,71,0.2); color: #996600; }
        .threat-type.c2 { background: rgba(139,0,0,0.2); color: #8b0000; }
        .threat-type.dga { background: rgba(128,0,128,0.2); color: purple; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) { .main { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
        <div class="header">
            <h1>🌐 DNS Guard</h1>
            <span class="badge">v1.0.0</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="queries-24h">-</div>
                <div class="stat-label">Queries (24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚫</div>
                <div class="stat-value danger" id="blocked-24h">-</div>
                <div class="stat-label">Blocked (24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🦠</div>
                <div class="stat-value danger" id="malware-blocked">-</div>
                <div class="stat-label">Malware Blocked</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎣</div>
                <div class="stat-value" id="phishing-blocked">-</div>
                <div class="stat-label">Phishing Blocked</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📋</div>
                <div class="stat-value" id="blocklist-size">-</div>
                <div class="stat-label">Blocklist Size</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🔍 Check Domain</h2>
            </div>
            <div class="input-row">
                <input type="text" id="domain-input" placeholder="Enter domain to check (e.g., example.com)">
                <button class="btn btn-primary" onclick="checkDomain()">Check</button>
            </div>
            <div id="check-result"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🚨 Recent Threats</h2>
                <button class="btn btn-sm" onclick="loadThreats()">Refresh</button>
            </div>
            <table>
                <thead>
                    <tr><th>Time</th><th>Domain</th><th>Type</th><th>Client</th><th>Actions</th></tr>
                </thead>
                <tbody id="threats-table">
                    <tr><td colspan="5" class="empty-state">No threats detected</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📈 Top Blocked Domains</h2>
            </div>
            <table>
                <thead>
                    <tr><th>Domain</th><th>Category</th><th>Hits</th></tr>
                </thead>
                <tbody id="top-blocked-table">
                    <tr><td colspan="3" class="empty-state">No data</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/dns-guard';

        async function api(path, method = 'GET', data = null) {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) };
            try {
                const res = await fetch(API + path, { method, headers, body: data ? JSON.stringify(data) : null });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch { return null; }
        }

        async function loadStatus() {
            const data = await api('/status');
            if (!data) return;
            document.getElementById('queries-24h').textContent = (data.queries_24h || 0).toLocaleString();
            document.getElementById('blocked-24h').textContent = (data.blocked_24h || 0).toLocaleString();
            document.getElementById('malware-blocked').textContent = data.malware_blocked || 0;
            document.getElementById('phishing-blocked').textContent = data.phishing_blocked || 0;
            document.getElementById('blocklist-size').textContent = (data.blocklist_size || 0).toLocaleString();
        }

        async function checkDomain() {
            const domain = document.getElementById('domain-input').value.trim();
            if (!domain) return;
            const data = await api(`/check/${encodeURIComponent(domain)}`);
            const result = document.getElementById('check-result');
            if (!data) { result.innerHTML = ''; return; }
            if (data.blocked) {
                result.innerHTML = `<div style="padding:1rem;background:rgba(255,68,102,0.1);border:1px solid var(--danger);border-radius:6px;margin-top:1rem;">
                    <strong style="color:var(--danger);">🚫 BLOCKED</strong><br>
                    Domain: ${data.domain}<br>
                    Category: <span class="threat-type ${data.category?.toLowerCase()}">${data.category}</span><br>
                    Reason: ${data.reason || 'Threat intelligence match'}
                </div>`;
            } else {
                result.innerHTML = `<div style="padding:1rem;background:rgba(0,221,68,0.1);border:1px solid var(--primary);border-radius:6px;margin-top:1rem;">
                    <strong style="color:var(--primary);">✅ ALLOWED</strong><br>
                    Domain: ${data.domain}<br>
                    This domain is not in the blocklist
                </div>`;
            }
        }

        async function loadThreats() {
            const data = await api('/threats?limit=20');
            const tbody = document.getElementById('threats-table');
            if (!data?.threats?.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No threats detected</td></tr>';
                return;
            }
            tbody.innerHTML = data.threats.map(t => `
                <tr>
                    <td>${new Date(t.timestamp).toLocaleString()}</td>
                    <td><code>${t.domain}</code></td>
                    <td><span class="threat-type ${t.type?.toLowerCase()}">${t.type}</span></td>
                    <td>${t.client_ip || '-'}</td>
                    <td><button class="btn btn-sm" onclick="allowDomain('${t.domain}')">Allow</button></td>
                </tr>
            `).join('');
        }

        async function loadTopBlocked() {
            const data = await api('/top-blocked?limit=10');
            const tbody = document.getElementById('top-blocked-table');
            if (!data?.domains?.length) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state">No data</td></tr>';
                return;
            }
            tbody.innerHTML = data.domains.map(d => `
                <tr>
                    <td><code>${d.domain}</code></td>
                    <td><span class="threat-type ${d.category?.toLowerCase()}">${d.category}</span></td>
                    <td>${d.hits.toLocaleString()}</td>
                </tr>
            `).join('');
        }

        async function allowDomain(domain) {
            if (!confirm(`Allow ${domain}?`)) return;
            await api('/allowlist', 'POST', { domain });
            loadThreats();
        }

        loadStatus();
        loadThreats();
        loadTopBlocked();
        setInterval(loadStatus, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
