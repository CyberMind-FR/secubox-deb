# /etc/nginx/secubox.d/domoticz.conf
# Installed by secubox-domoticz -- auto-registered on install, removed on purge

# Static frontend
location /domoticz/ {
    alias /usr/share/secubox/www/domoticz/;
    index index.html;
    try_files $uri $uri/ /domoticz/index.html;
}

# API backend
location /api/v1/domoticz/ {
    proxy_pass http://unix:/run/secubox/domoticz.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
