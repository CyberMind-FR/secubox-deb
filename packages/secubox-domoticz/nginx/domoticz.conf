# SecuBox Domoticz - Nginx configuration
# Home automation system

location /domoticz/ {
    alias /usr/share/secubox/www/domoticz/;
    index index.html;
    try_files $uri $uri/ /domoticz/index.html;
}

location /api/v1/domoticz/ {
    proxy_pass http://unix:/run/secubox/domoticz.sock:/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Proxy to Domoticz web interface (when container is running)
location /domoticz/app/ {
    proxy_pass http://127.0.0.1:8084/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}
