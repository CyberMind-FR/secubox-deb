<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Droplet Publisher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-system.css">
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #33ff66;
            --p31-hot: #66ffaa;
            --p31-mid: #22cc44;
            --p31-dim: #0f8822;
            --p31-ghost: #052210;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-black: #050803;
            --tube-deep: #080d05;
            --tube-bezel: #0d1208;
            /* Legacy mappings */
            --bg-dark: var(--tube-black);
            --bg-card: var(--tube-deep);
            --bg-sidebar: var(--tube-black);
            --border: var(--p31-ghost);
            --text: var(--p31-mid);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-black);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--p31-mid);
            display: flex;
            min-height: 100vh;
        }
        .sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .logo span:nth-child(1) { color: var(--cyan); } .logo span:nth-child(2) { color: var(--red); } .logo span:nth-child(3) { color: var(--green); } .logo span:nth-child(4) { color: var(--yellow); }
        .nav-section { padding: 0.5rem 0; }
        .nav-section-title { padding: 0.5rem 1rem; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.1); color: var(--primary); border-left-color: var(--primary); }
        .main { flex: 1; margin-left: 220px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-card); }
        .header-title h1 { font-size: 1.5rem; font-weight: 600; }
        .header-actions { display: flex; gap: 0.75rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .content { padding: 1.5rem; }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-card .value { font-size: 2.5rem; font-weight: bold; margin-bottom: 0.25rem; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card.cyan .value { color: var(--cyan); }
        .stat-card.green .value { color: var(--green); }
        .stat-card.purple .value { color: var(--purple); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .card-header h2 { font-size: 1rem; font-weight: 600; }
        .droplet-table { width: 100%; border-collapse: collapse; }
        .droplet-table th { text-align: left; padding: 0.75rem; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .droplet-table td { padding: 0.75rem; border-bottom: 1px solid var(--border); }
        .badge { padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .badge.static { background: rgba(88,166,255,0.2); color: var(--primary); }
        .badge.streamlit { background: rgba(163,113,247,0.2); color: var(--purple); }
        .badge.enabled { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.disabled { background: rgba(139,148,158,0.2); color: var(--text-dim); }
        .upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .upload-zone:hover { border-color: var(--primary); background: rgba(88,166,255,0.05); }
        .upload-zone.dragover { border-color: var(--green); background: rgba(63,185,80,0.1); }
        input[type="file"] { display: none; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.875rem; }
        .form-group input { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-dark); color: var(--text); }
        @media (max-width: 900px) { .stats-row { grid-template-columns: 1fr; } .sidebar { display: none; } .main { margin-left: 0; } }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--p31-ghost);
            background: var(--tube-deep);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-deep);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-black);
            border: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-black); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>

    <main class="main">
        <header class="header">
            <div class="header-title"><h1>Droplet Publisher</h1></div>
            <div class="header-actions">
                <button class="btn" onclick="refresh()">Refresh</button>
            </div>
        </header>

        <div class="content">
            <div class="stats-row">
                <div class="stat-card cyan">
                    <div class="value" id="total-count">-</div>
                    <div class="label">Total Droplets</div>
                </div>
                <div class="stat-card green">
                    <div class="value" id="sites-count">-</div>
                    <div class="label">Static Sites</div>
                </div>
                <div class="stat-card purple">
                    <div class="value" id="apps-count">-</div>
                    <div class="label">Streamlit Apps</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><h2>Upload New Droplet</h2></div>
                <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
                    <p>Drag & drop a file or click to browse</p>
                    <p style="color: var(--text-dim); font-size: 0.875rem; margin-top: 0.5rem;">Supports ZIP, HTML, or static site archives</p>
                </div>
                <input type="file" id="file-input" accept=".zip,.html,.tar.gz">
                <div class="form-group" style="margin-top: 1rem;">
                    <label>Name</label>
                    <input type="text" id="droplet-name" placeholder="my-site">
                </div>
                <div class="form-group">
                    <label>Domain (optional)</label>
                    <input type="text" id="droplet-domain" placeholder="Leave empty for default">
                </div>
                <button class="btn primary" onclick="uploadDroplet()" style="margin-top: 0.5rem;">Publish</button>
                <div id="upload-status" style="margin-top: 1rem;"></div>
            </div>

            <div class="card">
                <div class="card-header"><h2>Published Droplets</h2></div>
                <table class="droplet-table">
                    <thead>
                        <tr><th>Name</th><th>Domain</th><th>Type</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="droplet-list">
                        <tr><td colspan="5">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const API = '/api/v1/droplet';

        async function api(endpoint, options = {}) {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            try {
                const res = await fetch(API + endpoint, { ...options, headers });
                if (res.status === 401) { window.location = '/login.html'; return {}; }
                return res.json();
            } catch (e) { return {}; }
        }

        async function loadStatus() {
            const data = await api('/status');
            document.getElementById('sites-count').textContent = data.sites_count || 0;
            document.getElementById('apps-count').textContent = data.apps_count || 0;
        }

        async function loadDroplets() {
            const data = await api('/list');
            const list = document.getElementById('droplet-list');
            const droplets = data.droplets || [];

            document.getElementById('total-count').textContent = droplets.length;

            if (droplets.length === 0) {
                list.innerHTML = '<tr><td colspan="5" style="color: var(--text-dim);">No droplets published yet</td></tr>';
                return;
            }

            list.innerHTML = droplets.map(d => `
                <tr>
                    <td>${d.name}</td>
                    <td><a href="https://${d.domain}" target="_blank" style="color: var(--primary);">${d.domain}</a></td>
                    <td><span class="badge ${d.type}">${d.type}</span></td>
                    <td><span class="badge ${d.enabled ? 'enabled' : 'disabled'}">${d.enabled ? 'Enabled' : 'Disabled'}</span></td>
                    <td><button class="btn" onclick="removeDroplet('${d.name}')">Remove</button></td>
                </tr>
            `).join('');
        }

        async function uploadDroplet() {
            const fileInput = document.getElementById('file-input');
            const name = document.getElementById('droplet-name').value.trim();
            const domain = document.getElementById('droplet-domain').value.trim();
            const status = document.getElementById('upload-status');

            if (!fileInput.files.length) { status.innerHTML = '<span style="color: var(--red);">Please select a file</span>'; return; }
            if (!name) { status.innerHTML = '<span style="color: var(--red);">Please enter a name</span>'; return; }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('name', name);
            if (domain) formData.append('domain', domain);

            status.innerHTML = '<span style="color: var(--cyan);">Uploading...</span>';

            const token = localStorage.getItem('sbx_token');
            const res = await fetch(API + '/upload', {
                method: 'POST',
                headers: token ? { 'Authorization': 'Bearer ' + token } : {},
                body: formData
            });

            const data = await res.json();
            if (data.job_id) {
                status.innerHTML = '<span style="color: var(--cyan);">Publishing... (job ' + data.job_id + ')</span>';
                pollJob(data.job_id);
            } else {
                status.innerHTML = '<span style="color: var(--red);">' + (data.detail || 'Upload failed') + '</span>';
            }
        }

        async function pollJob(jobId) {
            const status = document.getElementById('upload-status');
            const check = async () => {
                const data = await api('/job/' + jobId);
                if (data.status === 'complete') {
                    if (data.success) {
                        status.innerHTML = '<span style="color: var(--green);">Published: <a href="' + data.url + '" target="_blank">' + data.vhost + '</a></span>';
                        refresh();
                    } else {
                        status.innerHTML = '<span style="color: var(--red);">Failed: ' + data.error + '</span>';
                    }
                } else if (data.status === 'running' || data.status === 'started') {
                    setTimeout(check, 2000);
                }
            };
            check();
        }

        async function removeDroplet(name) {
            if (!confirm('Remove droplet "' + name + '"?')) return;
            const data = await api('/remove', { method: 'POST', body: JSON.stringify({ name }) });
            if (data.success) refresh();
            else alert('Failed: ' + data.message);
        }

        function refresh() { loadStatus(); loadDroplets(); }

        // Drag & drop
        const zone = document.getElementById('upload-zone');
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('dragover');
            document.getElementById('file-input').files = e.dataTransfer.files;
        });
        document.getElementById('file-input').addEventListener('change', e => {
            if (e.target.files.length) zone.querySelector('p').textContent = e.target.files[0].name;
        });

        refresh();
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
