# SecuBox Kernel Module Blacklist
# Uncommon/risky modules disabled for security
# Install: /etc/modprobe.d/secubox-blacklist.conf

# Uncommon network protocols (attack surface reduction)
blacklist dccp
blacklist sctp
blacklist rds
blacklist tipc

# Uncommon filesystems
blacklist cramfs
blacklist freevxfs
blacklist jffs2
blacklist hfs
blacklist hfsplus
blacklist squashfs
blacklist udf

# Legacy/unused protocols
blacklist ax25
blacklist netrom
blacklist x25
blacklist rose
blacklist decnet
blacklist econet
blacklist af_802154

# USB storage (uncomment if not needed)
# blacklist usb-storage
# blacklist uas

# Firewire (often unused, potential DMA attack vector)
blacklist firewire-core
blacklist firewire-ohci
blacklist firewire-sbp2

# Bluetooth (uncomment if not needed)
# blacklist bluetooth
# blacklist btusb
