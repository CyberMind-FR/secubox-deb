# SecuBox Hardening API proxy
location /api/v1/hardening/ {
    proxy_pass http://unix:/run/secubox/hardening.sock:/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
}

# Hardening web frontend
location /hardening/ {
    alias /usr/share/secubox/www/hardening/;
    try_files $uri $uri/ /hardening/index.html;
}
