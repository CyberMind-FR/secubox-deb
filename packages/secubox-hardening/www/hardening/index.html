<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardening - SecuBox</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            --p31-peak: #00dd44;
            --p31-hot: #00ff55;
            --p31-mid: #009933;
            --p31-dim: #006622;
            --p31-ghost: #003311;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            --tube-light: #e8f5e9;
            --tube-pale: #c8e6c9;
            --tube-soft: #a5d6a7;
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-light);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--tube-dark);
            display: flex;
            min-height: 100vh;
        }

        .main {
            margin-left: 220px;
            padding: 2rem;
            flex: 1;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .header .subtitle {
            color: var(--p31-dim);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        .score-card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
            border-radius: 4px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }

        .score-value {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
        }

        .score-value.good { color: var(--p31-peak); }
        .score-value.medium { color: var(--p31-decay); }
        .score-value.bad { color: #ff4466; }

        .score-label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .section-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--p31-ghost);
        }

        .checks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .check-item {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
            border-radius: 4px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.2s;
        }

        .check-item:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 10px rgba(51,255,102,0.05);
        }

        .check-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .check-icon.pass {
            background: rgba(51,255,102,0.2);
            color: var(--p31-peak);
            border: 1px solid var(--p31-peak);
            box-shadow: 0 0 10px rgba(51,255,102,0.3);
        }

        .check-icon.fail {
            background: rgba(255,68,102,0.2);
            color: #ff4466;
            border: 1px solid #ff4466;
            box-shadow: 0 0 10px rgba(255,68,102,0.3);
        }

        .check-details {
            flex: 1;
        }

        .check-details h4 {
            margin: 0 0 0.25rem 0;
            color: var(--p31-mid);
            font-size: 0.9rem;
        }

        .check-details .status {
            font-size: 0.75rem;
            color: var(--p31-dim);
            letter-spacing: 0.05em;
        }

        .action-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Courier Prime', monospace;
            padding: 0.75rem 1.5rem;
            border: 1px solid var(--tube-soft);
            border-radius: 4px;
            background: var(--tube-pale);
            color: var(--p31-mid);
            cursor: pointer;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }

        .btn-primary {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }

        .btn-primary:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 15px rgba(51,255,102,0.2);
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--p31-dim);
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        @media (max-width: 768px) {
            .main { margin-left: 0; padding: 1rem; }
            .checks-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>

    <main class="main">
        <header class="header">
            <h1>System Hardening</h1>
            <p class="subtitle">Kernel and network security configuration</p>
        </header>

        <div class="score-card">
            <div class="score-value" id="score">--</div>
            <div class="score-label">Security Score</div>
        </div>

        <h2 class="section-title">Security Checks</h2>
        <div class="checks-grid" id="checks">
            <div class="loading">Loading security checks</div>
        </div>

        <div class="action-section">
            <button class="btn btn-primary" onclick="applyHardening()">Apply Hardening</button>
            <button class="btn" onclick="runBenchmark()">Run Benchmark</button>
            <button class="btn" onclick="refreshStatus()">Refresh Status</button>
        </div>
    </main>

    <script src="/shared/sidebar.js"></script>
    <script src="/shared/crt-engine.js"></script>
    <script>
        const API_BASE = '/api/v1/hardening';

        async function fetchAPI(endpoint, options = {}) {
            const token = localStorage.getItem('sbx_token');
            const headers = {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                ...options.headers
            };
            const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            return response.json();
        }

        async function loadStatus() {
            try {
                const data = await fetchAPI('/status');

                // Update score
                const scoreEl = document.getElementById('score');
                const score = data.score || 0;
                scoreEl.textContent = score + '%';
                scoreEl.className = 'score-value ' + (score >= 80 ? 'good' : score >= 50 ? 'medium' : 'bad');

                // Update checks
                const checksEl = document.getElementById('checks');
                if (data.checks && data.checks.length > 0) {
                    checksEl.innerHTML = data.checks.map(check => `
                        <div class="check-item">
                            <div class="check-icon ${check.status}">${check.status === 'pass' ? '✓' : '✗'}</div>
                            <div class="check-details">
                                <h4>${check.name}</h4>
                                <div class="status">
                                    ${check.status === 'pass' ? 'Configured correctly' :
                                      'Current: ' + (check.current || 'Not set')}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    checksEl.innerHTML = '<div class="check-item"><div class="check-details"><h4>No checks available</h4><div class="status">Run benchmark to scan system</div></div></div>';
                }
            } catch (e) {
                console.error('Failed to load status:', e);
                document.getElementById('score').textContent = 'N/A';
                document.getElementById('score').className = 'score-value';
                document.getElementById('checks').innerHTML = '<div class="check-item"><div class="check-details"><h4>Unable to load status</h4><div class="status">Check API connection</div></div></div>';
            }
        }

        async function applyHardening() {
            try {
                await fetchAPI('/apply', { method: 'POST' });
                CRT.toast('Hardening applied successfully', 'success');
                loadStatus();
            } catch (e) {
                CRT.toast('Failed to apply: ' + e.message, 'error');
            }
        }

        async function runBenchmark() {
            try {
                CRT.toast('Running benchmark...', 'info');
                const result = await fetchAPI('/benchmark', { method: 'POST' });
                CRT.toast('Benchmark completed', 'success');
                loadStatus();
            } catch (e) {
                CRT.toast('Benchmark failed: ' + e.message, 'error');
            }
        }

        function refreshStatus() {
            CRT.toast('Refreshing...', 'info');
            loadStatus();
        }

        document.addEventListener('DOMContentLoaded', loadStatus);
    </script>
</body>
</html>
