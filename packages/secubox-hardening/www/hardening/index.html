<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hardening - SecuBox</title>
    <link rel="stylesheet" href="/portal/css/style.css">
    <style>
        .score-card {
            background: var(--surface0);
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .score-value {
            font-size: 4rem;
            font-weight: bold;
        }
        .score-value.good { color: var(--green); }
        .score-value.medium { color: var(--yellow); }
        .score-value.bad { color: var(--red); }
        .checks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }
        .check-item {
            background: var(--surface0);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .check-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .check-icon.pass { background: var(--green); color: var(--base); }
        .check-icon.fail { background: var(--red); color: var(--base); }
        .check-details h4 { margin: 0 0 0.25rem 0; }
        .check-details .status { font-size: 0.875rem; color: var(--subtext0); }
        .action-section {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .action-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }
        .action-btn.primary { background: var(--blue); color: var(--base); }
        .action-btn.secondary { background: var(--surface1); color: var(--text); }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--p31-ghost);
            background: var(--tube-deep);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-deep);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-black);
            border: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-black); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <div class="app-container">
        <nav class="sidebar" id="sidebar"></nav>

        <main class="main-content">
            <header class="content-header">
                <h1>System Hardening</h1>
                <p class="subtitle">Kernel and network security configuration</p>
            </header>

            <div class="score-card">
                <div class="score-value" id="score">--</div>
                <div>Security Score</div>
            </div>

            <h2>Security Checks</h2>
            <div class="checks-grid" id="checks"></div>

            <div class="action-section">
                <button class="action-btn primary" onclick="applyHardening()">Apply Hardening</button>
                <button class="action-btn secondary" onclick="runBenchmark()">Run Benchmark</button>
                <button class="action-btn secondary" onclick="refreshStatus()">Refresh Status</button>
            </div>
        </main>
    </div>

    <script src="/portal/js/sidebar.js"></script>
    <script>
        const API_BASE = '/api/v1/hardening';

        async function fetchAPI(endpoint, options = {}) {
            const token = localStorage.getItem('jwt_token');
            const headers = {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                ...options.headers
            };
            const response = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (!response.ok) throw new Error(`API error: ${response.status}`);
            return response.json();
        }

        async function loadStatus() {
            try {
                const data = await fetchAPI('/status');

                // Update score
                const scoreEl = document.getElementById('score');
                const score = data.score || 0;
                scoreEl.textContent = score + '%';
                scoreEl.className = 'score-value ' + (score >= 80 ? 'good' : score >= 50 ? 'medium' : 'bad');

                // Update checks
                const checksEl = document.getElementById('checks');
                if (data.checks && data.checks.length > 0) {
                    checksEl.innerHTML = data.checks.map(check => `
                        <div class="check-item">
                            <div class="check-icon ${check.status}">${check.status === 'pass' ? '✓' : '✗'}</div>
                            <div class="check-details">
                                <h4>${check.name}</h4>
                                <div class="status">
                                    ${check.status === 'pass' ? 'Configured correctly' :
                                      'Current: ' + (check.current || 'Not set')}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    checksEl.innerHTML = '<div class="check-item">No checks available</div>';
                }
            } catch (e) {
                console.error('Failed to load status:', e);
                document.getElementById('score').textContent = 'Error';
            }
        }

        async function applyHardening() {
            try {
                await fetchAPI('/apply', { method: 'POST' });
                alert('Hardening applied');
                loadStatus();
            } catch (e) {
                alert('Failed to apply: ' + e.message);
            }
        }

        async function runBenchmark() {
            try {
                const result = await fetchAPI('/benchmark');
                if (result.output) {
                    alert(result.output);
                }
                loadStatus();
            } catch (e) {
                alert('Benchmark failed: ' + e.message);
            }
        }

        function refreshStatus() {
            loadStatus();
        }

        document.addEventListener('DOMContentLoaded', loadStatus);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
