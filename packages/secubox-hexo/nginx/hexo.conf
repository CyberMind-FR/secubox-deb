# /etc/nginx/secubox.d/hexo.conf
# Installed by secubox-hexo — auto-registered on install, removed on purge
location /api/v1/hexo/ {
    proxy_pass http://unix:/run/secubox/hexo.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

location /hexo/ {
    alias /usr/share/secubox/www/hexo/;
    try_files $uri $uri/ /hexo/index.html;
}
