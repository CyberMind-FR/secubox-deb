location /api/v1/hexo/ { proxy_pass http://unix:/run/secubox/hexo.sock; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 600s; }
location /hexo/ { alias /usr/share/secubox/www/hexo/; try_files $uri $uri/ /hexo/index.html; }
location /hexo-sites/ { alias /var/www/hexo/; autoindex on; }
