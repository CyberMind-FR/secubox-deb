# SecuBox Home Assistant - Nginx configuration

location /homeassistant/ {
    alias /usr/share/secubox/www/homeassistant/;
    index index.html;
    try_files $uri $uri/ /homeassistant/index.html;
}

location /api/v1/homeassistant/ {
    proxy_pass http://unix:/run/secubox/homeassistant.sock:/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 1800s;
    proxy_send_timeout 300s;
}
