# /etc/nginx/secubox.d/homeassistant.conf
# Installed by secubox-homeassistant -- auto-registered on install, removed on purge

# Static frontend
location /homeassistant/ {
    alias /usr/share/secubox/www/homeassistant/;
    index index.html;
    try_files $uri $uri/ /homeassistant/index.html;
}

# API backend
location /api/v1/homeassistant/ {
    proxy_pass http://unix:/run/secubox/homeassistant.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
