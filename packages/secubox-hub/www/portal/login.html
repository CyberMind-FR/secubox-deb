<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox Login</title>
    <link rel="stylesheet" href="/shared/design-tokens.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e8e6d9;
        }

        .login-container {
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid #c9a84c;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow:
                0 0 20px rgba(201, 168, 76, 0.2),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            color: #c9a84c;
            letter-spacing: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #00ff41;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            border-radius: 4px;
            color: #e8e6d9;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00ff41;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c9a84c 0%, #a08030 100%);
            border: none;
            border-radius: 4px;
            color: #0a0a0f;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: linear-gradient(135deg, #d4b55c 0%, #b09040 100%);
            box-shadow: 0 0 20px rgba(201, 168, 76, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error {
            background: rgba(230, 57, 70, 0.2);
            border: 1px solid #e63946;
            color: #e63946;
            padding: 10px 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .hint {
            text-align: center;
            margin-top: 20px;
            color: #6b6b7a;
            font-size: 12px;
        }

        .hint strong {
            color: #00ff41;
        }

        .auth-mode {
            text-align: center;
            margin-top: 15px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .auth-mode.standard {
            background: rgba(107, 107, 122, 0.2);
            border: 1px solid #6b6b7a;
            color: #6b6b7a;
        }

        .auth-mode.zkp {
            background: rgba(0, 255, 65, 0.15);
            border: 1px solid #00ff41;
            color: #00ff41;
        }

        .auth-mode .mode-label {
            font-weight: bold;
        }

        .version-badge {
            text-align: center;
            margin-top: 10px;
            font-size: 10px;
            color: #6b6b7a;
        }

        /* CRT effect */
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <span class="logo-icon">🔒</span>
            <span class="logo-text">SECUBOX</span>
        </div>

        <div class="error" id="error"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="admin" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>

            <button type="submit" id="submitBtn">Access System</button>
        </form>

        <div class="hint">
            Demo credentials: <strong>admin</strong> / <strong>secubox</strong>
        </div>

        <div class="auth-mode standard" id="auth-mode">
            <span class="mode-label">Auth:</span> <span id="auth-mode-text">Standard</span>
        </div>

        <div class="version-badge" id="version-badge">SecuBox v1.7.0</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorDiv.classList.remove('show');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Authenticating...';

            try {
                const res = await fetch('/api/v1/hub/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || 'Invalid credentials');
                }

                const data = await res.json();
                localStorage.setItem('sbx_token', data.access_token);
                localStorage.setItem('sbx_user', username);

                // Redirect to dashboard
                window.location.href = '/';

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Access System';
            }
        });

        // Auto-focus password if username is pre-filled
        if (document.getElementById('username').value) {
            document.getElementById('password').focus();
        }

        // Load auth mode and version info (public endpoint)
        async function loadPublicInfo() {
            try {
                const res = await fetch('/api/v1/hub/public/info');
                if (res.ok) {
                    const data = await res.json();

                    // Update auth mode
                    const authModeEl = document.getElementById('auth-mode');
                    const authModeText = document.getElementById('auth-mode-text');
                    if (data.auth_mode) {
                        authModeText.textContent = data.auth_mode;
                        authModeEl.className = 'auth-mode ' + (data.auth_mode.toLowerCase() === 'zkp' ? 'zkp' : 'standard');
                    }

                    // Update version
                    if (data.version) {
                        document.getElementById('version-badge').textContent = 'SecuBox v' + data.version;
                    }
                }
            } catch (e) {
                // Silently fail - use defaults
            }
        }

        loadPublicInfo();
    </script>
</body>
</html>
