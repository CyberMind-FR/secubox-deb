<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --p31-peak: #00dd44; --p31-mid: #009933; --p31-dim: #006622; --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7; --bg-card: var(--tube-pale); --border: var(--tube-soft); --text: #1b3d1c; --text-dim: var(--p31-dim); --primary: var(--p31-peak); --danger: #ff4466; --warning: #ffb347; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; background: var(--tube-light); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--primary); word-break: break-all; }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn:hover { background: var(--tube-light); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .info-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; background: var(--tube-light); border-radius: 6px; margin-bottom: 0.5rem; }
        .info-row label { font-weight: 600; color: var(--text-dim); }
        .info-row code { background: var(--bg-card); padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.85rem; word-break: break-all; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; background: var(--tube-light); }
        tr:hover { background: rgba(0,221,68,0.05); }
        .trust-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
        .trust-badge.verified { background: rgba(0,221,68,0.2); color: var(--primary); }
        .trust-badge.trusted { background: rgba(0,123,255,0.2); color: #0056b3; }
        .trust-badge.neutral { background: rgba(108,117,125,0.2); color: #6c757d; }
        .trust-badge.suspicious { background: rgba(255,179,71,0.2); color: #996600; }
        .trust-badge.untrusted { background: rgba(255,68,102,0.2); color: var(--danger); }
        .did-display { font-family: monospace; font-size: 0.9rem; background: var(--tube-light); padding: 1rem; border-radius: 6px; word-break: break-all; border: 1px dashed var(--border); }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) { .main { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
        <div class="header">
            <h1>🔐 Identity Management</h1>
            <span class="badge">v1.0.0</span>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🪪 Local Identity</h2>
                <button class="btn btn-danger btn-sm" onclick="rotateKey()">Rotate Key</button>
            </div>
            <div class="did-display" id="did-display">Loading...</div>
            <div style="margin-top: 1rem;">
                <div class="info-row">
                    <label>Hostname</label>
                    <code id="hostname">-</code>
                </div>
                <div class="info-row">
                    <label>Public Key</label>
                    <code id="public-key" style="font-size: 0.7rem;">-</code>
                </div>
                <div class="info-row">
                    <label>Created</label>
                    <code id="created-at">-</code>
                </div>
                <div class="info-row">
                    <label>Capabilities</label>
                    <code id="capabilities">-</code>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="peer-count">-</div>
                <div class="stat-label">Known Peers</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="verified-count">-</div>
                <div class="stat-label">Verified</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🤝</div>
                <div class="stat-value" id="trusted-count">-</div>
                <div class="stat-label">Trusted</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-value" id="suspicious-count">-</div>
                <div class="stat-label">Suspicious</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>👥 Known Peers</h2>
                <button class="btn btn-sm" onclick="loadPeers()">Refresh</button>
            </div>
            <table>
                <thead>
                    <tr><th>DID</th><th>Hostname</th><th>Trust Level</th><th>Score</th><th>Last Seen</th><th>Actions</th></tr>
                </thead>
                <tbody id="peers-table">
                    <tr><td colspan="6" class="empty-state">No peers discovered yet</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>✍️ Sign / Verify</h2>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Sign Message</label>
                    <textarea id="sign-input" rows="3" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; resize: vertical;" placeholder="Enter message to sign..."></textarea>
                    <button class="btn btn-primary" style="margin-top: 0.5rem;" onclick="signMessage()">Sign</button>
                    <div id="signature-output" style="margin-top: 0.5rem; font-size: 0.8rem; word-break: break-all;"></div>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Verify Signature</label>
                    <textarea id="verify-input" rows="3" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; resize: vertical;" placeholder="Message|Signature|PublicKey"></textarea>
                    <button class="btn" style="margin-top: 0.5rem;" onclick="verifySignature()">Verify</button>
                    <div id="verify-output" style="margin-top: 0.5rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/identity';

        async function api(path, method = 'GET', data = null) {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) };
            try {
                const res = await fetch(API + path, { method, headers, body: data ? JSON.stringify(data) : null });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch { return null; }
        }

        async function loadIdentity() {
            const data = await api('/identity');
            if (!data) return;
            document.getElementById('did-display').textContent = data.did || 'Not generated';
            document.getElementById('hostname').textContent = data.hostname || '-';
            document.getElementById('public-key').textContent = data.public_key || '-';
            document.getElementById('created-at').textContent = data.created_at ? new Date(data.created_at).toLocaleString() : '-';
            document.getElementById('capabilities').textContent = (data.capabilities || []).join(', ') || '-';
        }

        async function loadPeers() {
            const data = await api('/peers');
            const tbody = document.getElementById('peers-table');

            if (!data?.peers?.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No peers discovered yet</td></tr>';
                document.getElementById('peer-count').textContent = '0';
                document.getElementById('verified-count').textContent = '0';
                document.getElementById('trusted-count').textContent = '0';
                document.getElementById('suspicious-count').textContent = '0';
                return;
            }

            document.getElementById('peer-count').textContent = data.count || data.peers.length;
            document.getElementById('verified-count').textContent = data.peers.filter(p => p.trust_level === 'verified').length;
            document.getElementById('trusted-count').textContent = data.peers.filter(p => p.trust_level === 'trusted').length;
            document.getElementById('suspicious-count').textContent = data.peers.filter(p => p.trust_level === 'suspicious').length;

            tbody.innerHTML = data.peers.map(p => `
                <tr>
                    <td><code style="font-size: 0.75rem;">${p.did?.substring(0, 30)}...</code></td>
                    <td>${p.hostname || '-'}</td>
                    <td><span class="trust-badge ${p.trust_level}">${p.trust_level}</span></td>
                    <td>${p.trust_score}/100</td>
                    <td>${p.last_seen ? new Date(p.last_seen).toLocaleString() : '-'}</td>
                    <td>
                        <button class="btn btn-sm" onclick="verifyPeer('${p.did}')">Verify</button>
                    </td>
                </tr>
            `).join('');
        }

        async function rotateKey() {
            if (!confirm('Rotate identity key? This will change your DID.')) return;
            await api('/identity/rotate', 'POST');
            loadIdentity();
        }

        async function verifyPeer(did) {
            await api(`/peers/${encodeURIComponent(did)}/verify`, 'POST');
            loadPeers();
        }

        async function signMessage() {
            const message = document.getElementById('sign-input').value;
            if (!message) return;
            const data = await api('/identity/sign', 'POST', { message });
            if (data?.signature) {
                document.getElementById('signature-output').innerHTML = `<strong>Signature:</strong><br><code>${data.signature}</code>`;
            }
        }

        async function verifySignature() {
            const input = document.getElementById('verify-input').value.split('|');
            if (input.length !== 3) {
                document.getElementById('verify-output').innerHTML = '<span style="color:var(--danger);">Format: Message|Signature|PublicKey</span>';
                return;
            }
            const data = await api('/identity/verify', 'POST', { message: input[0], signature: input[1], public_key: input[2] });
            document.getElementById('verify-output').innerHTML = data?.valid
                ? '<span style="color:var(--primary);">✓ Valid signature</span>'
                : '<span style="color:var(--danger);">✗ Invalid signature</span>';
        }

        loadIdentity();
        loadPeers();
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
