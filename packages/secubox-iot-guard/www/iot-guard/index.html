<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - IoT Guard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --p31-peak: #00dd44; --p31-mid: #009933; --p31-dim: #006622; --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7; --bg-card: var(--tube-pale); --border: var(--tube-soft); --text: #1b3d1c; --text-dim: var(--p31-dim); --primary: var(--p31-peak); --danger: #ff4466; --warning: #ffb347; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; background: var(--tube-light); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-value.danger { color: var(--danger); }
        .stat-value.warning { color: var(--warning); }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn:hover { background: var(--tube-light); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
        .btn-danger { background: var(--danger); border-color: var(--danger); color: #fff; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .device-card { background: var(--tube-light); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; position: relative; }
        .device-card.vulnerable { border-left: 4px solid var(--danger); }
        .device-card.secure { border-left: 4px solid var(--primary); }
        .device-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
        .device-icon { font-size: 2rem; }
        .device-info h3 { margin: 0; font-size: 1rem; }
        .device-info .type { font-size: 0.8rem; color: var(--text-dim); }
        .device-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.85rem; }
        .device-meta dt { color: var(--text-dim); }
        .device-meta dd { font-family: monospace; }
        .device-actions { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px dashed var(--border); display: flex; gap: 0.5rem; }
        .risk-badge { position: absolute; top: 0.5rem; right: 0.5rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .risk-badge.high { background: rgba(255,68,102,0.2); color: var(--danger); }
        .risk-badge.medium { background: rgba(255,179,71,0.2); color: #996600; }
        .risk-badge.low { background: rgba(0,221,68,0.2); color: var(--primary); }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) { .main { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
        <div class="header">
            <h1>📡 IoT Guard</h1>
            <span class="badge">v1.0.0</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📱</div>
                <div class="stat-value" id="total-devices">-</div>
                <div class="stat-label">IoT Devices</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚠️</div>
                <div class="stat-value danger" id="vulnerable">-</div>
                <div class="stat-label">Vulnerable</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔒</div>
                <div class="stat-value" id="isolated">-</div>
                <div class="stat-label">Isolated</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🚨</div>
                <div class="stat-value warning" id="alerts">-</div>
                <div class="stat-label">Alerts (24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">✅</div>
                <div class="stat-value" id="secure">-</div>
                <div class="stat-label">Secure</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📱 Discovered Devices</h2>
                <div>
                    <button class="btn btn-primary btn-sm" onclick="scanNetwork()">Scan Network</button>
                    <button class="btn btn-sm" onclick="loadDevices()">Refresh</button>
                </div>
            </div>
            <div class="device-grid" id="devices-grid">
                <div class="empty-state">No IoT devices discovered. Click "Scan Network" to detect devices.</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🚨 Recent Alerts</h2>
            </div>
            <div id="alerts-list">
                <div class="empty-state">No recent alerts</div>
            </div>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/iot-guard';
        const deviceIcons = { 'camera': '📹', 'thermostat': '🌡️', 'speaker': '🔊', 'tv': '📺', 'light': '💡', 'plug': '🔌', 'lock': '🔐', 'sensor': '📡', 'router': '📶', 'default': '📱' };

        async function api(path, method = 'GET', data = null) {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) };
            try {
                const res = await fetch(API + path, { method, headers, body: data ? JSON.stringify(data) : null });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch { return null; }
        }

        async function loadStatus() {
            const data = await api('/status');
            if (!data) return;
            document.getElementById('total-devices').textContent = data.total_devices || 0;
            document.getElementById('vulnerable').textContent = data.vulnerable || 0;
            document.getElementById('isolated').textContent = data.isolated || 0;
            document.getElementById('alerts').textContent = data.alerts_24h || 0;
            document.getElementById('secure').textContent = data.secure || 0;
        }

        async function loadDevices() {
            const data = await api('/devices');
            const grid = document.getElementById('devices-grid');
            if (!data?.devices?.length) {
                grid.innerHTML = '<div class="empty-state">No IoT devices discovered. Click "Scan Network" to detect devices.</div>';
                return;
            }
            grid.innerHTML = data.devices.map(d => `
                <div class="device-card ${d.vulnerable ? 'vulnerable' : 'secure'}">
                    <span class="risk-badge ${d.risk_level?.toLowerCase() || 'low'}">${d.risk_level || 'Low'}</span>
                    <div class="device-header">
                        <span class="device-icon">${deviceIcons[d.type?.toLowerCase()] || deviceIcons.default}</span>
                        <div class="device-info">
                            <h3>${d.name || d.hostname || 'Unknown Device'}</h3>
                            <div class="type">${d.type || 'Unknown'} ${d.manufacturer ? `- ${d.manufacturer}` : ''}</div>
                        </div>
                    </div>
                    <dl class="device-meta">
                        <dt>IP</dt><dd>${d.ip || '-'}</dd>
                        <dt>MAC</dt><dd>${d.mac || '-'}</dd>
                        <dt>First Seen</dt><dd>${d.first_seen ? new Date(d.first_seen).toLocaleDateString() : '-'}</dd>
                        <dt>Last Seen</dt><dd>${d.last_seen ? new Date(d.last_seen).toLocaleTimeString() : '-'}</dd>
                    </dl>
                    <div class="device-actions">
                        <button class="btn btn-sm" onclick="scanDevice('${d.id}')">Scan</button>
                        ${d.isolated
                            ? `<button class="btn btn-sm" onclick="unisolate('${d.id}')">Unisolate</button>`
                            : `<button class="btn btn-sm btn-danger" onclick="isolate('${d.id}')">Isolate</button>`
                        }
                    </div>
                </div>
            `).join('');
        }

        async function scanNetwork() {
            const btn = event.target;
            btn.disabled = true; btn.textContent = 'Scanning...';
            await api('/scan', 'POST');
            btn.disabled = false; btn.textContent = 'Scan Network';
            loadDevices();
            loadStatus();
        }

        async function scanDevice(id) { await api(`/devices/${id}/scan`, 'POST'); loadDevices(); }
        async function isolate(id) { if(confirm('Isolate this device?')) { await api(`/devices/${id}/isolate`, 'POST'); loadDevices(); loadStatus(); } }
        async function unisolate(id) { await api(`/devices/${id}/unisolate`, 'POST'); loadDevices(); loadStatus(); }

        loadStatus();
        loadDevices();
        setInterval(loadStatus, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
