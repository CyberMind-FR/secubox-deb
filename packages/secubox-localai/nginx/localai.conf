# /etc/nginx/secubox.d/localai.conf
# Installed by secubox-localai — auto-registered on install, removed on purge

# Static frontend
location /localai/ {
    alias /usr/share/secubox/www/localai/;
    index index.html;
    try_files $uri $uri/ /localai/index.html;
}

# API backend
location /api/v1/localai/ {
    proxy_pass http://unix:/run/secubox/localai.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
