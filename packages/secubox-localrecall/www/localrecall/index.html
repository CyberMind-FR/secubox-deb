<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - LocalRecall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --p31-peak: #00dd44; --p31-mid: #009933; --p31-dim: #006622; --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7; --bg-card: var(--tube-pale); --border: var(--tube-soft); --text: #1b3d1c; --text-dim: var(--p31-dim); --primary: var(--p31-peak); --danger: #ff4466; --warning: #ffb347; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; background: var(--tube-light); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn:hover { background: var(--tube-light); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .search-box input { flex: 1; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; background: var(--tube-light); color: var(--text); font-family: inherit; font-size: 1rem; }
        .result-card { background: var(--tube-light); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
        .result-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; }
        .result-title { font-weight: 600; }
        .result-meta { font-size: 0.75rem; color: var(--text-dim); }
        .result-snippet { font-size: 0.9rem; margin-top: 0.5rem; }
        .result-snippet mark { background: rgba(0,221,68,0.3); padding: 0 0.2rem; }
        .tag { display: inline-block; padding: 0.15rem 0.4rem; background: var(--bg-card); border-radius: 4px; font-size: 0.7rem; margin-right: 0.25rem; }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) { .main { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
        <div class="header">
            <h1>🧠 LocalRecall</h1>
            <span class="badge">v1.0.0</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📚</div>
                <div class="stat-value" id="total-docs">-</div>
                <div class="stat-label">Documents</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-value" id="total-chunks">-</div>
                <div class="stat-label">Chunks</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔍</div>
                <div class="stat-value" id="queries-24h">-</div>
                <div class="stat-label">Queries (24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💾</div>
                <div class="stat-value" id="index-size">-</div>
                <div class="stat-label">Index Size</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🔎 Semantic Search</h2>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Ask a question or search for information..." onkeypress="if(event.key==='Enter')search()">
                <button class="btn btn-primary" onclick="search()">Search</button>
            </div>
            <div id="search-results">
                <div class="empty-state">Enter a query to search your local knowledge base</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📥 Ingest Documents</h2>
            </div>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <input type="file" id="file-input" multiple style="flex: 1; padding: 0.5rem;">
                <button class="btn btn-primary" onclick="ingestFiles()">Ingest</button>
            </div>
            <div id="ingest-status" style="margin-top: 0.5rem; font-size: 0.85rem;"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📋 Recent Documents</h2>
                <button class="btn btn-sm" onclick="loadDocuments()">Refresh</button>
            </div>
            <div id="documents-list">
                <div class="empty-state">No documents indexed</div>
            </div>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/localrecall';

        async function api(path, method = 'GET', data = null) {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) };
            try {
                const res = await fetch(API + path, { method, headers, body: data ? JSON.stringify(data) : null });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch { return null; }
        }

        async function loadStatus() {
            const data = await api('/status');
            if (!data) return;
            document.getElementById('total-docs').textContent = data.total_documents || 0;
            document.getElementById('total-chunks').textContent = (data.total_chunks || 0).toLocaleString();
            document.getElementById('queries-24h').textContent = data.queries_24h || 0;
            document.getElementById('index-size').textContent = formatBytes(data.index_size_bytes || 0);
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
        }

        async function search() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            const results = document.getElementById('search-results');
            results.innerHTML = '<div class="empty-state">Searching...</div>';

            const data = await api('/search', 'POST', { query, limit: 10 });
            if (!data?.results?.length) {
                results.innerHTML = '<div class="empty-state">No results found</div>';
                return;
            }

            results.innerHTML = data.results.map(r => `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-title">${r.title || r.source || 'Untitled'}</div>
                        <span style="font-size: 0.75rem; color: var(--text-dim);">Score: ${(r.score * 100).toFixed(0)}%</span>
                    </div>
                    <div class="result-meta">
                        ${r.source ? `Source: ${r.source}` : ''}
                        ${r.tags?.map(t => `<span class="tag">${t}</span>`).join('') || ''}
                    </div>
                    <div class="result-snippet">${r.content?.substring(0, 300) || ''}...</div>
                </div>
            `).join('');
        }

        async function loadDocuments() {
            const data = await api('/documents?limit=10');
            const container = document.getElementById('documents-list');
            if (!data?.documents?.length) {
                container.innerHTML = '<div class="empty-state">No documents indexed</div>';
                return;
            }
            container.innerHTML = data.documents.map(d => `
                <div class="result-card">
                    <div class="result-header">
                        <div class="result-title">${d.title || d.filename || 'Untitled'}</div>
                        <button class="btn btn-sm" onclick="deleteDoc('${d.id}')">Delete</button>
                    </div>
                    <div class="result-meta">
                        ${d.chunks || 0} chunks | ${formatBytes(d.size || 0)} | ${d.created_at ? new Date(d.created_at).toLocaleDateString() : '-'}
                    </div>
                </div>
            `).join('');
        }

        async function ingestFiles() {
            const files = document.getElementById('file-input').files;
            if (!files.length) return;

            const status = document.getElementById('ingest-status');
            status.textContent = 'Ingesting...';

            const formData = new FormData();
            for (const file of files) formData.append('files', file);

            try {
                const token = localStorage.getItem('sbx_token');
                const res = await fetch(API + '/ingest', {
                    method: 'POST',
                    headers: token ? { 'Authorization': 'Bearer ' + token } : {},
                    body: formData
                });
                const data = await res.json();
                status.textContent = `Ingested ${data.ingested || 0} documents`;
                loadStatus();
                loadDocuments();
            } catch (e) {
                status.textContent = 'Ingest failed: ' + e.message;
            }
        }

        async function deleteDoc(id) {
            if (!confirm('Delete this document?')) return;
            await api(`/documents/${id}`, 'DELETE');
            loadStatus();
            loadDocuments();
        }

        loadStatus();
        loadDocuments();
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
