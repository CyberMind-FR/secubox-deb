# /etc/nginx/secubox.d/lyrion.conf
# Installed by secubox-lyrion — auto-registered on install, removed on purge

# Static frontend
location /lyrion/ {
    alias /usr/share/secubox/www/lyrion/;
    index index.html;
    try_files $uri $uri/ /lyrion/index.html;
}

# API backend
location /api/v1/lyrion/ {
    proxy_pass http://unix:/run/secubox/lyrion.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
