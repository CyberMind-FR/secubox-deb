<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Synapse - SecuBox</title>
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            --matrix-green: #0dbd8b;
            --matrix-light: #4dd2a8;
            --matrix-dark: #0a9d73;
        }

        body.dark {
            --matrix-green: #4dd2a8;
            --matrix-light: #7ee2c4;
            --matrix-dark: #0dbd8b;
        }

        .accent { color: var(--matrix-green); }
        .accent-bg { background-color: var(--matrix-green); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .header h1 { margin: 0; font-size: 1.5rem; }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
        }

        .status-badge.running { background: var(--success-bg); color: var(--success); }
        .status-badge.stopped { background: var(--error-bg); color: var(--error); }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .info-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        .info-value {
            font-size: 1.25rem;
            font-weight: 500;
            margin-top: 0.25rem;
        }

        .action-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 0.875rem;
        }

        .btn:hover { background: var(--hover); }
        .btn.primary { background: var(--matrix-green); color: white; border-color: var(--matrix-green); }
        .btn.primary:hover { background: var(--matrix-dark); }
        .btn.danger { background: var(--error); color: white; border-color: var(--error); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
        }

        .tab {
            padding: 0.75rem 1rem;
            border: none;
            background: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab:hover { color: var(--text); }
        .tab.active { color: var(--matrix-green); border-bottom-color: var(--matrix-green); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .user-list, .room-list, .bridge-list {
            display: grid;
            gap: 0.5rem;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }

        .item-icon { font-size: 1.5rem; }
        .item-info { flex: 1; }
        .item-name { font-weight: 500; }
        .item-meta { font-size: 0.875rem; color: var(--text-secondary); }

        .log-viewer {
            background: var(--bg-dark, #1a1a2e);
            color: var(--text-light, #e0e0e0);
            font-family: monospace;
            font-size: 0.75rem;
            padding: 1rem;
            border-radius: 0.5rem;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .settings-form {
            display: grid;
            gap: 1rem;
            max-width: 500px;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.25rem;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 0.25rem;
            background: var(--surface);
            color: var(--text);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-group input { width: auto; }

        .open-app-btn {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            padding: 1rem 1.5rem;
            background: var(--matrix-green);
            color: white;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 12px rgba(13, 189, 139, 0.4);
        }

        .open-app-btn:hover { background: var(--matrix-dark); }
        .hidden { display: none !important; }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }

        .empty-state-icon { font-size: 3rem; margin-bottom: 1rem; }

        .install-form {
            max-width: 400px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
        }

        .install-form h2 { margin-top: 0; text-align: center; }
    </style>
</head>
<body class="crt-light">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content">
    <div class="container">
        <div class="header">
            <h1><span class="accent">Matrix</span> Synapse</h1>
            <span id="status-badge" class="status-badge stopped">Stopped</span>
        </div>

        <div id="install-section" class="install-form hidden">
            <h2>Install Matrix Synapse</h2>
            <form onsubmit="installMatrix(event)">
                <div class="form-group">
                    <label>Server Name (domain)</label>
                    <input type="text" id="install-server-name" placeholder="matrix.example.com" required>
                    <small style="color: var(--text-secondary);">This cannot be changed later</small>
                </div>
                <button type="submit" class="btn primary" style="width: 100%; margin-top: 1rem;">Install Matrix</button>
            </form>
        </div>

        <div id="main-section" class="hidden">
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Server Name</div>
                    <div class="info-value" id="server-name">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Version</div>
                    <div class="info-value" id="version">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Container IP</div>
                    <div class="info-value" id="container-ip">-</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Disk Usage</div>
                    <div class="info-value" id="disk-usage">-</div>
                </div>
            </div>

            <div class="action-bar">
                <button class="btn primary" id="btn-start" onclick="startService()">Start</button>
                <button class="btn" id="btn-stop" onclick="stopService()" disabled>Stop</button>
                <button class="btn" id="btn-restart" onclick="restartService()" disabled>Restart</button>
                <button class="btn" onclick="installElement()">Install Element Web</button>
                <button class="btn" onclick="createBackup()">Backup</button>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="users">Users</button>
                <button class="tab" data-tab="rooms">Rooms</button>
                <button class="tab" data-tab="bridges">Bridges</button>
                <button class="tab" data-tab="logs">Logs</button>
                <button class="tab" data-tab="settings">Settings</button>
            </div>

            <div id="tab-users" class="tab-content active">
                <div class="action-bar">
                    <button class="btn primary" onclick="showCreateUser()">Create User</button>
                </div>
                <div id="users-list" class="user-list"></div>
            </div>

            <div id="tab-rooms" class="tab-content">
                <div id="rooms-list" class="room-list"></div>
            </div>

            <div id="tab-bridges" class="tab-content">
                <p style="margin-bottom: 1rem; color: var(--text-secondary);">
                    Connect Matrix to external messaging platforms:
                </p>
                <div id="bridges-list" class="bridge-list"></div>
            </div>

            <div id="tab-logs" class="tab-content">
                <div class="action-bar">
                    <button class="btn" onclick="loadLogs()">Refresh</button>
                </div>
                <div id="log-viewer" class="log-viewer">Loading logs...</div>
            </div>

            <div id="tab-settings" class="tab-content">
                <form class="settings-form" onsubmit="saveSettings(event)">
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="setting-registration">
                        <label>Enable Public Registration</label>
                    </div>
                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="setting-guests">
                        <label>Allow Guest Access</label>
                    </div>
                    <div class="form-group">
                        <label>Max Upload Size</label>
                        <select id="setting-upload">
                            <option value="10M">10 MB</option>
                            <option value="50M">50 MB</option>
                            <option value="100M">100 MB</option>
                            <option value="500M">500 MB</option>
                        </select>
                    </div>
                    <button type="submit" class="btn primary">Save Settings</button>
                </form>
            </div>
        </div>
    </div>

    <button id="open-app-btn" class="open-app-btn hidden" onclick="openElement()">
        Open Element
    </button>
    </main>

    <script>
        const API_BASE = '/api/v1/matrix';
        let containerIP = null;

        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem('sbx_token');
            const response = await fetch(API_BASE + endpoint, {
                ...options,
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        async function loadStatus() {
            try {
                const data = await apiCall('/status');
                const badge = document.getElementById('status-badge');
                const btnStart = document.getElementById('btn-start');
                const btnStop = document.getElementById('btn-stop');
                const btnRestart = document.getElementById('btn-restart');
                const openBtn = document.getElementById('open-app-btn');

                if (!data.container_exists) {
                    document.getElementById('install-section').classList.remove('hidden');
                    document.getElementById('main-section').classList.add('hidden');
                    badge.textContent = 'Not Installed';
                    badge.className = 'status-badge stopped';
                    return;
                }

                document.getElementById('install-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');

                if (data.running) {
                    badge.textContent = 'Running';
                    badge.className = 'status-badge running';
                    btnStart.disabled = true;
                    btnStop.disabled = false;
                    btnRestart.disabled = false;
                    containerIP = data.container_ip;
                    openBtn.classList.remove('hidden');
                } else {
                    badge.textContent = 'Stopped';
                    badge.className = 'status-badge stopped';
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    btnRestart.disabled = true;
                    openBtn.classList.add('hidden');
                }

                document.getElementById('server-name').textContent = data.server_name || '-';
                document.getElementById('version').textContent = data.version || '-';
                document.getElementById('container-ip').textContent = data.container_ip || '-';
                document.getElementById('disk-usage').textContent = data.disk_usage || '-';

                if (data.running) {
                    loadUsers();
                    loadRooms();
                    loadBridges();
                }
            } catch (e) {
                console.error('Status load failed:', e);
            }
        }

        async function installMatrix(e) {
            e.preventDefault();
            const serverName = document.getElementById('install-server-name').value;
            if (!serverName) return;

            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Installing...';

            try {
                await apiCall(`/install?server_name=${encodeURIComponent(serverName)}`, { method: 'POST' });
                await loadStatus();
            } catch (err) {
                alert('Installation failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Install Matrix';
            }
        }

        async function startService() {
            document.getElementById('btn-start').disabled = true;
            try {
                await apiCall('/start', { method: 'POST' });
                await loadStatus();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function stopService() {
            document.getElementById('btn-stop').disabled = true;
            try {
                await apiCall('/stop', { method: 'POST' });
                await loadStatus();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function restartService() {
            document.getElementById('btn-restart').disabled = true;
            try {
                await apiCall('/restart', { method: 'POST' });
                await loadStatus();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function loadUsers() {
            try {
                const data = await apiCall('/users');
                const container = document.getElementById('users-list');
                if (!data.users || data.users.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No users yet</p></div>';
                    return;
                }
                container.innerHTML = data.users.map(u => `
                    <div class="list-item">
                        <div class="item-icon">${u.admin ? '👑' : '👤'}</div>
                        <div class="item-info">
                            <div class="item-name">${u.username}</div>
                            <div class="item-meta">${u.admin ? 'Admin' : 'User'}</div>
                        </div>
                        <button class="btn" onclick="resetPassword('${u.username}')">Reset Password</button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Load users failed:', e);
            }
        }

        async function loadRooms() {
            try {
                const data = await apiCall('/rooms');
                const container = document.getElementById('rooms-list');
                if (!data.rooms || data.rooms.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>No rooms yet</p></div>';
                    return;
                }
                container.innerHTML = data.rooms.map(r => `
                    <div class="list-item">
                        <div class="item-icon">${r.public ? '🌐' : '🔒'}</div>
                        <div class="item-info">
                            <div class="item-name">${r.room_id}</div>
                            <div class="item-meta">${r.public ? 'Public' : 'Private'}</div>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Load rooms failed:', e);
            }
        }

        async function loadBridges() {
            try {
                const data = await apiCall('/bridges');
                const container = document.getElementById('bridges-list');
                container.innerHTML = data.bridges.map(b => `
                    <div class="list-item">
                        <div class="item-icon">${getBridgeIcon(b.id)}</div>
                        <div class="item-info">
                            <div class="item-name">${b.name}</div>
                            <div class="item-meta">${b.description}</div>
                        </div>
                        <button class="btn ${b.installed ? '' : 'primary'}"
                                onclick="installBridge('${b.id}')"
                                ${b.installed ? 'disabled' : ''}>
                            ${b.installed ? 'Installed' : 'Install'}
                        </button>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Load bridges failed:', e);
            }
        }

        function getBridgeIcon(id) {
            const icons = {
                telegram: '📱',
                discord: '🎮',
                slack: '💬',
                signal: '🔐',
                whatsapp: '📞',
                irc: '💻'
            };
            return icons[id] || '🔗';
        }

        async function installBridge(bridgeId) {
            if (!confirm(`Install ${bridgeId} bridge?`)) return;
            try {
                await apiCall(`/bridges/${bridgeId}/install`, { method: 'POST' });
                alert('Bridge installed');
                loadBridges();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        function showCreateUser() {
            const username = prompt('Username:');
            if (!username) return;
            const password = prompt('Password (min 8 chars):');
            if (!password || password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }
            const admin = confirm('Make admin?');
            createUser(username, password, admin);
        }

        async function createUser(username, password, admin) {
            try {
                await apiCall('/users', {
                    method: 'POST',
                    body: JSON.stringify({ username, password, admin })
                });
                loadUsers();
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function resetPassword(username) {
            const password = prompt(`New password for ${username}:`);
            if (!password || password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }
            try {
                await apiCall(`/users/${username}/reset-password?password=${encodeURIComponent(password)}`, { method: 'POST' });
                alert('Password reset');
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function loadLogs() {
            try {
                const data = await apiCall('/logs?lines=200');
                document.getElementById('log-viewer').textContent = data.logs?.join('\n') || 'No logs';
            } catch (e) {
                document.getElementById('log-viewer').textContent = 'Error: ' + e.message;
            }
        }

        async function loadConfig() {
            try {
                const data = await apiCall('/config');
                document.getElementById('setting-registration').checked = data.enable_registration || false;
                document.getElementById('setting-guests').checked = data.allow_guest_access || false;
                document.getElementById('setting-upload').value = data.max_upload_size || '50M';
            } catch (e) {
                console.error('Config load failed:', e);
            }
        }

        async function saveSettings(e) {
            e.preventDefault();
            try {
                await apiCall('/config', {
                    method: 'POST',
                    body: JSON.stringify({
                        enable_registration: document.getElementById('setting-registration').checked,
                        allow_guest_access: document.getElementById('setting-guests').checked,
                        max_upload_size: document.getElementById('setting-upload').value
                    })
                });
                alert('Settings saved');
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function installElement() {
            if (!confirm('Install Element web client?')) return;
            try {
                const result = await apiCall('/element/install', { method: 'POST' });
                alert(result.message || 'Element installed');
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        async function createBackup() {
            if (!confirm('Create Matrix backup?')) return;
            try {
                const result = await apiCall('/backup', { method: 'POST' });
                alert(`Backup created: ${result.file} (${result.size})`);
            } catch (e) {
                alert('Failed: ' + e.message);
            }
        }

        function openElement() {
            if (containerIP) window.open(`http://${containerIP}/`, '_blank');
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
                if (tab.dataset.tab === 'logs') loadLogs();
                if (tab.dataset.tab === 'settings') loadConfig();
            });
        });

        if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark');
        }

        loadStatus();
        setInterval(loadStatus, 30000);
    </script>
    <script src="/shared/sidebar.js"></script>
</body>
</html>
