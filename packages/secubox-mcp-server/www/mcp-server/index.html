<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - MCP Server</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --p31-peak: #00dd44; --p31-mid: #009933; --p31-dim: #006622; --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7; --bg-card: var(--tube-pale); --border: var(--tube-soft); --text: #1b3d1c; --text-dim: var(--p31-dim); --primary: var(--p31-peak); --danger: #ff4466; --warning: #ffb347; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid var(--border); }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; background: var(--tube-light); border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: bold; color: var(--primary); }
        .stat-label { color: var(--text-dim); font-size: 0.85rem; margin-top: 0.25rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
        .card-header h2 { font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text); cursor: pointer; font-family: inherit; font-size: 0.85rem; }
        .btn:hover { background: var(--tube-light); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: #000; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; background: var(--tube-light); }
        .tool-card { background: var(--tube-light); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.75rem; }
        .tool-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .tool-name { font-weight: 600; font-family: monospace; }
        .tool-desc { font-size: 0.85rem; color: var(--text-dim); }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 0.5rem; }
        .status-dot.active { background: var(--primary); }
        .status-dot.inactive { background: var(--danger); }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        @media (max-width: 768px) { .main { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <div class="main">
        <div class="header">
            <h1>🔧 MCP Server</h1>
            <span class="badge">v1.0.0</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">🔌</div>
                <div class="stat-value" id="connected-clients">-</div>
                <div class="stat-label">Connected Clients</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🛠️</div>
                <div class="stat-value" id="available-tools">-</div>
                <div class="stat-label">Available Tools</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="requests-24h">-</div>
                <div class="stat-label">Requests (24h)</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⚡</div>
                <div class="stat-value" id="avg-latency">-</div>
                <div class="stat-label">Avg Latency (ms)</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🛠️ Available Tools</h2>
                <button class="btn btn-sm" onclick="loadTools()">Refresh</button>
            </div>
            <div id="tools-list">
                <div class="empty-state">Loading tools...</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>📋 Recent Requests</h2>
            </div>
            <table>
                <thead>
                    <tr><th>Time</th><th>Client</th><th>Tool</th><th>Latency</th><th>Status</th></tr>
                </thead>
                <tbody id="requests-table">
                    <tr><td colspan="5" class="empty-state">No recent requests</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-header">
                <h2>🔌 Connected Clients</h2>
            </div>
            <div id="clients-list">
                <div class="empty-state">No clients connected</div>
            </div>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/mcp-server';

        async function api(path, method = 'GET', data = null) {
            const token = localStorage.getItem('sbx_token');
            const headers = { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) };
            try {
                const res = await fetch(API + path, { method, headers, body: data ? JSON.stringify(data) : null });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                return res.json();
            } catch { return null; }
        }

        async function loadStatus() {
            const data = await api('/status');
            if (!data) return;
            document.getElementById('connected-clients').textContent = data.connected_clients || 0;
            document.getElementById('available-tools').textContent = data.available_tools || 0;
            document.getElementById('requests-24h').textContent = (data.requests_24h || 0).toLocaleString();
            document.getElementById('avg-latency').textContent = data.avg_latency_ms || 0;
        }

        async function loadTools() {
            const data = await api('/tools');
            const container = document.getElementById('tools-list');
            if (!data?.tools?.length) {
                container.innerHTML = '<div class="empty-state">No tools available</div>';
                return;
            }
            container.innerHTML = data.tools.map(t => `
                <div class="tool-card">
                    <div class="tool-header">
                        <span class="tool-name">${t.name}</span>
                        <span><span class="status-dot ${t.enabled ? 'active' : 'inactive'}"></span>${t.enabled ? 'Active' : 'Disabled'}</span>
                    </div>
                    <div class="tool-desc">${t.description || 'No description'}</div>
                </div>
            `).join('');
        }

        async function loadRequests() {
            const data = await api('/requests?limit=10');
            const tbody = document.getElementById('requests-table');
            if (!data?.requests?.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No recent requests</td></tr>';
                return;
            }
            tbody.innerHTML = data.requests.map(r => `
                <tr>
                    <td>${new Date(r.timestamp).toLocaleString()}</td>
                    <td>${r.client || '-'}</td>
                    <td><code>${r.tool}</code></td>
                    <td>${r.latency_ms || '-'}ms</td>
                    <td style="color:${r.success ? 'var(--primary)' : 'var(--danger)'};">${r.success ? '✓' : '✗'}</td>
                </tr>
            `).join('');
        }

        loadStatus();
        loadTools();
        loadRequests();
        setInterval(loadStatus, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
