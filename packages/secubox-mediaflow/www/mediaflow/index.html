<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Media Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #00dd44;
            --p31-hot: #00ff55;
            --p31-mid: #009933;
            --p31-dim: #006622;
            --p31-ghost: #003311;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-light: #e8f5e9;
            --tube-pale: #c8e6c9;
            --tube-soft: #a5d6a7;
            /* Legacy mappings */
            --bg-dark: var(--tube-light);
            --bg-card: var(--tube-pale);
            --bg-sidebar: var(--tube-black);
            --border: var(--tube-soft);
            --text: var(--tube-dark);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-light);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--tube-dark);
            display: flex;
            min-height: 100vh;
        }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: var(--bg-dark); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--cyan); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.video .value { color: var(--red); }
        .stat-card.audio .value { color: var(--green); }
        .stat-card.bandwidth .value { color: var(--cyan); }
        .stat-card.streams .value { color: var(--purple); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge.video { background: rgba(248,81,73,0.2); color: var(--red); }
        .badge.audio { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.live { background: rgba(163,113,247,0.2); color: var(--purple); }
        .progress { background: var(--bg-dark); border-radius: 4px; height: 6px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--cyan); }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--tube-soft);
            background: var(--tube-pale);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-pale);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-light);
            border: 1px solid var(--tube-soft);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-light); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-light">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>📺 Media Flow</h1>
            <button class="btn" onclick="refresh()">Refresh</button>
        </header>

        <div class="grid">
            <div class="stat-card video">
                <div class="value" id="videoStreams">-</div>
                <div class="label">Video Streams</div>
            </div>
            <div class="stat-card audio">
                <div class="value" id="audioStreams">-</div>
                <div class="label">Audio Streams</div>
            </div>
            <div class="stat-card bandwidth">
                <div class="value" id="bandwidth">-</div>
                <div class="label">Bandwidth (Mbps)</div>
            </div>
            <div class="stat-card streams">
                <div class="value" id="activeClients">-</div>
                <div class="label">Active Clients</div>
            </div>
        </div>

        <div class="card">
            <h2>Active Streams</h2>
            <table>
                <thead><tr><th>Client</th><th>Type</th><th>Service</th><th>Bandwidth</th><th>Duration</th></tr></thead>
                <tbody id="streamsTable"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Top Media Services</h2>
            <table>
                <thead><tr><th>Service</th><th>Streams</th><th>Bandwidth</th><th>Usage %</th></tr></thead>
                <tbody id="servicesTable"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        const API = '/api/v1/mediaflow';

        async function api(path) {
            try {
                const res = await fetch(API + path, { credentials: 'include' });
                return res.json();
            } catch { return {}; }
        }

        async function refresh() {
            const status = await api('/status');
            document.getElementById('videoStreams').textContent = status.video_streams || 0;
            document.getElementById('audioStreams').textContent = status.audio_streams || 0;
            document.getElementById('bandwidth').textContent = (status.bandwidth_mbps || 0).toFixed(1);
            document.getElementById('activeClients').textContent = status.active_clients || 0;

            const streams = await api('/streams');
            const streamsBody = document.getElementById('streamsTable');
            if (streams.streams && streams.streams.length > 0) {
                streamsBody.innerHTML = streams.streams.map(s => `
                    <tr>
                        <td style="font-family:monospace">${s.client_ip}</td>
                        <td><span class="badge ${s.type}">${s.type}</span></td>
                        <td>${s.service || 'Unknown'}</td>
                        <td>${s.bandwidth || '-'}</td>
                        <td>${s.duration || '-'}</td>
                    </tr>
                `).join('');
            } else {
                streamsBody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No active streams</td></tr>';
            }

            const services = await api('/services');
            const servicesBody = document.getElementById('servicesTable');
            if (services.services && services.services.length > 0) {
                servicesBody.innerHTML = services.services.map(s => `
                    <tr>
                        <td>${s.name}</td>
                        <td>${s.streams}</td>
                        <td>${s.bandwidth}</td>
                        <td style="width:100px">
                            <div class="progress"><div class="progress-bar" style="width:${s.percent || 0}%"></div></div>
                        </td>
                    </tr>
                `).join('');
            } else {
                servicesBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim)">No media services detected</td></tr>';
            }
        }

        refresh();
        setInterval(refresh, 5000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
