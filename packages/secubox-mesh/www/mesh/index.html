<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Mesh Network</title>
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            --p31-peak: #00dd44; --p31-hot: #00ff55; --p31-mid: #009933; --p31-dim: #006622; --p31-ghost: #003311;
            --p31-decay: #ffb347; --p31-decay-dim: #cc7722;
            --tube-light: #e8f5e9; --tube-pale: #c8e6c9; --tube-soft: #a5d6a7;
            --bg-dark: var(--tube-light); --bg-card: var(--tube-pale); --bg-sidebar: var(--tube-black);
            --border: var(--tube-soft); --text: #1a1a1a; --text-dim: var(--p31-dim);
            --primary: var(--p31-peak); --cyan: var(--p31-peak); --green: var(--p31-peak);
            --red: var(--p31-decay); --yellow: var(--p31-decay); --purple: var(--p31-hot);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Courier Prime', monospace; background: var(--tube-light); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .header h1 { font-size: 1.5rem; color: var(--p31-dim); }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(0,221,68,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.danger { background: rgba(255,179,71,0.1); border-color: var(--red); color: var(--red); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--p31-dim); display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.5rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.online .value { color: var(--green); }
        .stat-card.offline .value { color: var(--red); }
        .stat-card.syncing .value { color: var(--yellow); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; }
        tr:hover { background: rgba(0,221,68,0.05); }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .badge.online { background: rgba(0,221,68,0.2); color: var(--green); }
        .badge.offline { background: rgba(255,179,71,0.2); color: var(--red); }
        .badge.active { background: rgba(0,221,68,0.2); color: var(--green); }
        .badge.inactive { background: rgba(255,179,71,0.2); color: var(--red); }
        .ipv6-box { font-family: monospace; font-size: 0.8rem; background: var(--bg-dark); padding: 0.75rem; border-radius: 4px; border: 1px solid var(--border); word-break: break-all; margin-top: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.875rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); }
        .form-row { display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 120px; }
        .announce-form { display: none; padding: 1rem; border: 1px dashed var(--border); border-radius: 6px; margin-bottom: 1rem; background: var(--bg-dark); }
        .announce-form.show { display: block; }
        .resolve-result { margin-top: 1rem; padding: 1rem; background: var(--bg-dark); border-radius: 6px; font-family: monospace; font-size: 0.875rem; display: none; }
        .resolve-result.show { display: block; }
        .resolve-result.success { border-left: 3px solid var(--green); }
        .resolve-result.error { border-left: 3px solid var(--red); color: var(--red); }
        .empty-state { text-align: center; padding: 2rem; color: var(--text-dim); }
        .status-indicator { display: flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.online { background: var(--green); }
        .status-dot.offline { background: var(--red); }
        .toast { position: fixed; bottom: 20px; right: 20px; padding: 1rem 1.5rem; background: var(--bg-card); border: 1px solid var(--green); border-radius: 6px; transform: translateY(100px); opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: var(--red); color: var(--red); }
        .loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>Mesh Network</h1>
            <div class="header-actions">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Loading...</span>
                </div>
                <button class="btn" onclick="loadAll()">Refresh</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card" id="yggCard">
                <div class="value" id="yggStatus">--</div>
                <div class="label">Yggdrasil</div>
            </div>
            <div class="stat-card" id="meshCard">
                <div class="value" id="meshStatus">--</div>
                <div class="label">Mesh DNS</div>
            </div>
            <div class="stat-card">
                <div class="value" id="localCount">0</div>
                <div class="label">Local Services</div>
            </div>
            <div class="stat-card">
                <div class="value" id="remoteCount">0</div>
                <div class="label">Remote Domains</div>
            </div>
            <div class="stat-card" id="syncCard">
                <div class="value" id="syncStatus">Idle</div>
                <div class="label">Sync Status</div>
            </div>
        </div>

        <div class="card">
            <div class="ipv6-box">
                <strong>Yggdrasil IPv6:</strong> <span id="yggIPv6">Not available</span>
            </div>
        </div>

        <div class="card">
            <h2>Local Services <button class="btn primary" style="font-size:0.75rem;padding:0.25rem 0.75rem" onclick="toggleAnnounce()">+ Announce</button></h2>
            <div class="announce-form" id="announceForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Service Name</label>
                        <input type="text" id="newName" placeholder="myservice">
                    </div>
                    <div class="form-group">
                        <label>Type</label>
                        <select id="newType">
                            <option value="http">HTTP</option>
                            <option value="https">HTTPS</option>
                            <option value="ssh">SSH</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Port</label>
                        <input type="number" id="newPort" placeholder="80">
                    </div>
                </div>
                <div style="display:flex;gap:0.5rem;margin-top:0.5rem">
                    <button class="btn primary" onclick="announceService()">Announce</button>
                    <button class="btn" onclick="toggleAnnounce()">Cancel</button>
                </div>
            </div>
            <table>
                <thead><tr><th>Name</th><th>Type</th><th>Port</th><th>Meshname</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="localServices"><tr><td colspan="6" class="empty-state">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Remote Domains <button class="btn" style="font-size:0.75rem;padding:0.25rem 0.75rem" id="syncBtn" onclick="syncDomains()">Sync Now</button></h2>
            <table>
                <thead><tr><th>Domain</th><th>IPv6 Address</th><th>Type</th><th>Last Seen</th></tr></thead>
                <tbody id="remoteDomains"><tr><td colspan="4" class="empty-state">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Resolve Domain</h2>
            <div class="form-row">
                <div class="form-group" style="flex:3">
                    <input type="text" id="resolveDomain" placeholder="example.meshname" onkeypress="if(event.key==='Enter')resolveDomain()">
                </div>
                <button class="btn primary" onclick="resolveDomain()">Resolve</button>
            </div>
            <div class="resolve-result" id="resolveResult">
                <pre id="resolveOutput"></pre>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const API = '/api/v1/mesh';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/portal/login.html'; return {}; }
                if (!res.ok) throw new Error(res.statusText);
                return await res.json();
            } catch (e) { console.error(e); return { error: e.message }; }
        }

        function toast(msg, error = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (error ? ' error' : '');
            setTimeout(() => t.className = 'toast', 3000);
        }

        async function loadStatus() {
            const d = await api('/status');
            const yggOn = d.yggdrasil_running;
            const meshOn = d.mesh_dns_running;

            document.getElementById('yggStatus').textContent = yggOn ? 'Online' : 'Offline';
            document.getElementById('yggCard').className = 'stat-card ' + (yggOn ? 'online' : 'offline');
            document.getElementById('meshStatus').textContent = meshOn ? 'Online' : 'Offline';
            document.getElementById('meshCard').className = 'stat-card ' + (meshOn ? 'online' : 'offline');
            document.getElementById('localCount').textContent = d.local_services_count || 0;
            document.getElementById('remoteCount').textContent = d.remote_domains_count || 0;
            document.getElementById('syncStatus').textContent = d.sync_status || 'Idle';
            document.getElementById('yggIPv6').textContent = d.yggdrasil_ipv6 || 'Not available';

            document.getElementById('statusDot').className = 'status-dot ' + (yggOn && meshOn ? 'online' : 'offline');
            document.getElementById('statusText').textContent = yggOn && meshOn ? 'Connected' : 'Disconnected';
        }

        async function loadLocalServices() {
            const d = await api('/services');
            const tbody = document.getElementById('localServices');
            if (!d.services || d.services.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No local services announced</td></tr>';
                return;
            }
            tbody.innerHTML = d.services.map(s => `<tr>
                <td>${esc(s.name)}</td>
                <td>${esc(s.type)}</td>
                <td>${s.port}</td>
                <td style="font-family:monospace;font-size:0.8rem">${esc(s.meshname || '--')}</td>
                <td><span class="badge ${s.active ? 'active' : 'inactive'}">${s.active ? 'Active' : 'Inactive'}</span></td>
                <td><button class="btn danger" style="padding:0.25rem 0.5rem;font-size:0.75rem" onclick="revokeService('${esc(s.name)}')">Revoke</button></td>
            </tr>`).join('');
        }

        async function loadRemoteDomains() {
            const d = await api('/domains');
            const tbody = document.getElementById('remoteDomains');
            if (!d.domains || d.domains.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No remote domains discovered</td></tr>';
                return;
            }
            tbody.innerHTML = d.domains.map(r => `<tr>
                <td style="font-family:monospace">${esc(r.name)}</td>
                <td style="font-family:monospace;font-size:0.8rem">${esc(r.ipv6)}</td>
                <td>${esc(r.type || 'unknown')}</td>
                <td>${r.last_seen ? new Date(r.last_seen * 1000).toLocaleString() : '--'}</td>
            </tr>`).join('');
        }

        function toggleAnnounce() {
            document.getElementById('announceForm').classList.toggle('show');
        }

        async function announceService() {
            const name = document.getElementById('newName').value.trim();
            const type = document.getElementById('newType').value;
            const port = document.getElementById('newPort').value;
            if (!name || !port) { toast('Name and port required', true); return; }
            const r = await api('/announce', { method: 'POST', body: JSON.stringify({ name, type, port: parseInt(port) }) });
            if (r.error) { toast('Failed: ' + r.error, true); return; }
            toast('Service announced');
            toggleAnnounce();
            document.getElementById('newName').value = '';
            document.getElementById('newPort').value = '';
            loadLocalServices();
            loadStatus();
        }

        async function revokeService(name) {
            if (!confirm('Revoke service "' + name + '"?')) return;
            await api('/revoke', { method: 'POST', body: JSON.stringify({ name }) });
            toast('Service revoked');
            loadLocalServices();
            loadStatus();
        }

        async function syncDomains() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Syncing';
            await api('/sync', { method: 'POST' });
            btn.disabled = false;
            btn.textContent = 'Sync Now';
            toast('Sync complete');
            loadRemoteDomains();
            loadStatus();
        }

        async function resolveDomain() {
            const domain = document.getElementById('resolveDomain').value.trim();
            if (!domain) { toast('Enter a domain', true); return; }
            const d = await api('/resolve?domain=' + encodeURIComponent(domain));
            const div = document.getElementById('resolveResult');
            const out = document.getElementById('resolveOutput');
            div.classList.add('show');
            if (d.error) {
                div.className = 'resolve-result show error';
                out.textContent = 'Error: ' + d.error;
            } else {
                div.className = 'resolve-result show success';
                out.textContent = JSON.stringify(d, null, 2);
            }
        }

        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function loadAll() { loadStatus(); loadLocalServices(); loadRemoteDomains(); }

        document.addEventListener('DOMContentLoaded', () => {
            loadAll();
            setInterval(loadStatus, 30000);
        });
    </script>
</body>
</html>
