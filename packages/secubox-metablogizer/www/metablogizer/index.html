<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - MetaBlogizer</title>
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root { --bg-dark: #0d1117; --bg-card: #161b22; --bg-sidebar: #0d1117; --border: #30363d; --text: #c9d1d9; --text-dim: #8b949e; --primary: #58a6ff; --cyan: #00d4ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #a371f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--bg-dark); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .logo span:nth-child(1) { color: var(--cyan); } .logo span:nth-child(2) { color: var(--red); } .logo span:nth-child(3) { color: var(--green); } .logo span:nth-child(4) { color: var(--yellow); }
        .nav-section { padding: 0.5rem 0; }
        .nav-section-title { padding: 0.5rem 1rem; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.1); color: var(--primary); border-left-color: var(--primary); }
        .nav-item .icon { width: 20px; text-align: center; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; margin-left: 0.5rem; }
        .btn.primary { background: rgba(88,166,255,0.1); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); color: var(--green); }
        .btn.danger { background: rgba(248,81,73,0.1); color: var(--red); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: var(--purple); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { margin-bottom: 1rem; }
        .site-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .site-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
        .site-card h3 { color: var(--purple); margin-bottom: 0.5rem; }
        .site-card .domain { color: var(--text-dim); font-size: 0.875rem; margin-bottom: 0.75rem; }
        .site-card .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .badge.published { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.draft { background: rgba(139,148,158,0.2); color: var(--text-dim); }
        .form-row { display: flex; gap: 1rem; margin-bottom: 1rem; }
        .form-row input { flex: 1; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-dark); color: var(--text); }
        .upload-zone { border: 2px dashed var(--border); border-radius: 8px; padding: 1.5rem; text-align: center; cursor: pointer; margin-top: 1rem; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
    <header class="header">
        <h1>MetaBlogizer</h1>
        <div><button class="btn" onclick="refresh()">Refresh</button></div>
    </header>

    <div class="stats-row">
        <div class="stat-card"><div class="value" id="site-count">-</div><div class="label">Sites</div></div>
        <div class="stat-card"><div class="value" id="published-count">-</div><div class="label">Published</div></div>
        <div class="stat-card"><div class="value" id="tor-status">-</div><div class="label">Tor</div></div>
    </div>

    <div class="card">
        <h2>Create Site</h2>
        <div class="form-row">
            <input type="text" id="new-name" placeholder="Site name">
            <input type="text" id="new-domain" placeholder="Domain (optional)">
            <button class="btn primary" onclick="createSite()">Create</button>
        </div>
    </div>

    <div class="card">
        <h2>Sites</h2>
        <div class="site-grid" id="site-list">Loading...</div>
    </div>

    <script>
        const API = '/api/v1/metablogizer';
        const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sbx_token') || '') });
        async function api(path, opts = {}) {
            try { return (await fetch(API + path, { ...opts, headers: { ...headers(), ...(opts.headers || {}) } })).json(); }
            catch { return {}; }
        }

        async function loadStatus() {
            const d = await api('/status');
            document.getElementById('site-count').textContent = d.site_count || 0;
            document.getElementById('published-count').textContent = d.published_count || 0;
            
            const tor = await api('/tor/status');
            document.getElementById('tor-status').textContent = tor.enabled ? 'Active' : 'Off';
            document.getElementById('tor-status').style.color = tor.enabled ? 'var(--green)' : 'var(--text-dim)';
        }

        async function loadSites() {
            const d = await api('/sites');
            const grid = document.getElementById('site-list');
            const sites = d.sites || [];
            if (!sites.length) { grid.innerHTML = '<p style="color:var(--text-dim)">No sites yet</p>'; return; }
            grid.innerHTML = sites.map(s => `
                <div class="site-card">
                    <h3>${s.name} <span class="badge ${s.published ? 'published' : 'draft'}">${s.published ? 'Published' : 'Draft'}</span></h3>
                    <div class="domain">${s.domain}</div>
                    <div class="actions">
                        <button class="btn" onclick="window.open('https://${s.domain}')">Visit</button>
                        <button class="btn primary" onclick="publishSite('${s.name}')">Publish</button>
                        <button class="btn danger" onclick="deleteSite('${s.name}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function createSite() {
            const name = document.getElementById('new-name').value.trim();
            const domain = document.getElementById('new-domain').value.trim();
            if (!name) { alert('Name required'); return; }
            const r = await api('/site', { method: 'POST', body: JSON.stringify({ name, domain: domain || undefined }) });
            if (r.success) { refresh(); document.getElementById('new-name').value = ''; document.getElementById('new-domain').value = ''; }
        }

        async function publishSite(name) {
            const r = await api(`/site/${name}/publish`, { method: 'POST' });
            if (r.success) refresh();
        }

        async function deleteSite(name) {
            if (!confirm(`Delete "${name}"?`)) return;
            await api(`/site/${name}`, { method: 'DELETE' });
            refresh();
        }

        function refresh() { loadStatus(); loadSites(); }
        refresh();
    </script>
</main>
</body>
</html>
