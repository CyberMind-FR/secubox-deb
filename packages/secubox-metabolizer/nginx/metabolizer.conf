# /etc/nginx/secubox.d/metabolizer.conf
# Installed by secubox-metabolizer package

# Metabolizer frontend
location /metabolizer/ {
    alias /usr/share/secubox/www/metabolizer/;
    index index.html;
    try_files $uri $uri/ /metabolizer/index.html;
}

# Metabolizer API
location /api/v1/metabolizer/ {
    proxy_pass http://unix:/run/secubox/metabolizer.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
