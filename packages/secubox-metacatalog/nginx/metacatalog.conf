# /etc/nginx/secubox.d/metacatalog.conf
# Installed by secubox-metacatalog package

# API proxy
location /api/v1/metacatalog/ {
    proxy_pass http://unix:/run/secubox/metacatalog.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# Static frontend
location /metacatalog/ {
    alias /usr/share/secubox/www/metacatalog/;
    index index.html;
    try_files $uri $uri/ /metacatalog/index.html;
}
