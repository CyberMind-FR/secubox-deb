# /etc/nginx/secubox.d/mirror.conf
# Installed by secubox-mirror package

# API proxy
location /api/v1/mirror/ {
    proxy_pass http://unix:/run/secubox/mirror.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# Static frontend
location /mirror/ {
    alias /usr/share/secubox/www/mirror/;
    index index.html;
    try_files $uri $uri/ /mirror/index.html;
}
