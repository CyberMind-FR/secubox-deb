<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMPM - SecuBox</title>
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <style>
        .main-content {
            margin-left: 200px;
            padding: 2rem;
        }
        .status-card {
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #333);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color, #333);
        }
        .status-row:last-child { border-bottom: none; }
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .badge-success { background: #2d5a27; color: #7fff7f; }
        .badge-info { background: #27455a; color: #7fd4ff; }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        .btn-primary { background: var(--accent-color, #4a9eff); color: #000; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-secondary { background: #555; color: #fff; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
        .tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color, #333);
            margin-bottom: 1rem;
        }
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border: none;
            background: transparent;
            color: #888;
            font-size: 1rem;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: var(--accent-color, #4a9eff);
            border-bottom-color: var(--accent-color, #4a9eff);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a2e;
            color: #fff;
        }
        .module-list {
            display: grid;
            gap: 1rem;
        }
        .module-card {
            background: var(--card-bg, #1a1a2e);
            border: 1px solid var(--border-color, #333);
            border-radius: 8px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .module-info h4 {
            margin: 0 0 0.25rem 0;
            color: var(--accent-color, #4a9eff);
        }
        .module-info .desc {
            color: #aaa;
            font-size: 0.9rem;
            margin: 0;
        }
        .module-info .meta {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.25rem;
        }
        .category-tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            background: #333;
            color: #aaa;
            margin-right: 0.5rem;
        }
        .filter-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.25rem 0.75rem;
            border: 1px solid #333;
            border-radius: 15px;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .filter-btn.active {
            background: var(--accent-color, #4a9eff);
            color: #000;
            border-color: var(--accent-color, #4a9eff);
        }
        .actions { white-space: nowrap; }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <h1>📦 MMPM</h1>
        <p>MagicMirror Package Manager</p>

        <div class="status-card">
            <div class="status-row">
                <span>Installed Modules</span>
                <span id="installed-count" class="badge badge-success">-</span>
            </div>
            <div class="status-row">
                <span>Available in Registry</span>
                <span id="available-count" class="badge badge-info">-</span>
            </div>
            <div style="margin-top: 1rem;">
                <button class="btn btn-secondary" onclick="refreshDatabase()">Refresh Registry</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="showTab('installed')">Installed</button>
            <button class="tab" onclick="showTab('browse')">Browse</button>
            <button class="tab" onclick="showTab('search')">Search</button>
        </div>

        <div id="tab-installed" class="tab-content active">
            <div id="installed-list" class="module-list">
                <p>Loading installed modules...</p>
            </div>
        </div>

        <div id="tab-browse" class="tab-content">
            <div class="filter-row" id="category-filters">
                <button class="filter-btn active" data-category="">All</button>
            </div>
            <div id="available-list" class="module-list">
                <p>Loading available modules...</p>
            </div>
        </div>

        <div id="tab-search" class="tab-content">
            <div class="search-box">
                <input type="text" id="search-query" placeholder="Search modules (e.g., spotify, calendar, weather)">
                <button class="btn btn-primary" onclick="searchModules()">Search</button>
            </div>
            <div id="search-results" class="module-list">
                <p>Enter a search query above...</p>
            </div>
        </div>
    </div>

    <script src="/shared/sidebar.js"></script>
    <script>
        const API = '/api/v1/mmpm';
        let currentCategory = '';

        function showTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab-content#tab-${tabName}`).classList.add('active');
            document.querySelector(`.tab[onclick="showTab('${tabName}')"]`).classList.add('active');

            if (tabName === 'installed') loadInstalled();
            if (tabName === 'browse') loadAvailable();
        }

        async function loadStatus() {
            try {
                const res = await fetch(`${API}/status`);
                const data = await res.json();
                document.getElementById('installed-count').textContent = data.installed_count;
                document.getElementById('available-count').textContent = data.available_count;
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        async function loadInstalled() {
            try {
                const res = await fetch(`${API}/modules/installed`);
                const data = await res.json();
                const list = document.getElementById('installed-list');

                if (data.modules && data.modules.length > 0) {
                    list.innerHTML = data.modules.map(m => `
                        <div class="module-card">
                            <div class="module-info">
                                <h4>${m.name}</h4>
                                <p class="desc">${m.description || 'No description'}</p>
                                <p class="meta">
                                    ${m.version ? `v${m.version}` : ''}
                                    ${m.is_git ? '• Git repo' : ''}
                                </p>
                            </div>
                            <div class="actions">
                                ${m.is_git ? `<button class="btn btn-sm btn-secondary" onclick="updateModule('${m.name}')">Update</button>` : ''}
                                <button class="btn btn-sm btn-danger" onclick="uninstallModule('${m.name}')">Remove</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p>No third-party modules installed</p>';
                }
            } catch (e) {
                console.error('Failed to load installed modules:', e);
            }
        }

        async function loadCategories() {
            try {
                const res = await fetch(`${API}/modules/categories`);
                const data = await res.json();
                const container = document.getElementById('category-filters');

                container.innerHTML = '<button class="filter-btn active" data-category="" onclick="filterCategory(\'\')">All</button>';
                data.categories.forEach(cat => {
                    container.innerHTML += `<button class="filter-btn" data-category="${cat}" onclick="filterCategory('${cat}')">${cat}</button>`;
                });
            } catch (e) {
                console.error('Failed to load categories:', e);
            }
        }

        async function loadAvailable() {
            try {
                let url = `${API}/modules/available`;
                if (currentCategory) {
                    url += `?category=${currentCategory}`;
                }

                const res = await fetch(url);
                const data = await res.json();
                const list = document.getElementById('available-list');

                if (data.modules && data.modules.length > 0) {
                    list.innerHTML = data.modules.map(m => `
                        <div class="module-card">
                            <div class="module-info">
                                <h4>${m.name}</h4>
                                <p class="desc">${m.description || ''}</p>
                                <p class="meta">
                                    <span class="category-tag">${m.category || 'other'}</span>
                                    ${m.author ? `by ${m.author}` : ''}
                                </p>
                            </div>
                            <div class="actions">
                                <button class="btn btn-sm btn-primary" onclick="installModule('${m.name}')">Install</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p>No modules found</p>';
                }
            } catch (e) {
                console.error('Failed to load available modules:', e);
            }
        }

        function filterCategory(category) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.category === category);
            });
            loadAvailable();
        }

        async function searchModules() {
            const query = document.getElementById('search-query').value.trim();
            if (!query) return;

            try {
                const res = await fetch(`${API}/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                const list = document.getElementById('search-results');

                if (data.results && data.results.length > 0) {
                    list.innerHTML = data.results.map(m => `
                        <div class="module-card">
                            <div class="module-info">
                                <h4>${m.name}</h4>
                                <p class="desc">${m.description || ''}</p>
                                <p class="meta">
                                    <span class="category-tag">${m.category || 'other'}</span>
                                </p>
                            </div>
                            <div class="actions">
                                <button class="btn btn-sm btn-primary" onclick="installModule('${m.name}')">Install</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p>No modules found</p>';
                }
            } catch (e) {
                console.error('Search failed:', e);
            }
        }

        async function installModule(name) {
            if (!confirm(`Install ${name}?`)) return;

            try {
                const res = await fetch(`${API}/modules/install`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Install failed');
                }

                alert('Module installed! Restart MagicMirror to activate.');
                loadStatus();
                loadInstalled();
            } catch (e) {
                alert('Failed to install: ' + e.message);
            }
        }

        async function uninstallModule(name) {
            if (!confirm(`Remove ${name}?`)) return;

            try {
                const res = await fetch(`${API}/modules/${name}`, { method: 'DELETE' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Uninstall failed');
                }

                loadStatus();
                loadInstalled();
            } catch (e) {
                alert('Failed to uninstall: ' + e.message);
            }
        }

        async function updateModule(name) {
            try {
                const res = await fetch(`${API}/modules/${name}/update`, { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Update failed');
                }

                alert('Module updated! Restart MagicMirror to apply changes.');
                loadInstalled();
            } catch (e) {
                alert('Failed to update: ' + e.message);
            }
        }

        async function refreshDatabase() {
            try {
                await fetch(`${API}/modules/refresh`, { method: 'POST' });
                loadStatus();
                loadCategories();
                loadAvailable();
                alert('Registry refreshed!');
            } catch (e) {
                alert('Failed to refresh: ' + e.message);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadStatus();
            loadInstalled();
            loadCategories();
        });

        // Enter key for search
        document.getElementById('search-query').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchModules();
        });
    </script>
</body>
</html>
