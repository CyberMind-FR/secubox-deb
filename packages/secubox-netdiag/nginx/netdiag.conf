# /etc/nginx/secubox.d/netdiag.conf
# Installed by secubox-netdiag package

# API endpoint
location /api/v1/netdiag/ {
    proxy_pass http://unix:/run/secubox/netdiag.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# Frontend
location /netdiag/ {
    alias /usr/share/secubox/www/netdiag/;
    index index.html;
    try_files $uri $uri/ /netdiag/index.html;
}
