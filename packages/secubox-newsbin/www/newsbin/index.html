<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsbin - SecuBox</title>
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --news-orange: #ff6f00; --news-light: #ffa040; --news-dark: #c43e00; }
        body.dark { --news-orange: #ffa040; --news-light: #ffcc80; --news-dark: #ff6f00; }
        .accent { color: var(--news-orange); }
        .accent-bg { background-color: var(--news-orange); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.875rem; }
        .status-badge.running { background: var(--success-bg); color: var(--success); }
        .status-badge.stopped { background: var(--error-bg); color: var(--error); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.75rem; font-weight: bold; color: var(--news-orange); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .action-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 0.25rem; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--hover); }
        .btn.primary { background: var(--news-orange); color: white; border-color: var(--news-orange); }
        .btn.primary:hover { background: var(--news-dark); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .tab { padding: 0.75rem 1rem; border: none; background: none; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--news-orange); border-bottom-color: var(--news-orange); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .entry-list { display: grid; gap: 0.5rem; }
        .entry-item { padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; }
        .entry-title { font-weight: 500; margin-bottom: 0.25rem; }
        .entry-title a { color: var(--text); text-decoration: none; }
        .entry-title a:hover { color: var(--news-orange); }
        .entry-meta { font-size: 0.875rem; color: var(--text-secondary); }
        .feed-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; margin-bottom: 0.5rem; }
        .feed-icon { font-size: 1.25rem; }
        .feed-info { flex: 1; }
        .feed-name { font-weight: 500; }
        .feed-meta { font-size: 0.875rem; color: var(--text-secondary); }
        .install-form { max-width: 400px; margin: 2rem auto; padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; }
        .install-form h2 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.25rem; background: var(--surface); color: var(--text); }
        .open-app-btn { position: fixed; bottom: 1rem; right: 1rem; padding: 1rem 1.5rem; background: var(--news-orange); color: white; border: none; border-radius: 2rem; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 12px rgba(255, 111, 0, 0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body class="crt-light">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content">
    <div class="container">
        <div class="header">
            <h1><span class="accent">Newsbin</span> RSS Reader</h1>
            <span id="status-badge" class="status-badge stopped">Stopped</span>
        </div>

        <div id="install-section" class="install-form hidden">
            <h2>Install Newsbin</h2>
            <form onsubmit="install(event)">
                <div class="form-group"><label>Admin Username</label><input type="text" id="admin-user" value="admin" required></div>
                <div class="form-group"><label>Admin Password</label><input type="password" id="admin-pass" minlength="6" required></div>
                <button type="submit" class="btn primary" style="width: 100%; margin-top: 1rem;">Install Miniflux</button>
            </form>
        </div>

        <div id="main-section" class="hidden">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="feeds-count">0</div><div class="stat-label">Feeds</div></div>
                <div class="stat-card"><div class="stat-value" id="entries-count">0</div><div class="stat-label">Entries</div></div>
            </div>

            <div class="action-bar">
                <button class="btn primary" id="btn-start" onclick="startService()">Start</button>
                <button class="btn" id="btn-stop" onclick="stopService()" disabled>Stop</button>
                <button class="btn" id="btn-restart" onclick="restartService()" disabled>Restart</button>
                <button class="btn" id="btn-refresh" onclick="refreshFeeds()" disabled>Refresh Feeds</button>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="entries">Unread</button>
                <button class="tab" data-tab="feeds">Feeds</button>
                <button class="tab" data-tab="add">Add Feed</button>
            </div>

            <div id="tab-entries" class="tab-content active">
                <div id="entries-list" class="entry-list"></div>
            </div>

            <div id="tab-feeds" class="tab-content">
                <div id="feeds-list"></div>
            </div>

            <div id="tab-add" class="tab-content">
                <form onsubmit="addFeed(event)" style="max-width: 400px;">
                    <div class="form-group"><label>Feed URL</label><input type="url" id="feed-url" placeholder="https://example.com/feed.xml" required></div>
                    <button type="submit" class="btn primary">Add Feed</button>
                </form>
            </div>
        </div>
    </div>
    <button id="open-app-btn" class="open-app-btn hidden" onclick="openApp()">Open Miniflux</button>
    </main>

    <script>
        const API = '/api/v1/newsbin';
        let containerIP = null;

        async function api(endpoint, options = {}) {
            const r = await fetch(API + endpoint, { ...options, headers: { 'Authorization': 'Bearer ' + localStorage.getItem('sbx_token'), 'Content-Type': 'application/json', ...options.headers } });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }

        async function loadStatus() {
            try {
                const d = await api('/status');
                const badge = document.getElementById('status-badge');
                if (!d.container_exists) {
                    document.getElementById('install-section').classList.remove('hidden');
                    document.getElementById('main-section').classList.add('hidden');
                    badge.textContent = 'Not Installed'; badge.className = 'status-badge stopped';
                    return;
                }
                document.getElementById('install-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                if (d.running) {
                    badge.textContent = 'Running'; badge.className = 'status-badge running';
                    document.getElementById('btn-start').disabled = true;
                    document.getElementById('btn-stop').disabled = false;
                    document.getElementById('btn-restart').disabled = false;
                    document.getElementById('btn-refresh').disabled = false;
                    containerIP = d.container_ip;
                    document.getElementById('open-app-btn').classList.remove('hidden');
                    loadEntries(); loadFeeds();
                } else {
                    badge.textContent = 'Stopped'; badge.className = 'status-badge stopped';
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('btn-stop').disabled = true;
                    document.getElementById('btn-restart').disabled = true;
                    document.getElementById('btn-refresh').disabled = true;
                    document.getElementById('open-app-btn').classList.add('hidden');
                }
                document.getElementById('feeds-count').textContent = d.feeds || 0;
                document.getElementById('entries-count').textContent = d.entries || 0;
            } catch (e) { console.error(e); }
        }

        async function install(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true; btn.textContent = 'Installing...';
            try {
                await api(`/install?admin_user=${document.getElementById('admin-user').value}&admin_pass=${document.getElementById('admin-pass').value}`, { method: 'POST' });
                await loadStatus();
            } catch (err) { alert('Failed: ' + err.message); }
            finally { btn.disabled = false; btn.textContent = 'Install Miniflux'; }
        }

        async function startService() { document.getElementById('btn-start').disabled = true; try { await api('/start', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); } }
        async function stopService() { document.getElementById('btn-stop').disabled = true; try { await api('/stop', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); } }
        async function restartService() { document.getElementById('btn-restart').disabled = true; try { await api('/restart', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); } }

        async function loadEntries() {
            try {
                const d = await api('/entries?limit=30&unread=true');
                const list = document.getElementById('entries-list');
                if (!d.entries || d.entries.length === 0) { list.innerHTML = '<p style="padding:1rem;color:var(--text-secondary);">No unread entries</p>'; return; }
                list.innerHTML = d.entries.map(e => `
                    <div class="entry-item">
                        <div class="entry-title"><a href="${e.url}" target="_blank">${e.title}</a></div>
                        <div class="entry-meta">${e.feed?.title || ''} · ${new Date(e.published_at).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function loadFeeds() {
            try {
                const d = await api('/feeds');
                const list = document.getElementById('feeds-list');
                if (!d.feeds || d.feeds.length === 0) { list.innerHTML = '<p style="padding:1rem;color:var(--text-secondary);">No feeds. Add your first RSS feed!</p>'; return; }
                list.innerHTML = d.feeds.map(f => `
                    <div class="feed-item">
                        <div class="feed-icon">📰</div>
                        <div class="feed-info">
                            <div class="feed-name">${f.title}</div>
                            <div class="feed-meta">${f.site_url || f.feed_url}</div>
                        </div>
                        <button class="btn" onclick="deleteFeed(${f.id})" style="color: var(--error);">Delete</button>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function addFeed(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true;
            try {
                await api(`/feeds?url=${encodeURIComponent(document.getElementById('feed-url').value)}`, { method: 'POST' });
                document.getElementById('feed-url').value = '';
                loadFeeds(); loadStatus();
            } catch (err) { alert('Failed: ' + err.message); }
            finally { btn.disabled = false; }
        }

        async function deleteFeed(id) { if (!confirm('Delete this feed?')) return; try { await api(`/feeds/${id}`, { method: 'DELETE' }); loadFeeds(); } catch (e) { alert('Failed: ' + e.message); } }
        async function refreshFeeds() { try { await api('/refresh', { method: 'POST' }); alert('Refresh triggered'); } catch (e) { alert('Failed: ' + e.message); } }
        function openApp() { if (containerIP) window.open(`http://${containerIP}:8080/`, '_blank'); }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');
        loadStatus(); setInterval(loadStatus, 60000);
    </script>
    <script src="/shared/sidebar.js"></script>
</body>
</html>
