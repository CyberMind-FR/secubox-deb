# /etc/nginx/secubox.d/picobrew.conf
# Installed by secubox-picobrew - auto-registered on install, removed on purge

# Static frontend
location /picobrew/ {
    alias /usr/share/secubox/www/picobrew/;
    index index.html;
    try_files $uri $uri/ /picobrew/index.html;
}

# API backend
location /api/v1/picobrew/ {
    proxy_pass http://unix:/run/secubox/picobrew.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
