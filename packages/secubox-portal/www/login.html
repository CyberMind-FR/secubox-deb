<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecuBox — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/**
 * SecuBox Login — 6-Module Design System v2.0
 * Based on Charte Graphique Six-Module Color System
 * CyberMind · Gondwana · Notre-Dame-du-Cruet · Savoie
 */

:root {
  /* 6-MODULE COLOR SYSTEM */
  --auth-main:  #C04E24;  /* Orange — Auth stack */
  --auth-light: #E8845A;
  --wall-main:  #9A6010;  /* Yellow — Wall stack */
  --wall-light: #CC8820;
  --boot-main:  #803018;  /* Red — Boot stack */
  --boot-light: #C06040;
  --mind-main:  #3D35A0;  /* Violet — Mind stack */
  --mind-light: #6366F1;
  --root-main:  #0A5840;  /* Green — Root stack */
  --root-light: #148C66;
  --mesh-main:  #104A88;  /* Blue — Mesh stack */
  --mesh-light: #2080C0;

  /* DARK THEME */
  --bg-dark:      #0B0F14;
  --surface-dark: #141A24;
  --border-dark:  #1E2A38;
  --text-dark:    #E8ECF2;
  --muted-dark:   #6B7A8C;

  /* Active theme */
  --bg:       var(--bg-dark);
  --surface:  var(--surface-dark);
  --border:   var(--border-dark);
  --text:     var(--text-dark);
  --muted:    var(--muted-dark);
  --accent:   var(--root-main);
  --accent-light: var(--root-light);

  /* Typography */
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-display);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* Animated grid background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(10,88,64,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,88,64,0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 40s linear infinite;
  pointer-events: none;
}

@keyframes gridMove {
  0% { transform: translate(0,0); }
  100% { transform: translate(50px,50px); }
}

/* Left accent stripe effect */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--root-main), var(--mesh-main), var(--mind-main));
  z-index: 1000;
}

.container {
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  position: relative;
  overflow: hidden;
}

/* Top accent gradient bar */
.card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--root-main), var(--mesh-main), var(--mind-main));
}

.logo-section {
  text-align: center;
  margin-bottom: 36px;
}

.logo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--root-main), var(--root-light));
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  font-weight: 800;
  color: #fff;
  margin-bottom: 20px;
  box-shadow: 0 12px 32px rgba(10,88,64,0.3);
  transition: all 0.3s ease;
}

.logo:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 40px rgba(10,88,64,0.4);
}

.badge-device {
  display: inline-block;
  padding: 3px 10px;
  background: rgba(10,88,64,0.15);
  border: 1px solid var(--root-main);
  border-radius: 6px;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--root-light);
  margin-left: 10px;
  vertical-align: middle;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

.logo-title {
  font-size: 1.8rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.logo-title span {
  color: var(--root-light);
}

.logo-sub {
  color: var(--muted);
  font-size: 0.85rem;
  margin-top: 6px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-mono);
}

.form-group {
  margin-bottom: 24px;
}

.form-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 10px;
  font-family: var(--font-mono);
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 1rem;
  font-family: var(--font-display);
  transition: all 0.2s ease;
}

.form-input:focus {
  outline: none;
  border-color: var(--root-main);
  box-shadow: 0 0 0 3px rgba(10,88,64,0.2);
}

.form-input::placeholder {
  color: var(--muted);
  opacity: 0.6;
}

.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--root-main), var(--root-light));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font-display);
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 6px 20px rgba(10,88,64,0.3);
  letter-spacing: 0.03em;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(10,88,64,0.4);
}

.btn:active {
  transform: translateY(0);
}

.btn.loading {
  opacity: 0.7;
  pointer-events: none;
}

.msg {
  padding: 14px;
  border-radius: 10px;
  font-size: 0.9rem;
  margin-bottom: 20px;
  display: none;
  font-family: var(--font-mono);
  font-size: 0.85rem;
}

.msg.error {
  background: rgba(128,48,24,0.15);
  border: 1px solid var(--boot-main);
  color: var(--boot-light);
  display: block;
}

.msg.success {
  background: rgba(10,88,64,0.15);
  border: 1px solid var(--root-main);
  color: var(--root-light);
  display: block;
}

.footer {
  text-align: center;
  margin-top: 28px;
  font-size: 0.8rem;
  color: var(--muted);
}

.footer a {
  color: var(--root-light);
  text-decoration: none;
  transition: color 0.2s;
}

.footer a:hover {
  color: var(--text);
}

/* 6-Module indicator dots */
.module-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}

.module-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  opacity: 0.6;
  transition: all 0.3s ease;
}

.module-dot:hover {
  opacity: 1;
  transform: scale(1.3);
}

.module-dot.boot { background: var(--boot-main); }
.module-dot.auth { background: var(--auth-main); }
.module-dot.root { background: var(--root-main); }
.module-dot.mind { background: var(--mind-main); }
.module-dot.mesh { background: var(--mesh-main); }
.module-dot.wall { background: var(--wall-main); }

/* Responsive */
@media (max-width: 480px) {
  .card {
    padding: 36px 24px;
  }
  .logo {
    width: 64px;
    height: 64px;
    font-size: 1.8rem;
  }
  .logo-title {
    font-size: 1.5rem;
  }
}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo-section">
      <div class="logo" id="logo-icon">S</div>
      <h1 class="logo-title" id="logo-title">Secu<span>Box</span><span class="badge-device" id="device-badge" style="display:none;"></span></h1>
      <p class="logo-sub" id="logo-sub">Secure Network Appliance</p>
      <div class="module-dots">
        <span class="module-dot boot" title="BOOT"></span>
        <span class="module-dot auth" title="AUTH"></span>
        <span class="module-dot root" title="ROOT"></span>
        <span class="module-dot mind" title="MIND"></span>
        <span class="module-dot mesh" title="MESH"></span>
        <span class="module-dot wall" title="WALL"></span>
      </div>
    </div>

    <div id="msg" class="msg"></div>

    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="********" required autocomplete="current-password">
      </div>
      <button type="submit" id="btn-submit" class="btn">Sign In</button>
    </form>

    <div class="footer">
      <p>SecuBox &copy; <a href="https://cybermind.fr">CyberMind</a></p>
    </div>
  </div>
</div>

<script>
var API = '/api/v1/hub';

function showMsg(text, type) {
  var msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
}

function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-submit');
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;

  btn.classList.add('loading');
  btn.textContent = 'Authenticating...';

  fetch(API + '/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: username, password: password}),
    credentials: 'include'
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Invalid credentials');
    return r.json();
  })
  .then(function(data) {
    if (data.access_token) {
      localStorage.setItem('sbx_token', data.access_token);
      localStorage.setItem('secubox_token', data.access_token);
      localStorage.setItem('secubox_user', username);
      localStorage.setItem('secubox_role', 'admin');
      showMsg('Login successful!', 'success');
      setTimeout(function() {
        window.location.href = '/';
      }, 500);
    } else {
      throw new Error(data.detail || 'Login failed');
    }
  })
  .catch(function(err) {
    showMsg(err.message || 'Authentication failed', 'error');
    btn.classList.remove('loading');
    btn.textContent = 'Sign In';
  });

  return false;
}

// Load device-specific theme
function loadTheme() {
  fetch('/api/v1/portal/theme')
  .then(function(r) { return r.json(); })
  .then(function(theme) {
    if (theme && theme.name) {
      var sub = document.getElementById('logo-sub');
      if (sub) sub.textContent = 'SecuBox ' + theme.name + ' Edition';
    }
    if (theme && theme.badge) {
      var badge = document.getElementById('device-badge');
      if (badge) {
        badge.textContent = theme.badge;
        badge.style.display = 'inline-block';
      }
    }
  })
  .catch(function() {});
}

// Check if already authenticated
var token = localStorage.getItem('sbx_token');
if (token) {
  fetch('/api/v1/hub/status', {
    headers: {'Authorization': 'Bearer ' + token}
  })
  .then(function(r) {
    if (r.ok) window.location.href = '/';
  })
  .catch(function() {});
}

loadTheme();
</script>
</body>
</html>
