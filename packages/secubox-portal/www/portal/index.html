<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #00dd44;
            --p31-hot: #00ff55;
            --p31-mid: #009933;
            --p31-dim: #006622;
            --p31-ghost: #003311;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-light: #e8f5e9;
            --tube-pale: #c8e6c9;
            --tube-soft: #a5d6a7;
            /* Legacy mappings */
            --bg-dark: var(--tube-light);
            --bg-card: var(--tube-pale);
            --bg-sidebar: var(--tube-black);
            --border: var(--tube-soft);
            --text: var(--tube-dark);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-light);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--tube-dark);
            display: flex;
            min-height: 100vh;
        }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .btn-group { display: flex; gap: 0.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--cyan); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.sessions .value { color: var(--cyan); }
        .stat-card.active .value { color: var(--green); }
        .stat-card.users .value { color: var(--purple); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge.admin { background: rgba(163,113,247,0.2); color: var(--purple); }
        .badge.user { background: rgba(88,166,255,0.2); color: var(--primary); }
        .badge.active { background: rgba(63,185,80,0.2); color: var(--green); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-dim); }
        .form-group input, .form-group select { width: 100%; padding: 0.6rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); font-size: 0.9rem; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; width: 400px; max-width: 90%; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1.1rem; }
        .modal-close { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--tube-soft);
            background: var(--tube-pale);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-pale);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-light);
            border: 1px solid var(--tube-soft);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-light); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-light">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>Portal - Authentication</h1>
            <div class="btn-group">
                <button class="btn" onclick="refresh()">Refresh</button>
                <button class="btn primary" onclick="showAddUser()">Add User</button>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card sessions">
                <div class="value" id="activeSessions">-</div>
                <div class="label">Active Sessions</div>
            </div>
            <div class="stat-card users">
                <div class="value" id="totalUsers">-</div>
                <div class="label">Total Users</div>
            </div>
            <div class="stat-card active">
                <div class="value" id="authRequired">-</div>
                <div class="label">Auth Status</div>
            </div>
        </div>

        <div class="card">
            <h2>Current Session</h2>
            <table>
                <tbody id="currentSession">
                    <tr><td colspan="2">Checking session...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Active Sessions</h2>
            <table>
                <thead><tr><th>Username</th><th>Login Time</th><th>IP</th><th>Actions</th></tr></thead>
                <tbody id="sessionsTable"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>User Accounts</h2>
            <table>
                <thead><tr><th>Username</th><th>Email</th><th>Role</th><th>Created</th></tr></thead>
                <tbody id="usersTable"><tr><td colspan="4">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <!-- Add User Modal -->
    <div class="modal" id="addUserModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add User</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="addUserForm" onsubmit="createUser(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn primary" style="width:100%">Create User</button>
            </form>
        </div>
    </div>

    <script>
        const API = '/api/v1/portal';

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { credentials: 'include', ...opts });
                return res.json();
            } catch { return {}; }
        }

        async function refresh() {
            // Status
            const status = await api('/status');
            document.getElementById('activeSessions').textContent = status.active_sessions || 0;
            document.getElementById('authRequired').textContent = status.auth_required ? 'Enabled' : 'Disabled';

            // Current session
            const verify = await api('/verify');
            const sessionBody = document.getElementById('currentSession');
            if (verify.valid) {
                sessionBody.innerHTML = `
                    <tr><td style="color:var(--text-dim)">Username</td><td>${verify.username}</td></tr>
                    <tr><td style="color:var(--text-dim)">Role</td><td><span class="badge ${verify.role}">${verify.role}</span></td></tr>
                    <tr><td style="color:var(--text-dim)">Status</td><td><span class="badge active">Active</span></td></tr>
                `;
            } else {
                sessionBody.innerHTML = '<tr><td colspan="2" style="color:var(--yellow)">Not logged in</td></tr>';
            }

            // Sessions (admin only)
            const sessions = await api('/sessions');
            const sessionsBody = document.getElementById('sessionsTable');
            if (sessions.sessions && Object.keys(sessions.sessions).length > 0) {
                sessionsBody.innerHTML = Object.entries(sessions.sessions).map(([user, s]) => `
                    <tr>
                        <td>${user}</td>
                        <td style="font-family:monospace;font-size:0.8rem">${s.login_time || '-'}</td>
                        <td style="font-family:monospace">${s.ip || '-'}</td>
                        <td><button class="btn danger" onclick="endSession('${user}')">End</button></td>
                    </tr>
                `).join('');
            } else if (sessions.detail) {
                sessionsBody.innerHTML = '<tr><td colspan="4" style="color:var(--yellow)">Admin access required</td></tr>';
            } else {
                sessionsBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim)">No active sessions</td></tr>';
            }

            // Users (admin only)
            const users = await api('/users');
            const usersBody = document.getElementById('usersTable');
            document.getElementById('totalUsers').textContent = users.users?.length || 0;
            if (users.users && users.users.length > 0) {
                usersBody.innerHTML = users.users.map(u => `
                    <tr>
                        <td>${u.username}</td>
                        <td>${u.email || '-'}</td>
                        <td><span class="badge ${u.role}">${u.role}</span></td>
                        <td style="font-size:0.8rem">${u.created ? new Date(u.created).toLocaleDateString() : '-'}</td>
                    </tr>
                `).join('');
            } else if (users.detail) {
                usersBody.innerHTML = '<tr><td colspan="4" style="color:var(--yellow)">Admin access required</td></tr>';
            } else {
                usersBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim)">No users</td></tr>';
            }
        }

        function showAddUser() {
            document.getElementById('addUserModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('addUserModal').classList.remove('show');
        }

        async function createUser(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                username: form.username.value,
                email: form.email.value,
                password: form.password.value,
                role: form.role.value
            };
            const res = await api('/users/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.success) {
                closeModal();
                form.reset();
                refresh();
            } else {
                alert(res.detail || 'Error creating user');
            }
        }

        async function endSession(username) {
            if (!confirm(`End session for ${username}?`)) return;
            // In production, would have an endpoint to end specific sessions
            alert('Session management coming soon');
        }

        refresh();
        setInterval(refresh, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
