<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SecuBox — Login</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --accent: #58a6ff;
  --accent-glow: rgba(88,166,255,0.2);
  --text: #c9d1d9;
  --muted: #8b949e;
  --success: #3fb950;
  --error: #f85149;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(88,166,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(88,166,255,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  animation: gridMove 30s linear infinite;
  pointer-events: none;
}
@keyframes gridMove { 0% { transform: translate(0,0); } 100% { transform: translate(50px,50px); } }
.container { width: 100%; max-width: 400px; position: relative; z-index: 1; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.4);
}
.logo-section { text-align: center; margin-bottom: 32px; }
.logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, var(--accent), #1f6feb);
  border-radius: 16px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 900; color: #fff;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px var(--accent-glow);
}
.logo-title { font-size: 1.6rem; font-weight: 600; }
.logo-title span { color: var(--accent); }
.logo-sub { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }
.form-group { margin-bottom: 20px; }
.form-label {
  display: block; font-size: 0.75rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 8px;
}
.form-input {
  width: 100%; padding: 12px 14px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 1rem; transition: all 0.2s;
}
.form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.form-input::placeholder { color: #484f58; }
.btn {
  width: 100%; padding: 12px;
  background: var(--accent); border: none; border-radius: 8px;
  color: #fff; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.btn:hover { background: #1f6feb; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.loading { opacity: 0.7; pointer-events: none; }
.msg {
  padding: 12px; border-radius: 8px; font-size: 0.9rem;
  margin-bottom: 16px; display: none;
}
.msg.error { background: rgba(248,81,73,0.1); border: 1px solid var(--error); color: var(--error); display: block; }
.msg.success { background: rgba(63,185,80,0.1); border: 1px solid var(--success); color: var(--success); display: block; }
.footer { text-align: center; margin-top: 24px; font-size: 0.8rem; color: var(--muted); }
.footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="logo-section">
      <div class="logo">S</div>
      <h1 class="logo-title">Secu<span>Box</span></h1>
      <p class="logo-sub">Secure Network Appliance</p>
    </div>

    <div id="msg" class="msg"></div>

    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-input" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="********" required autocomplete="current-password">
      </div>
      <button type="submit" id="btn-submit" class="btn">Sign In</button>
    </form>

    <div class="footer">
      <p>SecuBox &copy; <a href="https://cybermind.fr">CyberMind</a></p>
    </div>
  </div>
</div>

<script>
var API = '/api/v1/portal';

function showMsg(text, type) {
  var msg = document.getElementById('msg');
  msg.textContent = text;
  msg.className = 'msg ' + type;
}

function handleLogin(e) {
  e.preventDefault();
  var btn = document.getElementById('btn-submit');
  var username = document.getElementById('username').value.trim();
  var password = document.getElementById('password').value;

  btn.classList.add('loading');
  btn.textContent = 'Authenticating...';

  fetch(API + '/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({username: username, password: password}),
    credentials: 'include'
  })
  .then(function(r) {
    if (!r.ok) throw new Error('Invalid credentials');
    return r.json();
  })
  .then(function(data) {
    if (data.success) {
      localStorage.setItem('secubox_user', data.username);
      localStorage.setItem('secubox_role', data.role);
      showMsg('Login successful!', 'success');
      setTimeout(function() {
        window.location.href = '/hub/';
      }, 500);
    } else {
      throw new Error(data.error || 'Login failed');
    }
  })
  .catch(function(err) {
    showMsg(err.message || 'Authentication failed', 'error');
    btn.classList.remove('loading');
    btn.textContent = 'Sign In';
  });

  return false;
}

// Check if already authenticated
fetch(API + '/verify', {credentials: 'include'})
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.valid) {
      window.location.href = '/hub/';
    }
  })
  .catch(function() {});
</script>
</body>
</html>
