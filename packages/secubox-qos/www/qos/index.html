<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Bandwidth Manager</title>
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root { --bg-dark: #0d1117; --bg-card: #161b22; --bg-sidebar: #0d1117; --border: #30363d; --text: #c9d1d9; --text-dim: #8b949e; --primary: #58a6ff; --cyan: #00d4ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--cyan); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; color: var(--cyan); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; }
        .progress { background: var(--bg-dark); border-radius: 4px; height: 8px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--cyan); transition: width 0.3s; }
        .progress-bar.warning { background: var(--yellow); }
        .progress-bar.danger { background: var(--red); }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
        .badge.enabled { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.disabled { background: rgba(139,148,158,0.2); color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>📶 Bandwidth Manager (QoS)</h1>
            <div>
                <button class="btn" onclick="refresh()">Refresh</button>
                <button class="btn primary" onclick="showAddRule()">Add Rule</button>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card">
                <div class="value" id="download">-</div>
                <div class="label">Download (Mbps)</div>
            </div>
            <div class="stat-card">
                <div class="value" id="upload">-</div>
                <div class="label">Upload (Mbps)</div>
            </div>
            <div class="stat-card">
                <div class="value" id="rules">-</div>
                <div class="label">Active Rules</div>
            </div>
            <div class="stat-card">
                <div class="value" id="shaped">-</div>
                <div class="label">Shaped Clients</div>
            </div>
        </div>

        <div class="card">
            <h2>Traffic Classes</h2>
            <table>
                <thead><tr><th>Class</th><th>Priority</th><th>Rate</th><th>Ceil</th><th>Usage</th></tr></thead>
                <tbody id="classesTable"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="card">
            <h2>QoS Rules</h2>
            <table>
                <thead><tr><th>Name</th><th>Match</th><th>Class</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody id="rulesTable"><tr><td colspan="5">Loading...</td></tr></tbody>
            </table>
        </div>
    </main>

    <script>
        const API = '/api/v1/qos';

        async function api(path) {
            try {
                const res = await fetch(API + path, { credentials: 'include' });
                return res.json();
            } catch { return {}; }
        }

        async function refresh() {
            const status = await api('/status');
            document.getElementById('download').textContent = status.download_mbps || 0;
            document.getElementById('upload').textContent = status.upload_mbps || 0;
            document.getElementById('rules').textContent = status.active_rules || 0;
            document.getElementById('shaped').textContent = status.shaped_clients || 0;

            const classes = await api('/classes');
            const classBody = document.getElementById('classesTable');
            if (classes.classes && classes.classes.length > 0) {
                classBody.innerHTML = classes.classes.map(c => {
                    const usage = c.usage || 0;
                    const barClass = usage > 90 ? 'danger' : usage > 70 ? 'warning' : '';
                    return `
                        <tr>
                            <td>${c.name}</td>
                            <td>${c.priority}</td>
                            <td>${c.rate}</td>
                            <td>${c.ceil}</td>
                            <td style="width:120px">
                                <div class="progress"><div class="progress-bar ${barClass}" style="width:${usage}%"></div></div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } else {
                classBody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No traffic classes configured</td></tr>';
            }

            const rules = await api('/rules');
            const rulesBody = document.getElementById('rulesTable');
            if (rules.rules && rules.rules.length > 0) {
                rulesBody.innerHTML = rules.rules.map(r => `
                    <tr>
                        <td>${r.name}</td>
                        <td style="font-family:monospace;font-size:0.8rem">${r.match}</td>
                        <td>${r.class}</td>
                        <td><span class="badge ${r.enabled ? 'enabled' : 'disabled'}">${r.enabled ? 'Enabled' : 'Disabled'}</span></td>
                        <td><button class="btn" onclick="toggleRule('${r.id}')">Toggle</button></td>
                    </tr>
                `).join('');
            } else {
                rulesBody.innerHTML = '<tr><td colspan="5" style="color:var(--text-dim)">No QoS rules configured</td></tr>';
            }
        }

        function showAddRule() { alert('Rule configuration coming soon'); }
        function toggleRule(id) { alert('Toggle rule: ' + id); }

        refresh();
        setInterval(refresh, 10000);
    </script>
</body>
</html>
