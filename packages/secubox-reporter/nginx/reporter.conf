# /etc/nginx/secubox.d/reporter.conf
# Installed by secubox-reporter package

# Reporter frontend
location /reporter/ {
    alias /usr/share/secubox/www/reporter/;
    index index.html;
    try_files $uri $uri/ /reporter/index.html;
}

# Reporter API
location /api/v1/reporter/ {
    proxy_pass http://unix:/run/secubox/reporter.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
