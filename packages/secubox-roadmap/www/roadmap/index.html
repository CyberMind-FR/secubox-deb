<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Migration Roadmap</title>
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-sidebar: #0d1117;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --primary: #58a6ff;
            --cyan: #00d4ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --purple: #a371f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        .sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        @media (max-width: 768px) { .main { margin-left: 0; } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .header h1 { font-size: 1.5rem; }
        .header .subtitle { font-size: 0.85rem; color: var(--text-dim); }
        .source-link { color: var(--cyan); text-decoration: none; font-size: 0.85rem; }
        .source-link:hover { text-decoration: underline; }

        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--bg-dark); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }

        /* Progress Section */
        .progress-bar { height: 20px; background: var(--bg-dark); border-radius: 10px; overflow: hidden; margin-bottom: 0.75rem; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, var(--green) 0%, var(--cyan) 100%); border-radius: 10px; transition: width 0.8s ease-out; }
        .progress-stats { display: flex; justify-content: space-between; font-size: 0.9rem; }
        .progress-stats .percent { font-size: 1.5rem; font-weight: bold; color: var(--cyan); }

        /* Category Grid */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .category-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; transition: all 0.2s; }
        .category-card:hover { border-color: var(--primary); transform: translateY(-2px); }
        .category-card .cat-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .category-card .cat-name { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 0.25rem; }
        .category-card .cat-count { font-size: 1.3rem; font-weight: bold; color: var(--cyan); }
        .category-card .cat-progress { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.25rem; }

        /* Module Lists */
        .lists-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .module-list { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
        .module-list h3 { font-size: 0.9rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
        .module-list h3 .count { background: var(--bg-dark); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; margin-left: auto; }
        .module-list.complete h3 { color: var(--green); }
        .module-list.in-progress h3 { color: var(--yellow); }
        .module-list.planned h3 { color: var(--text-dim); }
        .module-list.new-modules h3 { color: var(--cyan); }
        .module-list ul { list-style: none; max-height: 400px; overflow-y: auto; }
        .module-list li { padding: 0.5rem 0; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; font-size: 0.85rem; }
        .module-list li:last-child { border-bottom: none; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .complete .status-dot { background: var(--green); }
        .in-progress .status-dot { background: var(--yellow); }
        .planned .status-dot { background: var(--text-dim); }
        .new-modules .status-dot { background: var(--cyan); }
        .module-info { flex: 1; min-width: 0; }
        .module-info .source { color: var(--text-dim); font-size: 0.75rem; }
        .module-info .target { color: var(--text); }
        .installed-badge { background: rgba(63,185,80,0.2); color: var(--green); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.65rem; text-transform: uppercase; }
        .category-badge { background: var(--bg-dark); color: var(--text-dim); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.65rem; }
        .loading { text-align: center; padding: 2rem; color: var(--text-dim); }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>

    <main class="main">
        <header class="header">
            <div>
                <h1>Migration Roadmap</h1>
                <div class="subtitle">OpenWRT → Debian package migration status</div>
            </div>
            <div>
                <a href="https://github.com/gkerma/secubox-openwrt" target="_blank" class="source-link">Source Repository →</a>
                <button class="btn" onclick="loadRoadmap()" style="margin-left: 1rem;">Refresh</button>
            </div>
        </header>

        <div class="card">
            <h2>Overall Progress</h2>
            <div class="progress-bar">
                <div class="fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div class="progress-stats">
                <span id="complete-count">0 complete</span>
                <span class="percent" id="progress-percent">0%</span>
                <span id="total-count">0 total</span>
            </div>
        </div>

        <section class="category-grid" id="category-grid">
            <div class="loading">Loading categories...</div>
        </section>

        <section class="lists-section" id="lists-section">
            <div class="loading">Loading modules...</div>
        </section>
    </main>

    <script>
        const API_BASE = '/api/v1/roadmap';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(endpoint) {
            try {
                const res = await fetch(API_BASE + endpoint, { headers: headers() });
                if (res.status === 401) { window.location = '/portal/login.html'; return null; }
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (e) {
                console.error('API Error:', e);
                return null;
            }
        }

        async function loadRoadmap() {
            const data = await api('/roadmap');
            if (!data) {
                document.getElementById('lists-section').innerHTML = '<div class="loading" style="color: var(--red)">Failed to load roadmap data</div>';
                return;
            }

            // Update progress bar
            const pct = data.summary.progress_percent;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-percent').textContent = pct + '%';
            document.getElementById('complete-count').textContent = data.summary.complete + ' complete';
            document.getElementById('total-count').textContent = data.summary.total + ' total';

            // Render categories
            const catGrid = document.getElementById('category-grid');
            catGrid.innerHTML = Object.entries(data.by_category)
                .sort((a, b) => b[1].total - a[1].total)
                .map(([cat, info]) => `
                    <div class="category-card" onclick="filterCategory('${cat}')">
                        <div class="cat-icon">${info.info.icon}</div>
                        <div class="cat-name">${info.info.name}</div>
                        <div class="cat-count">${info.complete}/${info.total}</div>
                        <div class="cat-progress">${Math.round(info.complete/info.total*100) || 0}% done</div>
                    </div>
                `).join('');

            // Render module lists
            const listsSection = document.getElementById('lists-section');
            listsSection.innerHTML = `
                <div class="module-list complete">
                    <h3>Complete <span class="count">${data.complete.length}</span></h3>
                    <ul>${renderModules(data.complete)}</ul>
                </div>
                <div class="module-list new-modules">
                    <h3>New Debian Modules <span class="count">${data.new_modules.length}</span></h3>
                    <ul>${renderModules(data.new_modules)}</ul>
                </div>
                <div class="module-list planned">
                    <h3>Planned <span class="count">${data.planned.length}</span></h3>
                    <ul>${renderModules(data.planned)}</ul>
                </div>
            `;
        }

        function renderModules(modules) {
            if (!modules.length) return '<li style="color: var(--text-dim)">No modules</li>';
            return modules.map(m => `
                <li>
                    <span class="status-dot"></span>
                    <div class="module-info">
                        <div class="source">${m.source}</div>
                        <div class="target">${m.target}</div>
                    </div>
                    <span class="category-badge">${m.category_info?.icon || ''} ${m.category}</span>
                    ${m.installed ? '<span class="installed-badge">Installed</span>' : ''}
                </li>
            `).join('');
        }

        function filterCategory(cat) {
            console.log('Filter by category:', cat);
        }

        loadRoadmap();
        setInterval(loadRoadmap, 60000);
    </script>
</body>
</html>
