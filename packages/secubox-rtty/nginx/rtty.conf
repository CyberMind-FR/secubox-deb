# SecuBox RTTY API proxy
location /api/v1/rtty/ {
    proxy_pass http://unix:/run/secubox/rtty.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# RTTY dashboard static files
location /rtty/ {
    alias /usr/share/secubox/www/rtty/;
    index index.html;
    try_files $uri $uri/ =404;
}

# RTTY web terminal proxy (optional - if rtty serves its own web UI)
location /rtty-terminal/ {
    proxy_pass http://127.0.0.1:5913/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
}
