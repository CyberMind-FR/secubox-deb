# /etc/nginx/secubox.d/saas-relay.conf
# Installed by secubox-saas-relay package

# API endpoint
location /api/v1/saas-relay/ {
    proxy_pass http://unix:/run/secubox/saas-relay.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# Static web dashboard
location /saas-relay/ {
    alias /usr/share/secubox/www/saas-relay/;
    index index.html;
    try_files $uri $uri/ /saas-relay/index.html;
}
