<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Streamlit Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-system.css">
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #33ff66;
            --p31-hot: #66ffaa;
            --p31-mid: #22cc44;
            --p31-dim: #0f8822;
            --p31-ghost: #052210;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-black: #050803;
            --tube-deep: #080d05;
            --tube-bezel: #0d1208;
            /* Legacy mappings */
            --bg-dark: var(--tube-black);
            --bg-card: var(--tube-deep);
            --bg-sidebar: var(--tube-black);
            --border: var(--p31-ghost);
            --text: var(--p31-mid);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-black);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--p31-mid);
            display: flex;
            min-height: 100vh;
        }
        .sidebar { width: 220px; background: var(--bg-dark); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .logo span:nth-child(1) { color: var(--cyan); } .logo span:nth-child(2) { color: var(--red); } .logo span:nth-child(3) { color: var(--green); } .logo span:nth-child(4) { color: var(--yellow); }
        .nav-section { padding: 0.5rem 0; }
        .nav-section-title { padding: 0.5rem 1rem; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.1); color: var(--primary); border-left-color: var(--primary); }
        .nav-item .icon { width: 20px; text-align: center; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; margin-left: 0.5rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: var(--purple); }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; }
        .app-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
        .app-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; }
        .app-card h3 { font-size: 1rem; margin-bottom: 0.5rem; color: var(--purple); }
        .app-card .meta { font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.75rem; }
        .app-card .actions { display: flex; gap: 0.5rem; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; }
        .badge.running { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.stopped { background: rgba(139,148,158,0.2); color: var(--text-dim); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.875rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-dark); color: var(--text); }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--p31-ghost);
            background: var(--tube-deep);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-deep);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-black);
            border: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-black); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
    <header class="header">
        <h1>Streamlit Forge</h1>
        <div><button class="btn" onclick="refresh()">Refresh</button></div>
    </header>

    <div class="stats-row">
        <div class="stat-card"><div class="value" id="app-count">-</div><div class="label">Total Apps</div></div>
        <div class="stat-card"><div class="value" id="running-count">-</div><div class="label">Running</div></div>
        <div class="stat-card"><div class="value" id="templates-count">-</div><div class="label">Templates</div></div>
    </div>

    <div class="card">
        <h2>Create New App</h2>
        <div class="form-row">
            <div class="form-group"><label>App Name</label><input type="text" id="new-name" placeholder="my-app"></div>
            <div class="form-group"><label>Template</label><select id="new-template"><option value="basic">Basic</option></select></div>
        </div>
        <button class="btn primary" onclick="createApp()">Create App</button>
    </div>

    <div class="card">
        <h2>Applications</h2>
        <div class="app-grid" id="app-list">Loading...</div>
    </div>

    <script>
        const API = '/api/v1/streamforge';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/login.html'; return {}; }
                return res.json();
            } catch { return {}; }
        }

        async function loadStatus() {
            const d = await api('/status');
            document.getElementById('app-count').textContent = d.app_count || 0;
            document.getElementById('running-count').textContent = d.running_count || 0;
        }

        async function loadTemplates() {
            const d = await api('/templates');
            const sel = document.getElementById('new-template');
            const tpls = d.templates || [];
            document.getElementById('templates-count').textContent = tpls.length || 1;
            if (tpls.length) {
                sel.innerHTML = tpls.map(t => `<option value="${t.name}">${t.name}</option>`).join('');
            }
        }

        async function loadApps() {
            const d = await api('/apps');
            const grid = document.getElementById('app-list');
            const apps = d.apps || [];
            if (!apps.length) { grid.innerHTML = '<p style="color:var(--text-dim)">No apps yet. Create one above!</p>'; return; }
            grid.innerHTML = apps.map(a => `
                <div class="app-card">
                    <h3>${a.name} <span class="badge ${a.status}">${a.status}</span></h3>
                    <div class="meta">Port: ${a.port || '-'} | ${a.entrypoint}</div>
                    <div class="actions">
                        ${a.status === 'running' 
                            ? `<button class="btn danger" onclick="stopApp('${a.name}')">Stop</button>`
                            : `<button class="btn success" onclick="startApp('${a.name}')">Start</button>`}
                        <button class="btn" onclick="openApp('${a.name}', ${a.port})">Open</button>
                        <button class="btn danger" onclick="deleteApp('${a.name}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function createApp() {
            const name = document.getElementById('new-name').value.trim();
            const template = document.getElementById('new-template').value;
            if (!name) { alert('Name required'); return; }
            const r = await api('/app', { method: 'POST', body: JSON.stringify({ name, template }) });
            if (r.success) { refresh(); document.getElementById('new-name').value = ''; }
            else alert('Failed: ' + JSON.stringify(r));
        }

        async function startApp(name) {
            await api(`/app/${name}/start`, { method: 'POST' });
            setTimeout(refresh, 1000);
        }

        async function stopApp(name) {
            await api(`/app/${name}/stop`, { method: 'POST' });
            refresh();
        }

        async function deleteApp(name) {
            if (!confirm(`Delete app "${name}"?`)) return;
            await api(`/app/${name}`, { method: 'DELETE' });
            refresh();
        }

        function openApp(name, port) {
            if (port) window.open(`http://${location.hostname}:${port}`, '_blank');
            else alert('App not running');
        }

        function refresh() { loadStatus(); loadApps(); loadTemplates(); }
        refresh();
    </script>
</main>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
