location /api/v1/torrent/ { proxy_pass http://unix:/run/secubox/torrent.sock; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; client_max_body_size 10M; }
location /torrent/ { alias /usr/share/secubox/www/torrent/; try_files $uri $uri/ /torrent/index.html; }
