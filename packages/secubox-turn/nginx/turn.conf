# SecuBox TURN API proxy
location /api/v1/turn/ {
    proxy_pass http://unix:/run/secubox/turn.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# TURN dashboard static files
location /turn/ {
    alias /usr/share/secubox/www/turn/;
    index index.html;
    try_files $uri $uri/ =404;
}
