# /etc/nginx/secubox.d/users.conf
# Installed by secubox-users package

# Frontend
location /users/ {
    alias /usr/share/secubox/www/users/;
    try_files $uri $uri/ /users/index.html;
}

# API
location /api/v1/users/ {
    proxy_pass http://unix:/run/secubox/users.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
