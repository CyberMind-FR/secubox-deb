<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoIP - SecuBox</title>
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root { --voip-blue: #3498db; --voip-light: #5dade2; --voip-dark: #2980b9; }
        body.dark { --voip-blue: #5dade2; --voip-light: #85c1e9; --voip-dark: #3498db; }
        .accent { color: var(--voip-blue); }
        .accent-bg { background-color: var(--voip-blue); }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .header h1 { margin: 0; font-size: 1.5rem; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.875rem; }
        .status-badge.running { background: var(--success-bg); color: var(--success); }
        .status-badge.stopped { background: var(--error-bg); color: var(--error); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; text-align: center; }
        .stat-value { font-size: 1.75rem; font-weight: bold; color: var(--voip-blue); }
        .stat-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; }
        .action-bar { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .btn { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 0.25rem; background: var(--surface); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--hover); }
        .btn.primary { background: var(--voip-blue); color: white; border-color: var(--voip-blue); }
        .btn.primary:hover { background: var(--voip-dark); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
        .tab { padding: 0.75rem 1rem; border: none; background: none; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--voip-blue); border-bottom-color: var(--voip-blue); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .ext-list { display: grid; gap: 0.5rem; }
        .ext-item { display: flex; align-items: center; gap: 1rem; padding: 0.75rem; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; }
        .ext-icon { font-size: 1.5rem; }
        .ext-info { flex: 1; }
        .ext-number { font-weight: 600; font-size: 1.125rem; }
        .ext-name { font-size: 0.875rem; color: var(--text-secondary); }
        .ext-status { padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-size: 0.75rem; }
        .ext-status.online { background: var(--success-bg); color: var(--success); }
        .ext-status.offline { background: var(--error-bg); color: var(--error); }
        .log-viewer { background: var(--bg-dark, #1a1a2e); color: var(--text-light, #e0e0e0); font-family: monospace; font-size: 0.75rem; padding: 1rem; border-radius: 0.5rem; height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.25rem; background: var(--surface); color: var(--text); }
        .add-form { max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1.5rem; margin-bottom: 1rem; }
        .install-section { text-align: center; padding: 3rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="crt-light">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content">
    <div class="container">
        <div class="header">
            <h1><span class="accent">VoIP</span> PBX</h1>
            <span id="status-badge" class="status-badge stopped">Stopped</span>
        </div>

        <div id="install-section" class="install-section hidden">
            <p>Asterisk is not installed</p>
            <button class="btn primary" onclick="installAsterisk()">Install Asterisk PBX</button>
        </div>

        <div id="main-section" class="hidden">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="calls-count">0</div><div class="stat-label">Active Calls</div></div>
                <div class="stat-card"><div class="stat-value" id="channels-count">0</div><div class="stat-label">Channels</div></div>
                <div class="stat-card"><div class="stat-value" id="peers-count">0</div><div class="stat-label">SIP Peers</div></div>
                <div class="stat-card"><div class="stat-value">5060</div><div class="stat-label">SIP Port</div></div>
            </div>

            <div class="action-bar">
                <button class="btn primary" id="btn-start" onclick="startService()">Start</button>
                <button class="btn" id="btn-stop" onclick="stopService()" disabled>Stop</button>
                <button class="btn" id="btn-restart" onclick="restartService()" disabled>Restart</button>
                <button class="btn" onclick="reloadConfig()">Reload Config</button>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="extensions">Extensions</button>
                <button class="tab" data-tab="peers">Peers</button>
                <button class="tab" data-tab="logs">Logs</button>
            </div>

            <div id="tab-extensions" class="tab-content active">
                <div class="add-form">
                    <h4 style="margin-top:0;">Add Extension</h4>
                    <form onsubmit="createExtension(event)">
                        <div class="form-group"><label>Extension Number</label><input type="text" id="ext-number" pattern="[0-9]+" required></div>
                        <div class="form-group"><label>Display Name</label><input type="text" id="ext-name" required></div>
                        <div class="form-group"><label>Password</label><input type="password" id="ext-secret" minlength="6" required></div>
                        <button type="submit" class="btn primary">Create Extension</button>
                    </form>
                </div>
                <div id="ext-list" class="ext-list"></div>
            </div>

            <div id="tab-peers" class="tab-content">
                <div class="action-bar"><button class="btn" onclick="loadPeers()">Refresh</button></div>
                <div id="peers-list" class="ext-list"></div>
            </div>

            <div id="tab-logs" class="tab-content">
                <div class="action-bar"><button class="btn" onclick="loadLogs()">Refresh</button></div>
                <div id="log-viewer" class="log-viewer">Loading...</div>
            </div>
        </div>
    </div>
    </main>

    <script>
        const API = '/api/v1/voip';

        async function api(endpoint, options = {}) {
            const r = await fetch(API + endpoint, { ...options, headers: { 'Authorization': 'Bearer ' + localStorage.getItem('sbx_token'), 'Content-Type': 'application/json', ...options.headers } });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            return r.json();
        }

        async function loadStatus() {
            try {
                const d = await api('/status');
                const badge = document.getElementById('status-badge');
                if (!d.installed) {
                    document.getElementById('install-section').classList.remove('hidden');
                    document.getElementById('main-section').classList.add('hidden');
                    badge.textContent = 'Not Installed'; badge.className = 'status-badge stopped';
                    return;
                }
                document.getElementById('install-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                if (d.running) {
                    badge.textContent = 'Running'; badge.className = 'status-badge running';
                    document.getElementById('btn-start').disabled = true;
                    document.getElementById('btn-stop').disabled = false;
                    document.getElementById('btn-restart').disabled = false;
                    document.getElementById('calls-count').textContent = d.active_calls || 0;
                    document.getElementById('channels-count').textContent = d.active_channels || 0;
                    document.getElementById('peers-count').textContent = d.sip_peers || 0;
                    loadExtensions();
                } else {
                    badge.textContent = 'Stopped'; badge.className = 'status-badge stopped';
                    document.getElementById('btn-start').disabled = false;
                    document.getElementById('btn-stop').disabled = true;
                    document.getElementById('btn-restart').disabled = true;
                }
            } catch (e) { console.error(e); }
        }

        async function loadExtensions() {
            try {
                const d = await api('/extensions');
                const list = document.getElementById('ext-list');
                if (!d.extensions || d.extensions.length === 0) {
                    list.innerHTML = '<p style="padding:1rem;color:var(--text-secondary);">No extensions configured</p>';
                    return;
                }
                list.innerHTML = d.extensions.map(e => `
                    <div class="ext-item">
                        <div class="ext-icon">📞</div>
                        <div class="ext-info">
                            <div class="ext-number">${e.number}</div>
                            <div class="ext-name">${e.name || 'No name'}</div>
                        </div>
                        <button class="btn" onclick="deleteExtension('${e.number}')" style="color:var(--error);">Delete</button>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function loadPeers() {
            try {
                const d = await api('/peers');
                const list = document.getElementById('peers-list');
                if (!d.peers || d.peers.length === 0) {
                    list.innerHTML = '<p style="padding:1rem;color:var(--text-secondary);">No peers registered</p>';
                    return;
                }
                list.innerHTML = d.peers.map(p => `
                    <div class="ext-item">
                        <div class="ext-icon">🔗</div>
                        <div class="ext-info">
                            <div class="ext-number">${p.name}</div>
                            <div class="ext-name">${p.host}</div>
                        </div>
                        <span class="ext-status ${p.status === 'OK' ? 'online' : 'offline'}">${p.status}</span>
                    </div>
                `).join('');
            } catch (e) { console.error(e); }
        }

        async function installAsterisk() {
            const btn = event.target; btn.disabled = true; btn.textContent = 'Installing...';
            try { await api('/install', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); }
            finally { btn.disabled = false; btn.textContent = 'Install Asterisk PBX'; }
        }

        async function startService() { document.getElementById('btn-start').disabled = true; try { await api('/start', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); } }
        async function stopService() { document.getElementById('btn-stop').disabled = true; try { await api('/stop', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); } }
        async function restartService() { document.getElementById('btn-restart').disabled = true; try { await api('/restart', { method: 'POST' }); await loadStatus(); } catch (e) { alert('Failed: ' + e.message); } }
        async function reloadConfig() { try { await api('/reload', { method: 'POST' }); alert('Config reloaded'); } catch (e) { alert('Failed: ' + e.message); } }

        async function createExtension(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.disabled = true;
            try {
                await api('/extensions', { method: 'POST', body: JSON.stringify({
                    number: document.getElementById('ext-number').value,
                    name: document.getElementById('ext-name').value,
                    secret: document.getElementById('ext-secret').value
                })});
                document.getElementById('ext-number').value = '';
                document.getElementById('ext-name').value = '';
                document.getElementById('ext-secret').value = '';
                loadExtensions();
            } catch (err) { alert('Failed: ' + err.message); }
            finally { btn.disabled = false; }
        }

        async function deleteExtension(num) { if (!confirm(`Delete extension ${num}?`)) return; try { await api(`/extensions/${num}`, { method: 'DELETE' }); loadExtensions(); } catch (e) { alert('Failed: ' + e.message); } }

        async function loadLogs() { try { const d = await api('/logs?lines=200'); document.getElementById('log-viewer').textContent = d.logs?.join('\n') || 'No logs'; } catch (e) { document.getElementById('log-viewer').textContent = 'Error: ' + e.message; } }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
                if (tab.dataset.tab === 'logs') loadLogs();
                if (tab.dataset.tab === 'peers') loadPeers();
            });
        });

        if (window.matchMedia?.('(prefers-color-scheme: dark)').matches) document.body.classList.add('dark');
        loadStatus(); setInterval(loadStatus, 10000);
    </script>
    <script src="/shared/sidebar.js"></script>
</body>
</html>
