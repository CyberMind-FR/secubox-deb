<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Vortex DNS Firewall</title>
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root { --bg-dark: #0d1117; --bg-card: #161b22; --bg-sidebar: #0d1117; --border: #30363d; --text: #c9d1d9; --text-dim: #8b949e; --primary: #58a6ff; --cyan: #00d4ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #a371f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-dark); color: var(--text); display: flex; min-height: 100vh; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .header h1 { font-size: 1.5rem; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.blocked .value { color: var(--red); }
        .stat-card.lists .value { color: var(--cyan); }
        .stat-card.rules .value { color: var(--purple); }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .badge { padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; }
        .badge.enabled { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.disabled { background: rgba(139,148,158,0.2); color: var(--text-dim); }
        .badge.block { background: rgba(248,81,73,0.2); color: var(--red); }
        .badge.allow { background: rgba(63,185,80,0.2); color: var(--green); }
        .toggle { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 26px; transition: 0.3s; }
        .toggle-slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.3s; }
        .toggle input:checked + .toggle-slider { background: var(--green); }
        .toggle input:checked + .toggle-slider:before { transform: translateX(24px); }
        .status-indicator { display: flex; align-items: center; gap: 0.5rem; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-dot.active { background: var(--green); }
        .status-dot.inactive { background: var(--red); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1.1rem; }
        .close-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.875rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); }
        .feed-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.5rem; }
        .feed-item .name { font-weight: 500; }
        .feed-item .category { font-size: 0.75rem; color: var(--text-dim); }
        .actions { display: flex; gap: 0.5rem; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>Vortex DNS Firewall</h1>
            <div class="header-actions">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="statusText">Loading...</span>
                </div>
                <label class="toggle">
                    <input type="checkbox" id="enableToggle" onchange="toggleEnable()">
                    <span class="toggle-slider"></span>
                </label>
                <button class="btn" onclick="refresh()">Refresh</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card blocked">
                <div class="value" id="statBlocked">-</div>
                <div class="label">Blocked Domains</div>
            </div>
            <div class="stat-card lists">
                <div class="value" id="statLists">-</div>
                <div class="label">Active Blocklists</div>
            </div>
            <div class="stat-card rules">
                <div class="value" id="statRules">-</div>
                <div class="label">Custom Rules</div>
            </div>
        </div>

        <div class="card">
            <h2>
                Blocklists
                <div>
                    <button class="btn btn-sm" onclick="updateAllBlocklists()">Update All</button>
                    <button class="btn btn-sm primary" onclick="showAddBlocklist()">Add Blocklist</button>
                    <button class="btn btn-sm success" onclick="applyBlocklists()">Apply</button>
                </div>
            </h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Format</th>
                        <th>Domains</th>
                        <th>Last Updated</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="blocklistsTable"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>
                Custom Rules
                <button class="btn btn-sm primary" onclick="showAddRule()">Add Rule</button>
            </h2>
            <table>
                <thead>
                    <tr>
                        <th>Domain</th>
                        <th>Action</th>
                        <th>Redirect To</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="rulesTable"></tbody>
            </table>
        </div>

        <div class="card">
            <h2>Available Threat Feeds</h2>
            <div id="feedsList"></div>
        </div>

        <!-- Add Blocklist Modal -->
        <div class="modal" id="addBlocklistModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add Blocklist</h3>
                    <button class="close-btn" onclick="closeModal('addBlocklistModal')">&times;</button>
                </div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="blName" placeholder="e.g., my-blocklist">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="text" id="blUrl" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Format</label>
                    <select id="blFormat">
                        <option value="hosts">Hosts file (0.0.0.0 domain)</option>
                        <option value="domains">Domain list (one per line)</option>
                    </select>
                </div>
                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <button class="btn" onclick="closeModal('addBlocklistModal')">Cancel</button>
                    <button class="btn primary" onclick="addBlocklist()">Add</button>
                </div>
            </div>
        </div>

        <!-- Add Rule Modal -->
        <div class="modal" id="addRuleModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add Custom Rule</h3>
                    <button class="close-btn" onclick="closeModal('addRuleModal')">&times;</button>
                </div>
                <div class="form-group">
                    <label>Domain</label>
                    <input type="text" id="ruleDomain" placeholder="example.com">
                </div>
                <div class="form-group">
                    <label>Action</label>
                    <select id="ruleAction" onchange="toggleRedirect()">
                        <option value="block">Block (NXDOMAIN)</option>
                        <option value="allow">Allow (Whitelist)</option>
                        <option value="redirect">Redirect</option>
                    </select>
                </div>
                <div class="form-group" id="redirectGroup" style="display:none;">
                    <label>Redirect To (IP)</label>
                    <input type="text" id="ruleRedirect" placeholder="0.0.0.0">
                </div>
                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                    <button class="btn" onclick="closeModal('addRuleModal')">Cancel</button>
                    <button class="btn primary" onclick="addRule()">Add</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = '/api/v1/vortex-dns';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/portal/login.html'; return {}; }
                if (!res.ok) return {};
                const text = await res.text();
                return text ? JSON.parse(text) : {};
            } catch { return {}; }
        }

        async function loadStatus() {
            const d = await api('/service');
            const enabled = d.enabled || false;
            document.getElementById('enableToggle').checked = enabled;
            document.getElementById('statusDot').className = 'status-dot ' + (enabled ? 'active' : 'inactive');
            document.getElementById('statusText').textContent = enabled ? 'Active' : 'Disabled';
        }

        async function loadStats() {
            const d = await api('/stats');
            document.getElementById('statBlocked').textContent = (d.total_blocked_domains || 0).toLocaleString();
            document.getElementById('statLists').textContent = d.blocklists_count || 0;
            document.getElementById('statRules').textContent = d.custom_rules_count || 0;
        }

        async function loadBlocklists() {
            const d = await api('/blocklists');
            const tbody = document.getElementById('blocklistsTable');
            tbody.innerHTML = (d.blocklists || []).map(bl => `<tr>
                <td>${bl.name}</td>
                <td>${bl.format}</td>
                <td>${(bl.domains_count || 0).toLocaleString()}</td>
                <td>${bl.last_updated ? new Date(bl.last_updated).toLocaleDateString() : '-'}</td>
                <td><span class="badge ${bl.enabled ? 'enabled' : 'disabled'}">${bl.enabled ? 'Enabled' : 'Disabled'}</span></td>
                <td class="actions">
                    <button class="btn btn-sm danger" onclick="removeBlocklist('${bl.name}')">Remove</button>
                </td>
            </tr>`).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--text-dim)">No blocklists configured</td></tr>';
        }

        async function loadRules() {
            const d = await api('/rules');
            const tbody = document.getElementById('rulesTable');
            tbody.innerHTML = (d.rules || []).map(r => `<tr>
                <td>${r.domain}</td>
                <td><span class="badge ${r.action}">${r.action}</span></td>
                <td>${r.redirect_to || '-'}</td>
                <td>${r.created ? new Date(r.created).toLocaleDateString() : '-'}</td>
                <td class="actions">
                    <button class="btn btn-sm danger" onclick="removeRule('${r.domain}')">Remove</button>
                </td>
            </tr>`).join('') || '<tr><td colspan="5" style="text-align:center;color:var(--text-dim)">No custom rules</td></tr>';
        }

        async function loadFeeds() {
            const d = await api('/feeds');
            const div = document.getElementById('feedsList');
            div.innerHTML = (d.feeds || []).map(f => `<div class="feed-item">
                <div>
                    <div class="name">${f.name}</div>
                    <div class="category">${f.category}</div>
                </div>
                <button class="btn btn-sm primary" onclick="addFeed('${f.name}', '${f.url}', '${f.format}')">Add</button>
            </div>`).join('');
        }

        async function toggleEnable() {
            const enabled = document.getElementById('enableToggle').checked;
            await api('/enable?enabled=' + enabled, { method: 'POST' });
            loadStatus();
        }

        function showAddBlocklist() {
            document.getElementById('addBlocklistModal').classList.add('active');
        }

        function showAddRule() {
            document.getElementById('addRuleModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function toggleRedirect() {
            const action = document.getElementById('ruleAction').value;
            document.getElementById('redirectGroup').style.display = action === 'redirect' ? 'block' : 'none';
        }

        async function addBlocklist() {
            const name = document.getElementById('blName').value.trim();
            const url = document.getElementById('blUrl').value.trim();
            const format = document.getElementById('blFormat').value;
            if (!name || !url) return alert('Name and URL required');
            await api('/blocklists', { method: 'POST', body: JSON.stringify({ name, url, format, enabled: true }) });
            closeModal('addBlocklistModal');
            refresh();
        }

        async function addRule() {
            const domain = document.getElementById('ruleDomain').value.trim();
            const action = document.getElementById('ruleAction').value;
            const redirect_to = document.getElementById('ruleRedirect').value.trim() || null;
            if (!domain) return alert('Domain required');
            await api('/rules', { method: 'POST', body: JSON.stringify({ domain, action, redirect_to }) });
            closeModal('addRuleModal');
            refresh();
        }

        async function addFeed(name, url, format) {
            await api('/blocklists', { method: 'POST', body: JSON.stringify({ name, url, format, enabled: true }) });
            refresh();
        }

        async function removeBlocklist(name) {
            if (!confirm('Remove blocklist ' + name + '?')) return;
            await api('/blocklists/' + encodeURIComponent(name), { method: 'DELETE' });
            refresh();
        }

        async function removeRule(domain) {
            if (!confirm('Remove rule for ' + domain + '?')) return;
            await api('/rules/' + encodeURIComponent(domain), { method: 'DELETE' });
            refresh();
        }

        async function updateAllBlocklists() {
            const d = await api('/blocklists/update', { method: 'POST' });
            alert('Updated ' + (d.results || []).length + ' blocklists');
            refresh();
        }

        async function applyBlocklists() {
            const d = await api('/blocklists/apply', { method: 'POST' });
            if (d.success) {
                alert('Applied! ' + d.domains_blocked + ' domains blocked.');
            } else {
                alert('Error: ' + (d.error || 'Unknown'));
            }
            refresh();
        }

        function refresh() {
            loadStatus();
            loadStats();
            loadBlocklists();
            loadRules();
            loadFeeds();
        }

        refresh();
    </script>
</body>
</html>
