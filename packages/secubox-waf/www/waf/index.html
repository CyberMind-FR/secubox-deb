<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Web Application Firewall</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-light.css">
    <link rel="stylesheet" href="/shared/sidebar-light.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #00dd44;
            --p31-hot: #00ff55;
            --p31-mid: #009933;
            --p31-dim: #006622;
            --p31-ghost: #003311;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-light: #e8f5e9;
            --tube-pale: #c8e6c9;
            --tube-soft: #a5d6a7;
            /* Legacy mappings */
            --bg-dark: var(--tube-light);
            --bg-card: var(--tube-pale);
            --bg-sidebar: var(--tube-black);
            --border: var(--tube-soft);
            --text: var(--tube-dark);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-light);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--tube-dark);
            display: flex;
            min-height: 100vh;
        }
        .sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .btn-group { display: flex; gap: 0.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--cyan); display: flex; align-items: center; gap: 0.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.8rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.threats .value { color: var(--red); }
        .stat-card.rules .value { color: var(--cyan); }
        .stat-card.bans .value { color: var(--orange); }
        .stat-card.categories .value { color: var(--purple); }
        .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
        .badge.critical { background: rgba(248,81,73,0.2); color: var(--red); }
        .badge.high { background: rgba(240,136,62,0.2); color: var(--orange); }
        .badge.medium { background: rgba(210,153,34,0.2); color: var(--yellow); }
        .badge.low { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.enabled { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.disabled { background: rgba(139,148,158,0.2); color: var(--text-dim); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-dim); font-weight: 500; font-size: 0.8rem; }
        .tabs { display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
        .tab { padding: 0.75rem 1.25rem; cursor: pointer; color: var(--text-dim); border-bottom: 2px solid transparent; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .category-card { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin-bottom: 0.75rem; }
        .category-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .category-name { font-weight: 600; }
        .category-meta { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-dim); }
        .toggle { position: relative; width: 40px; height: 22px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 22px; transition: 0.3s; }
        .toggle .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.3s; }
        .toggle input:checked + .slider { background: var(--green); }
        .toggle input:checked + .slider:before { transform: translateX(18px); }
        .alert-row { display: flex; gap: 1rem; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
        .alert-row:last-child { border-bottom: none; }
        .alert-time { font-size: 0.75rem; color: var(--text-dim); min-width: 140px; }
        .alert-ip { font-family: monospace; color: var(--cyan); min-width: 120px; }
        .alert-rule { font-size: 0.85rem; flex: 1; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; width: 400px; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-dim); font-size: 0.85rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 4px; color: var(--text); }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--tube-soft);
            background: var(--tube-pale);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-pale);
            border: 1px solid var(--tube-soft);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-pale);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-pale);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-light);
            border: 1px solid var(--tube-soft);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-light); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>Web Application Firewall</h1>
            <div class="btn-group">
                <button class="btn" onclick="refresh()">Refresh</button>
                <button class="btn primary" onclick="showBanModal()">Ban IP</button>
                <button class="btn" onclick="reloadRules()">Reload Rules</button>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card threats">
                <div class="value" id="threatsToday">-</div>
                <div class="label">Threats Today</div>
            </div>
            <div class="stat-card rules">
                <div class="value" id="totalRules">-</div>
                <div class="label">Active Rules</div>
            </div>
            <div class="stat-card categories">
                <div class="value" id="activeCategories">-</div>
                <div class="label">Categories</div>
            </div>
            <div class="stat-card bans">
                <div class="value" id="activeBans">-</div>
                <div class="label">Active Bans</div>
            </div>
        </div>

        <div class="card">
            <div class="tabs">
                <div class="tab active" data-tab="alerts" onclick="switchTab('alerts')">Alerts</div>
                <div class="tab" data-tab="categories" onclick="switchTab('categories')">Categories</div>
                <div class="tab" data-tab="bans" onclick="switchTab('bans')">Bans</div>
                <div class="tab" data-tab="stats" onclick="switchTab('stats')">Statistics</div>
            </div>

            <div id="alerts" class="tab-content active">
                <div id="alertsList">Loading...</div>
            </div>

            <div id="categories" class="tab-content">
                <div id="categoriesList">Loading...</div>
            </div>

            <div id="bans" class="tab-content">
                <table>
                    <thead><tr><th>IP Address</th><th>Reason</th><th>Duration</th><th>Actions</th></tr></thead>
                    <tbody id="bansTable"><tr><td colspan="4">Loading...</td></tr></tbody>
                </table>
            </div>

            <div id="stats" class="tab-content">
                <div class="grid">
                    <div class="card">
                        <h2>By Severity</h2>
                        <div id="severityStats">Loading...</div>
                    </div>
                    <div class="card">
                        <h2>By Category</h2>
                        <div id="categoryStats">Loading...</div>
                    </div>
                </div>
                <div class="card">
                    <h2>Top Attacking IPs</h2>
                    <table>
                        <thead><tr><th>IP</th><th>Threats</th><th>Actions</th></tr></thead>
                        <tbody id="topIpsTable"><tr><td colspan="3">Loading...</td></tr></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="banModal">
        <div class="modal-content">
            <h3>Ban IP Address</h3>
            <div class="form-group">
                <label>IP Address</label>
                <input type="text" id="banIp" placeholder="192.168.1.100">
            </div>
            <div class="form-group">
                <label>Duration</label>
                <select id="banDuration">
                    <option value="1h">1 hour</option>
                    <option value="4h" selected>4 hours</option>
                    <option value="24h">24 hours</option>
                    <option value="7d">7 days</option>
                    <option value="30d">30 days</option>
                </select>
            </div>
            <div class="form-group">
                <label>Reason</label>
                <input type="text" id="banReason" placeholder="Manual ban">
            </div>
            <div class="btn-group">
                <button class="btn danger" onclick="banIp()">Ban</button>
                <button class="btn" onclick="hideModal('banModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/v1/waf';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/login.html'; return {}; }
                return res.json();
            } catch { return {}; }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        async function loadStatus() {
            const d = await api('/status');
            document.getElementById('totalRules').textContent = d.total_rules || 0;
            document.getElementById('activeCategories').textContent = d.active_categories || 0;
        }

        async function loadStats() {
            const d = await api('/stats');
            document.getElementById('threatsToday').textContent = d.threats_today || 0;

            // Severity stats
            const sevEl = document.getElementById('severityStats');
            if (d.by_severity) {
                sevEl.innerHTML = Object.entries(d.by_severity).map(([sev, count]) =>
                    `<div style="display:flex;justify-content:space-between;padding:0.25rem 0;"><span class="badge ${sev}">${sev}</span><span>${count}</span></div>`
                ).join('');
            }

            // Category stats
            const catEl = document.getElementById('categoryStats');
            if (d.by_category) {
                catEl.innerHTML = Object.entries(d.by_category).slice(0, 8).map(([cat, count]) =>
                    `<div style="display:flex;justify-content:space-between;padding:0.25rem 0;"><span>${cat}</span><span style="color:var(--cyan)">${count}</span></div>`
                ).join('');
            }

            // Top IPs
            const ipsTable = document.getElementById('topIpsTable');
            if (d.top_ips && Object.keys(d.top_ips).length > 0) {
                ipsTable.innerHTML = Object.entries(d.top_ips).map(([ip, count]) => `
                    <tr>
                        <td style="font-family:monospace">${ip}</td>
                        <td>${count}</td>
                        <td><button class="btn danger" onclick="banIpDirect('${ip}')">Ban</button></td>
                    </tr>
                `).join('');
            } else {
                ipsTable.innerHTML = '<tr><td colspan="3" style="color:var(--text-dim)">No data</td></tr>';
            }
        }

        async function loadAlerts() {
            const d = await api('/alerts?limit=30');
            const el = document.getElementById('alertsList');
            if (!d.alerts || d.alerts.length === 0) {
                el.innerHTML = '<p style="color:var(--text-dim)">No recent alerts</p>';
                return;
            }
            el.innerHTML = d.alerts.map(a => `
                <div class="alert-row">
                    <span class="alert-time">${new Date(a.timestamp).toLocaleString()}</span>
                    <span class="alert-ip">${a.ip}</span>
                    <span class="badge ${a.severity}">${a.severity}</span>
                    <span class="alert-rule">${a.rule_id}: ${a.description}</span>
                </div>
            `).join('');
        }

        async function loadCategories() {
            const d = await api('/categories');
            const el = document.getElementById('categoriesList');
            if (!d.categories) {
                el.innerHTML = '<p style="color:var(--text-dim)">No categories loaded</p>';
                return;
            }
            el.innerHTML = Object.entries(d.categories).map(([id, cat]) => `
                <div class="category-card">
                    <div class="category-header">
                        <span class="category-name">${cat.name}</span>
                        <label class="toggle">
                            <input type="checkbox" ${cat.enabled ? 'checked' : ''} onchange="toggleCategory('${id}', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="category-meta">
                        <span class="badge ${cat.severity}">${cat.severity}</span>
                        <span>${cat.rules_count} rules</span>
                        ${cat.owasp ? `<span>${cat.owasp}</span>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function loadBans() {
            const d = await api('/bans');
            document.getElementById('activeBans').textContent = d.total || 0;

            const tbody = document.getElementById('bansTable');
            if (!d.bans || d.bans.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-dim)">No active bans</td></tr>';
                return;
            }
            tbody.innerHTML = d.bans.map(b => `
                <tr>
                    <td style="font-family:monospace">${b.value || b.ip || '-'}</td>
                    <td>${b.scenario || b.reason || '-'}</td>
                    <td>${b.duration || '-'}</td>
                    <td><button class="btn" onclick="unbanIp('${b.value || b.ip}')">Unban</button></td>
                </tr>
            `).join('');
        }

        async function toggleCategory(cat, enabled) {
            await api(`/category/${cat}/toggle`, { method: 'POST', body: JSON.stringify({ enabled }) });
            loadStatus();
        }

        function showModal(id) { document.getElementById(id).classList.add('show'); }
        function hideModal(id) { document.getElementById(id).classList.remove('show'); }
        function showBanModal() { showModal('banModal'); }

        async function banIp() {
            const ip = document.getElementById('banIp').value;
            const duration = document.getElementById('banDuration').value;
            const reason = document.getElementById('banReason').value || 'Manual ban';
            if (!ip) return alert('Enter IP address');
            await api('/ban', { method: 'POST', body: JSON.stringify({ ip, duration, reason }) });
            hideModal('banModal');
            document.getElementById('banIp').value = '';
            loadBans();
        }

        async function banIpDirect(ip) {
            if (!confirm(`Ban ${ip}?`)) return;
            await api('/ban', { method: 'POST', body: JSON.stringify({ ip, duration: '4h', reason: 'Manual ban from dashboard' }) });
            loadBans();
        }

        async function unbanIp(ip) {
            if (!confirm(`Unban ${ip}?`)) return;
            await api(`/unban/${ip}`, { method: 'POST' });
            loadBans();
        }

        async function reloadRules() {
            const d = await api('/reload', { method: 'POST' });
            alert(`Reloaded ${d.rules} rules in ${d.categories} categories`);
            refresh();
        }

        function refresh() {
            loadStatus();
            loadStats();
            loadAlerts();
            loadCategories();
            loadBans();
        }

        refresh();
        setInterval(refresh, 30000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
