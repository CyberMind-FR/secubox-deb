<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - Webmail LXC Container</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/crt-system.css">
    <link rel="stylesheet" href="/shared/sidebar.css">
    <style>
        :root {
            /* P31 Phosphor spectrum */
            --p31-peak: #33ff66;
            --p31-hot: #66ffaa;
            --p31-mid: #22cc44;
            --p31-dim: #0f8822;
            --p31-ghost: #052210;
            --p31-decay: #ffb347;
            --p31-decay-dim: #cc7722;
            /* Tube glass */
            --tube-black: #050803;
            --tube-deep: #080d05;
            --tube-bezel: #0d1208;
            /* Legacy mappings */
            --bg-dark: var(--tube-black);
            --bg-card: var(--tube-deep);
            --bg-sidebar: var(--tube-black);
            --border: var(--p31-ghost);
            --text: var(--p31-mid);
            --text-dim: var(--p31-dim);
            --primary: var(--p31-peak);
            --cyan: var(--p31-peak);
            --green: var(--p31-peak);
            --red: #ff4466;
            --yellow: var(--p31-decay);
            --orange: var(--p31-decay-dim);
            --purple: #a371f7;
            /* Bloom effects */
            --bloom-text: 0 0 2px var(--p31-peak), 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-soft: 0 0 6px var(--p31-peak), 0 0 14px rgba(51,255,102,0.5);
            --bloom-amber: 0 0 3px var(--p31-decay), 0 0 10px rgba(255,179,71,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier Prime', 'Courier New', monospace;
            background: var(--tube-black);
            background-image: radial-gradient(ellipse at 50% 40%, rgba(51,255,102,0.025) 0%, transparent 70%);
            color: var(--p31-mid);
            display: flex;
            min-height: 100vh;
        }
        .sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .main { flex: 1; margin-left: 220px; padding: 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.9rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .btn-group { display: flex; gap: 0.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1rem; margin-bottom: 1rem; color: var(--cyan); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
        .stat-card .value { font-size: 1.5rem; font-weight: bold; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.25rem; }
        .stat-card.running .value { color: var(--green); }
        .stat-card.stopped .value { color: var(--red); }
        .stat-card.info .value { color: var(--cyan); }
        .logs { background: #000; border-radius: 4px; padding: 1rem; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: var(--green); }
        .radio-group { display: flex; gap: 1rem; margin: 1rem 0; }
        .radio-group label { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; padding: 0.75rem 1rem; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; }
        .radio-group input:checked + span { color: var(--primary); }
        .plugin-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.5rem; }
        .plugin-item { background: var(--bg-dark); padding: 0.5rem; border-radius: 4px; font-size: 0.85rem; }
    
        /* CRT Enhancements */
        .main { margin-left: 220px; padding: 1.5rem; }

        .header h1 {
            color: var(--p31-hot);
            text-shadow: var(--bloom-text);
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .badge {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 1px solid;
        }
        .badge-blue, .badge-primary { background: rgba(51,255,102,0.1); border-color: var(--p31-peak); color: var(--p31-peak); }
        .badge-green { background: rgba(51,255,102,0.15); border-color: var(--p31-peak); color: var(--p31-peak); text-shadow: var(--bloom-soft); }
        .badge-cyan { background: rgba(51,255,102,0.1); border-color: var(--p31-mid); color: var(--p31-mid); }
        .badge-purple { background: rgba(163,113,247,0.1); border-color: #a371f7; color: #a371f7; }
        .badge-yellow, .badge-amber { background: rgba(255,179,71,0.1); border-color: var(--p31-decay); color: var(--p31-decay); }
        .badge-red { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

        .btn {
            font-family: 'Courier Prime', monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--p31-ghost);
            background: var(--tube-deep);
            color: var(--p31-mid);
            transition: all 0.2s;
        }
        .btn:hover {
            border-color: var(--p31-dim);
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            box-shadow: 0 0 12px rgba(51,255,102,0.1);
        }
        .btn-green, .btn-primary, .btn.primary, .btn.success {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
            background: rgba(51,255,102,0.1);
        }
        .btn-green:hover, .btn-primary:hover, .btn.primary:hover, .btn.success:hover {
            background: rgba(51,255,102,0.2);
            box-shadow: 0 0 16px rgba(51,255,102,0.2);
        }
        .btn-red, .btn.danger {
            border-color: #ff4466;
            color: #ff4466;
            background: rgba(255,68,102,0.1);
        }
        .btn-red:hover, .btn.danger:hover {
            background: rgba(255,68,102,0.2);
        }
        .btn-blue {
            border-color: var(--p31-mid);
            color: var(--p31-mid);
            background: rgba(51,255,102,0.05);
        }
        .btn-blue:hover {
            border-color: var(--p31-peak);
            color: var(--p31-peak);
        }

        .card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card:hover {
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.05), inset 0 0 20px rgba(0,0,0,0.3);
        }
        .card-title, .card-header h2 {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .stat-card {
            background: var(--tube-deep);
            border: 1px solid var(--p31-ghost);
        }
        .stat-value, .stat-card .value {
            text-shadow: 0 0 10px currentColor;
        }
        .stat-label, .stat-card .label {
            color: var(--p31-dim);
            letter-spacing: 0.15em;
        }
        .stat-card.cyan .value, .stat-card.green .value { color: var(--p31-peak); }
        .stat-card.yellow .value { color: var(--p31-decay); }
        .stat-card.red .value { color: #ff4466; }

        table, .table {
            font-family: 'Courier Prime', monospace;
        }
        th, .table th {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.15em;
            border-bottom: 1px solid var(--p31-ghost);
        }
        td, .table td {
            border-bottom: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
        }
        tr:hover, .table tr:hover {
            background: rgba(51,255,102,0.03);
        }

        .status-dot.active, .status-running {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
        }
        .status-dot.active {
            background: var(--p31-peak);
            box-shadow: 0 0 8px var(--p31-peak);
        }

        .toast {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            font-family: 'Courier Prime', monospace;
        }
        .toast-success { border-color: var(--p31-peak); }
        .toast-error { border-color: #ff4466; }

        .modal {
            background: rgba(0,0,0,0.85);
        }
        .modal-content {
            background: var(--tube-deep);
            border: 1px solid var(--p31-dim);
            box-shadow: 0 0 30px rgba(51,255,102,0.1);
        }
        .modal-title {
            color: var(--p31-decay);
            text-shadow: var(--bloom-amber);
            letter-spacing: 0.1em;
        }

        .tabs {
            background: var(--tube-deep);
            border-bottom: 1px solid var(--p31-ghost);
        }
        .tab {
            color: var(--p31-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-size: 0.8rem;
        }
        .tab:hover { color: var(--p31-mid); }
        .tab.active {
            color: var(--p31-peak);
            text-shadow: var(--bloom-soft);
            border-bottom-color: var(--p31-peak);
        }

        input, select, textarea {
            font-family: 'Courier Prime', monospace;
            background: var(--tube-black);
            border: 1px solid var(--p31-ghost);
            color: var(--p31-mid);
            padding: 0.5rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--p31-dim);
            box-shadow: 0 0 8px rgba(51,255,102,0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--tube-black); }
        ::-webkit-scrollbar-thumb { background: var(--p31-dim); }
        ::-webkit-scrollbar-thumb:hover { background: var(--p31-mid); }

        /* Empty states */
        .empty { color: var(--p31-dim); }

        @media (max-width: 768px) {
            .main { margin-left: 0; }
        }
    </style>
</head>
<body class="crt-body crt-scanlines crt-body crt-scanlines">
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>
    <main class="main">
        <header class="header">
            <h1>Webmail LXC Container</h1>
            <div class="btn-group">
                <button class="btn" onclick="refresh()">Refresh</button>
                <button class="btn primary" id="installBtn" onclick="showInstall()">Install</button>
            </div>
        </header>

        <div class="grid">
            <div class="stat-card" id="statusCard">
                <div class="value" id="containerStatus">--</div>
                <div class="label">Container Status</div>
            </div>
            <div class="stat-card info">
                <div class="value" id="webmailType">--</div>
                <div class="label">Webmail Type</div>
            </div>
            <div class="stat-card info">
                <div class="value" id="containerIP">--</div>
                <div class="label">IP Address</div>
            </div>
            <div class="stat-card info">
                <div class="value" id="httpPort">--</div>
                <div class="label">HTTP Port</div>
            </div>
        </div>

        <div class="card">
            <h2>Container Controls</h2>
            <div class="btn-group">
                <button class="btn success" id="startBtn" onclick="startContainer()">Start</button>
                <button class="btn danger" id="stopBtn" onclick="stopContainer()">Stop</button>
                <button class="btn" onclick="restartContainer()">Restart</button>
                <button class="btn" onclick="clearCache()">Clear Cache</button>
                <button class="btn danger" onclick="uninstallContainer()">Uninstall</button>
            </div>
        </div>

        <div class="card">
            <h2>Mail Server Connection</h2>
            <p style="color: var(--text-dim); margin-bottom: 0.5rem;">Connected to: <span id="mailServer" style="color: var(--cyan);">--</span></p>
        </div>

        <div class="card">
            <h2>Plugins (Roundcube)</h2>
            <div class="plugin-list" id="pluginList">Loading...</div>
        </div>

        <div class="card">
            <h2>Logs</h2>
            <div class="logs" id="logsArea">Loading...</div>
        </div>
    </main>

    <div class="modal" id="installModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; align-items:center; justify-content:center;">
        <div style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; width: 400px;">
            <h3 style="margin-bottom: 1rem;">Install Webmail Container</h3>
            <p style="color: var(--text-dim); margin-bottom: 1rem;">Select webmail application:</p>
            <div class="radio-group">
                <label><input type="radio" name="webmailType" value="roundcube" checked><span>Roundcube</span></label>
                <label><input type="radio" name="webmailType" value="sogo"><span>SOGo</span></label>
            </div>
            <div class="btn-group" style="margin-top: 1rem;">
                <button class="btn primary" onclick="installContainer()">Install</button>
                <button class="btn" onclick="hideInstall()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API = '/api/v1/webmail-lxc';
        const token = () => localStorage.getItem('sbx_token');
        const headers = () => ({ 'Content-Type': 'application/json', ...(token() ? { 'Authorization': 'Bearer ' + token() } : {}) });

        async function api(path, opts = {}) {
            try {
                const res = await fetch(API + path, { ...opts, headers: headers() });
                if (res.status === 401) { window.location = '/login.html'; return {}; }
                return res.json();
            } catch { return {}; }
        }

        async function loadStatus() {
            const d = await api('/status');
            const statusEl = document.getElementById('containerStatus');
            const cardEl = document.getElementById('statusCard');

            if (d.running) {
                statusEl.textContent = 'RUNNING';
                cardEl.className = 'stat-card running';
            } else if (d.exists) {
                statusEl.textContent = 'STOPPED';
                cardEl.className = 'stat-card stopped';
            } else {
                statusEl.textContent = 'NOT INSTALLED';
                cardEl.className = 'stat-card stopped';
            }

            document.getElementById('containerIP').textContent = d.ip || '--';
            document.getElementById('webmailType').textContent = (d.webmail_type || '--').toUpperCase();
            document.getElementById('httpPort').textContent = d.http_port || '--';
            document.getElementById('mailServer').textContent = d.mail_server || '--';

            document.getElementById('startBtn').disabled = d.running;
            document.getElementById('stopBtn').disabled = !d.running;
            document.getElementById('installBtn').style.display = d.exists ? 'none' : 'inline-block';
        }

        async function loadPlugins() {
            const d = await api('/plugins');
            const el = document.getElementById('pluginList');
            if (!d.plugins || d.plugins.length === 0) {
                el.innerHTML = '<span style="color: var(--text-dim)">No plugins</span>';
                return;
            }
            el.innerHTML = d.plugins.map(p => `<div class="plugin-item">${p}</div>`).join('');
        }

        async function loadLogs() {
            const d = await api('/logs?lines=50');
            document.getElementById('logsArea').textContent = d.logs ? d.logs.join('\n') : 'No logs';
        }

        function showInstall() { document.getElementById('installModal').style.display = 'flex'; }
        function hideInstall() { document.getElementById('installModal').style.display = 'none'; }

        async function installContainer() {
            const type = document.querySelector('input[name="webmailType"]:checked').value;
            document.getElementById('containerStatus').textContent = 'INSTALLING...';
            hideInstall();
            await api('/install', { method: 'POST', body: JSON.stringify({ webmail_type: type }) });
            refresh();
        }

        async function startContainer() {
            await api('/start', { method: 'POST' });
            refresh();
        }

        async function stopContainer() {
            await api('/stop', { method: 'POST' });
            refresh();
        }

        async function restartContainer() {
            await api('/restart', { method: 'POST' });
            refresh();
        }

        async function clearCache() {
            await api('/clear-cache', { method: 'POST' });
            alert('Cache cleared');
        }

        async function uninstallContainer() {
            if (!confirm('Uninstall webmail container?')) return;
            await api('/uninstall', { method: 'DELETE' });
            refresh();
        }

        function refresh() { loadStatus(); loadPlugins(); loadLogs(); }
        refresh();
        setInterval(loadStatus, 10000);
    </script>
    <script src="/shared/crt-engine.js"></script>
</body>
</html>
