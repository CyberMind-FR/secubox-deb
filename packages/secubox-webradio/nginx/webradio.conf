# /etc/nginx/secubox.d/webradio.conf
# Installed by secubox-webradio -- auto-registered on install, removed on purge

# Static frontend
location /webradio/ {
    alias /usr/share/secubox/www/webradio/;
    index index.html;
    try_files $uri $uri/ /webradio/index.html;
}

# API backend
location /api/v1/webradio/ {
    proxy_pass http://unix:/run/secubox/webradio.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
