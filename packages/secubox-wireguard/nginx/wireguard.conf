# SecuBox WireGuard API proxy
location /api/v1/wireguard/ {
    proxy_pass http://unix:/run/secubox/wireguard.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}

# WireGuard dashboard static files
location /wireguard/ {
    alias /usr/share/secubox/www/wireguard/;
    index index.html;
    try_files $uri $uri/ =404;
}
