<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecuBox - WireGuard VPN</title>
    <style>
        :root { --bg-dark: #0d1117; --bg-card: #161b22; --bg-sidebar: #0d1117; --border: #30363d; --text: #c9d1d9; --text-dim: #8b949e; --primary: #58a6ff; --cyan: #00d4ff; --green: #3fb950; --red: #f85149; --yellow: #d29922; --purple: #a371f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text); display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--bg-sidebar); border-right: 1px solid var(--border); position: fixed; height: 100vh; overflow-y: auto; }
        .sidebar-header { padding: 1rem; border-bottom: 1px solid var(--border); }
        .logo { font-weight: bold; font-size: 1.2rem; }
        .logo span:nth-child(1) { color: var(--cyan); } .logo span:nth-child(2) { color: var(--red); } .logo span:nth-child(3) { color: var(--green); } .logo span:nth-child(4) { color: var(--yellow); }
        .nav-section { padding: 0.5rem 0; }
        .nav-section-title { padding: 0.5rem 1rem; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 1rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(88,166,255,0.1); color: var(--primary); border-left-color: var(--primary); }
        .nav-item .icon { width: 20px; text-align: center; }
        .main { flex: 1; margin-left: 220px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--bg-card); }
        .header-title { display: flex; align-items: center; gap: 1rem; }
        .header-title h1 { font-size: 1.5rem; font-weight: 600; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; }
        .badge.active { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge.inactive { background: rgba(248,81,73,0.2); color: var(--red); }
        .header-actions { display: flex; gap: 0.75rem; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); cursor: pointer; font-size: 0.875rem; }
        .btn:hover { background: var(--bg-dark); }
        .btn.primary { background: rgba(88,166,255,0.1); border-color: var(--primary); color: var(--primary); }
        .btn.success { background: rgba(63,185,80,0.1); border-color: var(--green); color: var(--green); }
        .btn.danger { background: rgba(248,81,73,0.1); border-color: var(--red); color: var(--red); }
        .content { padding: 1.5rem; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; text-align: center; }
        .stat-card .value { font-size: 2rem; font-weight: bold; margin-bottom: 0.25rem; }
        .stat-card .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-card.cyan .value { color: var(--cyan); }
        .stat-card.green .value { color: var(--green); }
        .stat-card.purple .value { color: var(--purple); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.5rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .card-header h2 { font-size: 1rem; font-weight: 600; }
        .interface-card { border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
        .interface-card.active { border-color: var(--green); background: rgba(63,185,80,0.05); }
        .interface-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
        .interface-header h3 { font-size: 1.1rem; }
        .interface-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; font-size: 0.85rem; color: var(--text-dim); }
        .peer-item { background: rgba(255,255,255,0.02); border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; }
        .peer-item .name { font-weight: 500; margin-bottom: 0.25rem; }
        .peer-item .details { font-size: 0.85rem; color: var(--text-dim); }
        .peer-item .traffic { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.85rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; color: var(--text-dim); font-size: 0.9rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text); border-radius: 6px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .config-box { background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; font-family: monospace; font-size: 0.85rem; max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
        .scroll-list { max-height: 350px; overflow-y: auto; }
        @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } .sidebar { display: none; } .main { margin-left: 0; } }
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"></nav>
    <script src="/shared/sidebar.js"></script>

    <main class="main">
        <header class="header">
            <div class="header-title">
                <h1>🔐 WireGuard VPN</h1>
                <span class="badge" id="wg-badge">-</span>
            </div>
            <div class="header-actions">
                <button class="btn primary" onclick="showCreateInterface()">+ New Interface</button>
                <button class="btn" onclick="generateKeys()">🔑 Generate Keys</button>
                <button class="btn" onclick="reloadAll()">🔄 Reload</button>
            </div>
        </header>

        <div class="content">
            <div class="stats-row">
                <div class="stat-card cyan">
                    <div class="value" id="interfaces-count">0</div>
                    <div class="label">Interfaces</div>
                </div>
                <div class="stat-card green">
                    <div class="value" id="interfaces-up">0</div>
                    <div class="label">Active</div>
                </div>
                <div class="stat-card purple">
                    <div class="value" id="peers-count">0</div>
                    <div class="label">Peers</div>
                </div>
                <div class="stat-card cyan">
                    <div class="value" id="total-traffic">0</div>
                    <div class="label">Total Traffic</div>
                </div>
            </div>

            <div class="grid-2">
                <div class="card">
                    <div class="card-header">
                        <h2>📡 Interfaces</h2>
                    </div>
                    <div class="scroll-list" id="interfaces-list">
                        <p style="color: var(--text-dim);">Loading...</p>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>👥 Peers</h2>
                        <button class="btn primary" onclick="showAddPeer()">+ Add Peer</button>
                    </div>
                    <div class="scroll-list" id="peers-list">
                        <p style="color: var(--text-dim);">Loading...</p>
                    </div>
                </div>

                <div class="card" id="config-card" style="display: none;">
                    <div class="card-header">
                        <h2>⚙️ Configuration</h2>
                        <div>
                            <button class="btn" onclick="copyConfig()">📋 Copy</button>
                            <button class="btn" onclick="downloadConfig()">💾 Download</button>
                        </div>
                    </div>
                    <div class="config-box" id="config-text"></div>
                </div>

                <div class="card" id="form-card" style="display: none;">
                    <div class="card-header">
                        <h2 id="form-title">New Interface</h2>
                        <button class="btn" onclick="hideForm()">✕</button>
                    </div>
                    <form id="wg-form">
                        <div id="form-fields"></div>
                        <div style="margin-top: 1rem;">
                            <button type="submit" class="btn success">Save</button>
                            <button type="button" class="btn" onclick="hideForm()">Cancel</button>
                        </div>
                    </form>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2>📊 Traffic Stats</h2>
                    </div>
                    <div id="traffic-stats">
                        <p style="color: var(--text-dim);">Loading...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = '/api/v1/wireguard';
        let currentInterface = null;

        async function api(endpoint, method = 'GET', data = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (data) opts.body = JSON.stringify(data);
            try { const res = await fetch(API + endpoint, opts); return res.json(); } catch (e) { return {}; }
        }

        function formatBytes(b) {
            if (!b) return '0 B';
            const k = 1024, s = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(b) / Math.log(k));
            return (b / Math.pow(k, i)).toFixed(1) + ' ' + s[i];
        }

        async function loadInterfaces() {
            const data = await api('/interfaces');
            const interfaces = data.interfaces || [];
            const list = document.getElementById('interfaces-list');
            const active = interfaces.filter(i => i.up).length;

            document.getElementById('interfaces-count').textContent = interfaces.length;
            document.getElementById('interfaces-up').textContent = active;
            document.getElementById('wg-badge').className = 'badge ' + (active > 0 ? 'active' : 'inactive');
            document.getElementById('wg-badge').textContent = active > 0 ? active + ' Active' : 'No Active';

            if (interfaces.length === 0) {
                list.innerHTML = '<p style="color: var(--text-dim);">No interfaces configured</p>';
                return;
            }

            list.innerHTML = interfaces.map(iface => `
                <div class="interface-card ${iface.up ? 'active' : ''}">
                    <div class="interface-header">
                        <h3>${iface.name}</h3>
                        <span class="badge ${iface.up ? 'active' : 'inactive'}">${iface.up ? 'UP' : 'DOWN'}</span>
                    </div>
                    <div class="interface-stats">
                        <div>Address: ${iface.address || '-'}</div>
                        <div>Port: ${iface.listen_port || '-'}</div>
                        <div>Peers: ${iface.peer_count || 0}</div>
                        <div>Key: ${(iface.public_key || '').substring(0, 12)}...</div>
                    </div>
                    <div style="margin-top: 0.75rem;">
                        <button class="btn ${iface.up ? 'danger' : 'success'}" onclick="${iface.up ? 'stopInterface' : 'startInterface'}('${iface.name}')">${iface.up ? 'Stop' : 'Start'}</button>
                        <button class="btn" onclick="showInterfaceConfig('${iface.name}')">Config</button>
                        <button class="btn danger" onclick="deleteInterface('${iface.name}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadPeers() {
            const data = await api('/peers');
            const peers = data.peers || [];
            const list = document.getElementById('peers-list');

            document.getElementById('peers-count').textContent = peers.length;

            if (peers.length === 0) {
                list.innerHTML = '<p style="color: var(--text-dim);">No peers configured</p>';
                return;
            }

            list.innerHTML = peers.map(peer => `
                <div class="peer-item">
                    <div class="name">${peer.name || peer.public_key.substring(0, 12) + '...'}</div>
                    <div class="details">${peer.allowed_ips || '-'} | ${peer.interface || '-'}</div>
                    <div class="traffic">
                        <span style="color: var(--green);">↓ ${formatBytes(peer.rx_bytes)}</span>
                        <span style="color: var(--cyan);">↑ ${formatBytes(peer.tx_bytes)}</span>
                        <span style="color: var(--text-dim);">Last: ${peer.latest_handshake || 'never'}</span>
                    </div>
                    <div style="margin-top: 0.5rem;">
                        <button class="btn" onclick="showPeerConfig('${peer.public_key}')">Config</button>
                        <button class="btn danger" onclick="deletePeer('${peer.public_key}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadTrafficStats() {
            const data = await api('/traffic');
            const stats = document.getElementById('traffic-stats');
            const traffic = data.traffic || {};
            let totalRx = 0, totalTx = 0;

            Object.values(traffic).forEach(t => { totalRx += t.rx_bytes || 0; totalTx += t.tx_bytes || 0; });
            document.getElementById('total-traffic').textContent = formatBytes(totalRx + totalTx);

            stats.innerHTML = Object.entries(traffic).map(([iface, t]) => `
                <div style="margin-bottom: 1rem; padding: 0.75rem; background: var(--bg-dark); border-radius: 6px;">
                    <strong>${iface}</strong>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 0.5rem; font-size: 0.9rem;">
                        <div>RX: <span style="color: var(--green);">${formatBytes(t.rx_bytes)}</span></div>
                        <div>TX: <span style="color: var(--cyan);">${formatBytes(t.tx_bytes)}</span></div>
                    </div>
                </div>
            `).join('') || '<p style="color: var(--text-dim);">No traffic data</p>';
        }

        async function startInterface(name) { await api('/start', 'POST', { interface: name }); loadInterfaces(); }
        async function stopInterface(name) { await api('/stop', 'POST', { interface: name }); loadInterfaces(); }
        async function deleteInterface(name) { if (confirm(`Delete ${name}?`)) { await api('/delete_interface', 'POST', { interface: name }); loadInterfaces(); } }
        async function deletePeer(pk) { if (confirm('Delete peer?')) { await api('/delete_peer', 'POST', { public_key: pk }); loadPeers(); } }

        async function showInterfaceConfig(name) {
            const data = await api('/get_config?interface=' + name);
            document.getElementById('config-text').textContent = data.config || 'No config';
            document.getElementById('config-card').style.display = 'block';
            currentInterface = name;
        }

        function copyConfig() { navigator.clipboard.writeText(document.getElementById('config-text').textContent); alert('Copied'); }
        function downloadConfig() {
            const blob = new Blob([document.getElementById('config-text').textContent], { type: 'text/plain' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = (currentInterface || 'wg') + '.conf'; a.click();
        }

        function showCreateInterface() {
            document.getElementById('form-title').textContent = 'New Interface';
            document.getElementById('form-fields').innerHTML = `
                <div class="form-row">
                    <div class="form-group"><label>Interface Name</label><input type="text" name="name" value="wg0" required></div>
                    <div class="form-group"><label>Listen Port</label><input type="number" name="port" value="51820"></div>
                </div>
                <div class="form-group"><label>Address (CIDR)</label><input type="text" name="address" placeholder="10.0.0.1/24" required></div>
            `;
            document.getElementById('wg-form').onsubmit = createInterface;
            document.getElementById('form-card').style.display = 'block';
        }

        function showAddPeer() {
            document.getElementById('form-title').textContent = 'Add Peer';
            document.getElementById('form-fields').innerHTML = `
                <div class="form-group"><label>Interface</label><select name="interface" required><option value="wg0">wg0</option></select></div>
                <div class="form-group"><label>Peer Name</label><input type="text" name="name" placeholder="client1"></div>
                <div class="form-group"><label>Allowed IPs</label><input type="text" name="allowed_ips" placeholder="10.0.0.2/32" required></div>
                <div class="form-group"><label>Endpoint (optional)</label><input type="text" name="endpoint" placeholder="vpn.example.com:51820"></div>
            `;
            document.getElementById('wg-form').onsubmit = addPeer;
            document.getElementById('form-card').style.display = 'block';
        }

        function hideForm() { document.getElementById('form-card').style.display = 'none'; }

        async function createInterface(e) {
            e.preventDefault();
            const form = new FormData(e.target);
            await api('/create_interface', 'POST', { name: form.get('name'), port: parseInt(form.get('port')), address: form.get('address') });
            hideForm(); loadInterfaces();
        }

        async function addPeer(e) {
            e.preventDefault();
            const form = new FormData(e.target);
            await api('/add_peer', 'POST', { interface: form.get('interface'), name: form.get('name'), allowed_ips: form.get('allowed_ips'), endpoint: form.get('endpoint') });
            hideForm(); loadPeers();
        }

        async function generateKeys() {
            const data = await api('/generate_keys');
            alert('Private: ' + data.private_key + '\nPublic: ' + data.public_key);
        }

        async function reloadAll() { await api('/reload', 'POST'); loadInterfaces(); loadPeers(); }

        function refresh() { loadInterfaces(); loadPeers(); loadTrafficStats(); }
        refresh();
        setInterval(refresh, 15000);
    </script>
</body>
</html>
