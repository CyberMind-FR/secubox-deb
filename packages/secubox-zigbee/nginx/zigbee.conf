# /etc/nginx/secubox.d/zigbee.conf
# Installed by secubox-zigbee — auto-registered on install, removed on purge

# Static frontend
location /zigbee/ {
    alias /usr/share/secubox/www/zigbee/;
    index index.html;
    try_files $uri $uri/ /zigbee/index.html;
}

# API backend
location /api/v1/zigbee/ {
    proxy_pass http://unix:/run/secubox/zigbee.sock:/;
    include /etc/nginx/snippets/secubox-proxy.conf;
}
