# nginx configuration for apt.secubox.in
# APT Repository server

server {
    listen 80;
    listen [::]:80;
    server_name apt.secubox.in;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apt.secubox.in;

    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/apt.secubox.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apt.secubox.in/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Repository root
    root /var/www/apt.secubox.in;
    autoindex on;

    # Access logging
    access_log /var/log/nginx/apt.secubox.in.access.log;
    error_log /var/log/nginx/apt.secubox.in.error.log;

    # GPG Key
    location = /secubox-keyring.gpg {
        alias /var/www/apt.secubox.in/secubox-keyring.gpg;
        add_header Content-Type application/pgp-keys;
    }

    location = /secubox-keyring.gpg.bin {
        alias /var/www/apt.secubox.in/secubox-keyring.gpg.bin;
        add_header Content-Type application/octet-stream;
    }

    # APT Repository files
    location /dists/ {
        autoindex on;
    }

    location /pool/ {
        autoindex on;
    }

    # Compression for Release files
    location ~ /Release$ {
        add_header Cache-Control "max-age=300";
    }

    location ~ /Packages(\.gz|\.xz)?$ {
        add_header Cache-Control "max-age=300";
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
